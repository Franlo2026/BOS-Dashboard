<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BOS — Support Schedule</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<style>
@import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&display=swap');
:root {
  --gold: #c8ae79; --gold-light: rgba(200,174,121,0.12);
  --black: #1a1a1a; --white: #ffffff;
  --grey-100: #f7f7f7; --grey-200: #ebebeb; --grey-300: #d4d4d4; --grey-500: #999999; --grey-700: #555555;
  --green: #2e7d32; --green-bg: rgba(46,125,50,0.10);
  --amber: #e65100; --amber-bg: rgba(230,81,0,0.10);
  --red: #c62828; --red-bg: rgba(198,40,40,0.10);
  --teal: #0e7c86; --teal-bg: rgba(14,124,134,0.10);
  --font: 'Montserrat', Arial, sans-serif;
}
* , *::before, *::after { box-sizing: border-box; margin:0; padding:0; }
body { font-family: var(--font); background: var(--grey-100); color: var(--black); min-height:100vh; }
nav.topnav { background: var(--black); height: 52px; position: sticky; top:0; z-index: 50; display:flex; align-items:center; justify-content:space-between; padding: 0 24px; }
.brand { color: var(--white); font-weight:700; font-size:13px; letter-spacing:0.2em; text-transform:uppercase; white-space:nowrap; }
.topnav a.backlink { color: var(--gold); text-decoration:none; font-size:11px; border:1px solid var(--gold); padding:6px 12px; border-radius:3px; }
.container { max-width: 1280px; margin:0 auto; padding: 28px 24px 60px; }
.page-header { display:flex; align-items:flex-end; justify-content:space-between; border-bottom: 1px solid var(--gold); padding-bottom: 14px; margin-bottom: 24px; flex-wrap:wrap; gap:10px; }
.page-title { font-size:18px; font-weight:700; text-transform:uppercase; letter-spacing:0.03em; }
.page-subtitle { font-size:11px; color:var(--grey-500); text-transform:uppercase; letter-spacing:0.06em; margin-top:4px; }
.period-badge { border:1px solid var(--gold); background:var(--gold-light); color:var(--gold); font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:0.06em; padding:6px 12px; }
.card { background:var(--white); border:1px solid var(--grey-200); padding:20px 22px; margin-bottom:16px; }
.section-title { font-size:11px; font-weight:700; letter-spacing:0.08em; text-transform:uppercase; margin-bottom:14px; }
.segmented { display:flex; border:1px solid var(--grey-200); background:var(--white); margin-bottom:16px; }
.segmented-btn { flex:1; text-align:center; padding:12px 16px; background:var(--white); color:var(--grey-500); border:none; border-right:1px solid var(--grey-200); font-family:var(--font); font-size:11px; font-weight:700; letter-spacing:0.06em; text-transform:uppercase; cursor:pointer; }
.segmented-btn:last-child{ border-right:none; }
.segmented-btn.active { background:var(--black); color:var(--gold); }
.segmented-btn:not(.active):hover { color:var(--black); }
.kpi-strip { display:grid; grid-template-columns:repeat(4,1fr); background:var(--white); border:1px solid var(--grey-200); margin-bottom:16px; }
.kpi-strip > div { padding:16px 20px; border-right:1px solid var(--grey-200); }
.kpi-strip > div:last-child{ border-right:none; }
.card-label { font-size:9px; font-weight:700; letter-spacing:0.1em; text-transform:uppercase; color:var(--grey-500); margin-bottom:6px; }
.card-value { font-size:24px; font-weight:700; color:var(--black); }
.card-sub { font-size:10px; color:var(--grey-500); margin-top:4px; text-transform:uppercase; letter-spacing:0.04em; }
.badge { font-size:9px; font-weight:700; text-transform:uppercase; letter-spacing:0.04em; padding:3px 8px; border-radius:2px; }
.badge.green { background:var(--green-bg); color:var(--green); }
.badge.amber { background:var(--amber-bg); color:var(--amber); }
.badge.red { background:var(--red-bg); color:var(--red); }
.badge.grey { background:var(--grey-200); color:var(--grey-700); }
.badge.teal { background:var(--teal-bg); color:var(--teal); }
.badge.gold { background:var(--gold-light); color:#8a7238; }
.btn { display:inline-flex; align-items:center; gap:6px; padding:8px 14px; font-family:var(--font); font-size:11px; font-weight:700; letter-spacing:0.04em; text-transform:uppercase; cursor:pointer; border:none; border-radius:2px; }
.btn-gold { background:var(--gold); color:var(--black); }
.btn-black { background:var(--black); color:var(--gold); }
.btn-outline { background:transparent; color:var(--black); border:1px solid var(--black); }
.btn-mini { padding:5px 10px; font-size:10px; }
.btn:hover{ opacity:0.85; } .btn:disabled{ opacity:0.4; cursor:not-allowed; }
table.data-table { width:100%; border-collapse:collapse; font-size:12px; }
.data-table thead th { font-weight:700; font-size:10px; letter-spacing:0.06em; text-transform:uppercase; padding:8px 10px; border-bottom:1px solid var(--black); text-align:left; color:var(--black); cursor:pointer; user-select:none; }
.data-table tbody td { padding:9px 10px; border-bottom:1px solid var(--grey-200); vertical-align:middle; }
.data-table tbody tr:hover { background: var(--grey-100); cursor:pointer; }
.filter-row { display:flex; gap:10px; flex-wrap:wrap; margin-bottom:16px; align-items:center; }
.filter-row select, .filter-row input { width:auto; min-width:150px; font-family:var(--font); font-size:13px; padding:9px 10px; border:1px solid var(--grey-300); background:var(--white); }
.empty-state { color:var(--grey-500); font-size:12px; padding:24px 0; text-align:center; }
.toast { position:fixed; bottom:24px; right:24px; background:var(--black); color:var(--gold); padding:12px 20px; font-size:12px; font-weight:700; text-transform:uppercase; letter-spacing:0.05em; display:none; z-index:100; }

/* week grid */
.week-grid { display:grid; grid-template-columns: 160px repeat(7, 1fr); border:1px solid var(--grey-200); background:var(--white); }
.week-grid-head { display:contents; }
.week-grid-head > div { background:var(--grey-100); font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:0.04em; padding:10px 8px; border-bottom:1px solid var(--black); color:var(--grey-700); }
.week-grid-head .date-sub { display:block; font-weight:400; color:var(--grey-500); font-size:9px; margin-top:2px; text-transform:none; letter-spacing:0; }
.fsm-row-name { padding:12px 10px; border-top:1px solid var(--grey-200); font-weight:700; font-size:12px; background:var(--grey-100); }
.fsm-row-name .sub { font-weight:400; color:var(--grey-500); font-size:10px; margin-top:2px; }
.fsm-name-edit { cursor:pointer; border-bottom:1px dashed var(--grey-300); }
.fsm-name-edit:hover { color:#8a7238; border-bottom-color:var(--gold); }
.day-cell { border-top:1px solid var(--grey-200); border-left:1px solid var(--grey-200); padding:6px; min-height:64px; vertical-align:top; }
.cafe-chip { background:var(--white); border:1px solid var(--grey-300); border-radius:3px; padding:6px 8px; margin-bottom:5px; font-size:11px; cursor:pointer; position:relative; }
.cafe-chip:hover { border-color:var(--gold); }
.cafe-chip.confirmed { border-left:3px solid var(--green); }
.cafe-chip.rescheduled { border-left:3px solid var(--amber); }
.cafe-chip.franchisee { background:var(--gold-light); border-color:var(--gold); font-weight:700; }
.chip-actions { display:flex; gap:4px; margin-top:6px; flex-wrap:wrap; }
.chip-actions button { flex:1; font-size:9px; padding:4px 5px; border:1px solid var(--grey-300); background:var(--white); cursor:pointer; text-transform:uppercase; letter-spacing:0.02em; font-family:var(--font); font-weight:700; border-radius:2px; }
.chip-actions button:hover { background:var(--grey-100); }
.chip-actions button.confirmBtn { color:var(--green); border-color:var(--green); }
.chip-actions button.rescheduleBtn { color:var(--amber); border-color:var(--amber); }
.chip-actions button.removeBtn { color:var(--red); border-color:var(--red); }
.admin-day-label, .support-day-label { font-size:10px; font-weight:700; text-align:center; padding:8px 2px; }
.admin-day-label { color:var(--gold); }
.support-day-label { color:var(--teal); }
.add-cafe-btn { width:100%; font-size:9.5px; padding:5px; border:1px dashed var(--grey-300); background:transparent; color:var(--grey-500); cursor:pointer; font-family:var(--font); border-radius:2px; }
.add-cafe-btn:hover { border-color:var(--gold); color:var(--black); }
.cafe-search-box { position:relative; }
.cafe-search-results { position:absolute; top:100%; left:0; right:0; background:#fff; border:1px solid var(--grey-300); max-height:160px; overflow-y:auto; z-index:30; box-shadow:0 4px 10px rgba(0,0,0,0.1); }
.cafe-search-results div { padding:7px 9px; font-size:11px; cursor:pointer; border-bottom:1px solid var(--grey-100); }
.cafe-search-results div:hover { background:var(--grey-100); }

@media (max-width: 900px) {
  .week-grid { grid-template-columns: 110px repeat(7, minmax(90px,1fr)); overflow-x:auto; }
  .container { padding: 16px 12px 50px; }
  .kpi-strip { grid-template-columns: repeat(2,1fr); }
}
</style>
</head>

<div class="container" id="app" style="display:none;"></div>
<div class="toast" id="toast"></div>

<script>
window.storage = {
  async get(key) {
    const token = localStorage.getItem('bos_token');
    const res = await fetch('/api/storage/' + encodeURIComponent(key), { headers: token ? { 'Authorization': 'Bearer ' + token } : {} });
    if (res.status === 404) return null;
    if (!res.ok) throw new Error('storage get failed: ' + res.status);
    return res.json();
  },
  async set(key, value) {
    const token = localStorage.getItem('bos_token');
    const res = await fetch('/api/storage/' + encodeURIComponent(key), {
      method: 'POST',
      headers: Object.assign({ 'Content-Type': 'application/json' }, token ? { 'Authorization': 'Bearer ' + token } : {}),
      body: JSON.stringify({ value })
    });
    if (!res.ok) throw new Error('storage set failed: ' + res.status);
    return res.json();
  }
};

async function checkBosSession() {
  const token = localStorage.getItem('bos_token');
  if (!token) return null;
  try {
    const res = await fetch('/api/me', { headers: { 'Authorization': 'Bearer ' + token } });
    if (!res.ok) { localStorage.removeItem('bos_token'); return null; }
    return await res.json();
  } catch (e) { return null; }
}

checkBosSession().then(me => {
  if (!me) {
    document.getElementById('gateMsg').textContent = 'Sign in on the main BOS Dashboard first — this page shares that login.';
    document.getElementById('gateLink').style.display = 'block';
    return;
  }
  document.getElementById('bosGate').style.display = 'none';
  document.getElementById('topNav').style.display = 'flex';
  document.getElementById('app').style.display = 'block';
  window.__ME = me;
  startApp();
});

function toast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg; t.style.display = 'block';
  clearTimeout(window.__toastTimer);
  window.__toastTimer = setTimeout(()=>{ t.style.display='none'; }, 2600);
}

const CADENCE = { local: 20, outlying: 30 };

/* ============================================================
   ROTATION ENGINE
   ============================================================ */
function zonePhaseOffset(zoneName, period) {
  let hash = 0;
  for (let i = 0; i < zoneName.length; i++) hash = (hash * 31 + zoneName.charCodeAt(i)) % 100000;
  return hash % period;
}

function buildPlan(storesWithMeta, horizonDays, slotsPerDay) {
  if (!storesWithMeta.length) return Array.from({ length: horizonDays }, () => []);
  const lastVisited = {};
  storesWithMeta.forEach((s, i) => { lastVisited[s.id] = -Math.round((i / storesWithMeta.length) * s.period); });

  const zoneGroups = {};
  storesWithMeta.forEach(s => { if (s.outlying) (zoneGroups[s.zone] = zoneGroups[s.zone] || []).push(s); });
  Object.keys(zoneGroups).forEach(zone => {
    const period = zoneGroups[zone][0].period;
    const offset = -zonePhaseOffset(zone, period);
    zoneGroups[zone].forEach(s => { lastVisited[s.id] = offset; });
  });
  const localStores = storesWithMeta.filter(s => !s.outlying);

  let activeZone = null, zoneActiveDaysCount = 0, zoneVisitedThisTrip = new Set();
  let fillCursor = 0;
  const plan = [];

  for (let day = 0; day < horizonDays; day++) {
    if (day % 5 === 0) { plan.push([]); continue; } // Monday = admin day

    if (!activeZone) {
      for (const zone of Object.keys(zoneGroups)) {
        if (zoneGroups[zone].some(s => day - lastVisited[s.id] >= s.period)) {
          activeZone = zone; zoneActiveDaysCount = 0; zoneVisitedThisTrip = new Set();
          break;
        }
      }
    }

    const chosen = [];
    if (activeZone) {
      for (const s of zoneGroups[activeZone]) {
        if (chosen.length >= slotsPerDay) break;
        if (!zoneVisitedThisTrip.has(s.id)) chosen.push(s);
      }
      let fillerIdx = 0;
      while (chosen.length < slotsPerDay) {
        chosen.push(zoneGroups[activeZone][fillerIdx % zoneGroups[activeZone].length]);
        fillerIdx++;
      }
    } else {
      const eligible = localStores
        .filter(s => day - lastVisited[s.id] >= s.period)
        .sort((a, b) => ((day - lastVisited[b.id]) / b.period) - ((day - lastVisited[a.id]) / a.period));
      if (eligible.length) chosen.push(eligible[0]);
      while (chosen.length < slotsPerDay) {
        const remaining = eligible.filter(s => !chosen.includes(s));
        if (!remaining.length) break;
        const sameZone = remaining.find(s => s.zone && chosen.some(c => c.zone === s.zone));
        chosen.push(sameZone || remaining[0]);
      }
      while (chosen.length < slotsPerDay) {
        let picked = null;
        for (let tries = 0; tries < localStores.length; tries++) {
          const candidate = localStores[fillCursor % localStores.length];
          fillCursor++;
          if (!chosen.includes(candidate)) { picked = candidate; break; }
        }
        if (!picked) break;
        chosen.push(picked);
      }
    }

    chosen.forEach(s => {
      lastVisited[s.id] = day;
      if (activeZone && s.zone === activeZone) zoneVisitedThisTrip.add(s.id);
    });
    plan.push(chosen.map(s => s.name));

    if (activeZone) {
      zoneActiveDaysCount++;
      const allVisited = zoneGroups[activeZone].every(s => zoneVisitedThisTrip.has(s.id));
      if (zoneActiveDaysCount >= MIN_OUTLYING_DAYS && allVisited) activeZone = null;
    }
  }
  return plan;
}

function allocateStores(allStores, personCount) {
  const zoneGroups = {};
  const locals = [];
  allStores.forEach(s => {
    if (s.outlying) (zoneGroups[s.zone] = zoneGroups[s.zone] || []).push(s);
    else locals.push(s);
  });
  const buckets = Array.from({ length: personCount }, () => []);
  const leastLoaded = () => buckets.map((b, i) => ({ i, len: b.length })).sort((a, b) => a.len - b.len)[0].i;
  Object.values(zoneGroups).sort((a, b) => b.length - a.length).forEach(group => {
    buckets[leastLoaded()].push(...group);
  });
  locals.forEach(s => { buckets[leastLoaded()].push(s); });
  return buckets;
}

function franchiseeVisitPlan(managerKey, horizonDays) {
  const group = REGION_GROUPS[managerKey];
  const groupSiteIds = new Set(SITES.filter(s => group.regions.includes(s.region)).map(s => s.id));
  const relevant = FRANCHISEES.filter(f => f.sites.some(id => groupSiteIds.has(id)));
  const plan = Array.from({ length: horizonDays }, () => []);
  relevant.forEach((f, idx) => {
    let nextDue = Math.round((idx / relevant.length) * FRANCHISEE_PERIOD);
    while (nextDue < horizonDays) {
      if (nextDue % 5 !== 0) {
        const siteId = f.sites.find(id => groupSiteIds.has(id));
        const site = SITES.find(s => s.id === siteId);
        plan[nextDue].push('🤝 ' + f.name + ' (at ' + (site ? site.name : '?') + ')');
      }
      nextDue += FRANCHISEE_PERIOD;
    }
  });
  return plan;
}

/* ============================================================
   BUILD ROSTER (cached once — deterministic from the data + engine)
   ============================================================ */
const ROSTER = {}; // managerKey -> [{label, sites, plan}]
Object.keys(REGION_GROUPS).forEach(key => {
  const group = REGION_GROUPS[key];
  const groupSites = SITES.filter(s => group.regions.includes(s.region));
  const buckets = allocateStores(groupSites, group.supportCount);
  ROSTER[key] = buckets.map((sitesForPerson, i) => {
    const withMeta = sitesForPerson.map(s => ({ id: s.id, name: s.name, zone: s.zone, outlying: s.outlying, period: s.outlying ? CADENCE.outlying : CADENCE.local }));
    return { label: 'FSM ' + (i + 1), sites: sitesForPerson, plan: buildPlan(withMeta, ROTATION_HORIZON, 2) };
  });
});
const FRANCHISEE_PLANS = {};
Object.keys(REGION_GROUPS).forEach(key => { FRANCHISEE_PLANS[key] = franchiseeVisitPlan(key, ROTATION_HORIZON); });

const YEAR_ANCHOR = new Date(2026, 0, 5); // first Monday of 2026 (week 1)
function weekStartDate(weekNum) {
  const d = new Date(YEAR_ANCHOR);
  d.setDate(d.getDate() + (weekNum - 1) * 7);
  return d;
}
function currentWeekNum() {
  const now = new Date();
  const diffDays = Math.round((now - YEAR_ANCHOR) / 86400000);
  return Math.floor(diffDays / 7) + 1;
}
function absoluteWeekdayIndex(weekNum, dayIdx) { return (weekNum - 1) * 5 + dayIdx; } // dayIdx 0..4 = Mon..Fri only feeds the plan array
function fmtShort(d) { return d.toLocaleDateString('en-ZA', { day: '2-digit', month: 'short' }); }
function fmtDayDate(d) { return d.toLocaleDateString('en-ZA', { weekday: 'short' }).toUpperCase() + ' ' + fmtShort(d); }

/* ============================================================
   PERSISTED STATE (overrides + confirmations)
   ============================================================ */
let OVERRIDES = {};   // cellKey -> [{id, text, status}]   status: '' | 'confirmed' | 'rescheduled'
let CONFIRM_LOG = {}; // visitKey -> { confirmedAt, confirmedBy }
let NAME_OVERRIDES = {}; // "managerKey|FSM label" -> assigned person's name
async function loadState() {
  try { const r = await window.storage.get('support-schedule-overrides-v1'); OVERRIDES = JSON.parse((r && r.value) || '{}'); } catch (e) { OVERRIDES = {}; }
  try { const r = await window.storage.get('support-schedule-confirmations-v1'); CONFIRM_LOG = JSON.parse((r && r.value) || '{}'); } catch (e) { CONFIRM_LOG = {}; }
  try { const r = await window.storage.get('support-schedule-names-v1'); NAME_OVERRIDES = JSON.parse((r && r.value) || '{}'); } catch (e) { NAME_OVERRIDES = {}; }
}
async function saveOverrides() { try { await window.storage.set('support-schedule-overrides-v1', JSON.stringify(OVERRIDES)); } catch (e) { toast('Could not save — check connection'); } }
async function saveConfirmations() { try { await window.storage.set('support-schedule-confirmations-v1', JSON.stringify(CONFIRM_LOG)); } catch (e) { toast('Could not save — check connection'); } }
async function saveNameOverrides() { try { await window.storage.set('support-schedule-names-v1', JSON.stringify(NAME_OVERRIDES)); } catch (e) { toast('Could not save — check connection'); } }

function cellKey(managerKey, personLabel, slot) { return managerKey + '|' + personLabel + '|' + slot; }
function visitKey(managerKey, personLabel, slot, cafeName) { return managerKey + '|' + personLabel + '|' + slot + '|' + cafeName; }
// Weekday slots are keyed by their absolute weekday index (a plain number,
// as a string). Weekend slots get their own distinct 'W<week>-SAT'/'-SUN'
// key — dayIdx 5/6 must NEVER be run through absoluteWeekdayIndex, since
// (week-1)*5+6 mathematically collides with the following week's Tuesday
// slot ((week)*5+1) — a Sunday override would silently corrupt next week's
// Tuesday schedule.
function slotKeyFor(weekNum, dayIdx) {
  if (dayIdx === 5) return 'W' + weekNum + '-SAT';
  if (dayIdx === 6) return 'W' + weekNum + '-SUN';
  return String(absoluteWeekdayIndex(weekNum, dayIdx));
}

function getCellEntries(managerKey, personLabel, dayIdx, weekNum, planArr) {
  const slot = slotKeyFor(weekNum, dayIdx);
  const k = cellKey(managerKey, personLabel, slot);
  if (OVERRIDES[k] !== undefined) return OVERRIDES[k];
  if (dayIdx >= 5) return []; // Sat/Sun manual-only, no auto-plan fallback
  const absDay = absoluteWeekdayIndex(weekNum, dayIdx);
  const names = planArr[absDay] || [];
  return names.map((n, i) => ({ id: 'auto' + i, text: n, status: '' }));
}
function getCellEntriesByAbsDay(managerKey, personLabel, absDay, planArr) {
  const k = cellKey(managerKey, personLabel, String(absDay));
  if (OVERRIDES[k] !== undefined) return OVERRIDES[k];
  const names = planArr[absDay] || [];
  return names.map((n, i) => ({ id: 'auto' + i, text: n, status: '' }));
}
function setCellEntries(managerKey, personLabel, dayIdx, weekNum, entries) {
  const slot = slotKeyFor(weekNum, dayIdx);
  OVERRIDES[cellKey(managerKey, personLabel, slot)] = entries;
  saveOverrides();
}
function setCellEntriesByAbsDay(managerKey, personLabel, absDay, entries) {
  OVERRIDES[cellKey(managerKey, personLabel, String(absDay))] = entries;
  saveOverrides();
}

// Scans forward from the day after the given one for the next weekday
// (skipping Mondays, which are always admin-only) where this person has
// fewer than 2 cafés already scheduled — that's where a rescheduled visit
// actually lands, rather than just being labeled "rescheduled" in place.
function findNextOpenSlot(managerKey, personLabel, planArr, fromAbsDay) {
  // The rotation engine deliberately never leaves a working day under-full
  // (every non-Monday day is packed to 2 cafés already), so a day with
  // genuinely spare room is the exception, not the rule. Look for one over
  // the next couple of weeks; if there isn't one, just use the very next
  // working day as an extra (3rd) stop rather than reporting failure —
  // a real reschedule usually does mean "tack it onto a day I'm already
  // going to be working," even if that makes it a slightly fuller day.
  let fallback = null;
  for (let absDay = fromAbsDay + 1; absDay < fromAbsDay + 15; absDay++) {
    if (absDay % 5 === 0) continue; // Monday admin day
    if (fallback === null) fallback = absDay;
    const entries = getCellEntriesByAbsDay(managerKey, personLabel, absDay, planArr);
    if (entries.length < 2) return absDay;
  }
  return fallback;
}

// Merges persisted overrides into the raw deterministic plan, so the Café
// Directory (and anything else counting "scheduled visits") reflects actual
// reschedules/additions/removals instead of just the untouched rotation.
function getEffectivePlan(managerKey, personLabel, planArr) {
  const effective = planArr.map(names => names.slice());
  const prefix = managerKey + '|' + personLabel + '|';
  Object.keys(OVERRIDES).forEach(k => {
    if (!k.startsWith(prefix)) return;
    const absDay = parseInt(k.slice(prefix.length), 10);
    if (isNaN(absDay) || absDay % 5 === 0) return; // Sat/Sun overrides don't feed the weekday plan array
    effective[absDay] = OVERRIDES[k].map(e => e.text);
  });
  return effective;
}

/* ============================================================
   TAB: WEEKLY SCHEDULE
   ============================================================ */
function renderWeeklyTab() {
  const body = document.getElementById('tabBody');
  const group = REGION_GROUPS[ACTIVE_MANAGER];
  const weekStart = weekStartDate(VIEW_WEEK);
  const days = Array.from({ length: 7 }, (_, i) => { const d = new Date(weekStart); d.setDate(weekStart.getDate() + i); return d; });
  const roster = ROSTER[ACTIVE_MANAGER];
  const franchisePlan = FRANCHISEE_PLANS[ACTIVE_MANAGER];

  // KPI computation for this week
  let scheduledCount = 0, confirmedCount = 0, rescheduledCount = 0;
  roster.forEach(person => {
    for (let i = 0; i < 5; i++) {
      const entries = getCellEntries(ACTIVE_MANAGER, person.label, i, VIEW_WEEK, person.plan);
      entries.forEach(e => {
        scheduledCount++;
        if (e.status === 'confirmed') confirmedCount++;
        if (e.status === 'rescheduled') rescheduledCount++;
      });
    }
  });
  const groupSites = SITES.filter(s => group.regions.includes(s.region));

  body.innerHTML = `
    <div class="segmented" id="mgrTabs">
      <button class="segmented-btn ${ACTIVE_MANAGER==='Franlo'?'active':''}" data-mgr="Franlo">Franlo's Team (WC · EC · Namibia)</button>
      <button class="segmented-btn ${ACTIVE_MANAGER==='Tarryn'?'active':''}" data-mgr="Tarryn">Tarryn's Team (GP · LP · MP · FS · KZN · NC · NW)</button>
    </div>
    <div class="kpi-strip">
      <div><div class="card-label">Cafés in Region</div><div class="card-value">${groupSites.length}</div></div>
      <div><div class="card-label">Scheduled This Week</div><div class="card-value">${scheduledCount}</div></div>
      <div><div class="card-label">Confirmed</div><div class="card-value" style="color:var(--green);">${confirmedCount}</div></div>
      <div><div class="card-label">Rescheduled</div><div class="card-value" style="color:var(--amber);">${rescheduledCount}</div></div>
    </div>
    <div class="card" style="padding:0;">
      <div style="display:flex;justify-content:space-between;align-items:center;padding:14px 18px;border-bottom:1px solid var(--grey-200);">
        <div class="section-title" style="margin-bottom:0;">Week ${VIEW_WEEK} · ${fmtShort(days[0])} – ${fmtShort(days[6])}</div>
        <div style="display:flex;gap:8px;">
          <button class="btn btn-outline btn-mini" id="prevWeekBtn">&larr; Prev</button>
          <button class="btn btn-outline btn-mini" id="thisWeekBtn">This Week</button>
          <button class="btn btn-outline btn-mini" id="nextWeekBtn">Next &rarr;</button>
        </div>
      </div>
      <div style="overflow-x:auto;">
        <div class="week-grid" id="weekGrid"></div>
      </div>
    </div>
    <div style="font-size:10px;color:var(--grey-500);padding:8px 2px;">Local cafés ≈ monthly · outlying ≈ every 6 weeks (minimum 3 consecutive days per outlying trip) · franchisee check-ins ≈ quarterly. Click any café to confirm, reschedule, or remove it. Changes save automatically.</div>
  `;
  document.querySelectorAll('#mgrTabs .segmented-btn').forEach(b => b.addEventListener('click', () => { ACTIVE_MANAGER = b.dataset.mgr; VIEW_WEEK = currentWeekNum(); render(); }));
  document.getElementById('prevWeekBtn').addEventListener('click', () => { VIEW_WEEK--; renderWeeklyTab(); });
  document.getElementById('thisWeekBtn').addEventListener('click', () => { VIEW_WEEK = currentWeekNum(); renderWeeklyTab(); });
  document.getElementById('nextWeekBtn').addEventListener('click', () => { VIEW_WEEK++; renderWeeklyTab(); });

  renderWeekGrid(days, roster, franchisePlan, groupSites);
}

const MANAGER_LABEL = '__MANAGER__';
function displayLabel(managerKey, personLabel) {
  if (personLabel === MANAGER_LABEL) return managerKey;
  const name = NAME_OVERRIDES[managerKey + '|' + personLabel];
  return name ? personLabel + ' — ' + name : personLabel;
}

function renderWeekGrid(days, roster, franchisePlan, groupSites) {
  const grid = document.getElementById('weekGrid');
  let html = `<div class="week-grid-head"><div>Support Member</div>`;
  days.forEach((d, i) => {
    html += `<div>${d.toLocaleDateString('en-ZA',{weekday:'short'}).toUpperCase()}<span class="date-sub">${fmtShort(d)}</span></div>`;
  });
  html += `</div>`;

  const franchiseeOptions = FRANCHISEES
    .filter(f => f.sites.some(id => SITES.find(s => s.id === id && REGION_GROUPS[ACTIVE_MANAGER].regions.includes(s.region))))
    .map(f => {
      const siteId = f.sites.find(id => SITES.find(s => s.id === id));
      const site = SITES.find(s => s.id === siteId);
      return '🤝 ' + f.name + ' (at ' + (site ? site.name : '?') + ')';
    });

  html += renderPersonRow(ACTIVE_MANAGER, MANAGER_LABEL, 'Regional Manager', franchisePlan, franchiseeOptions);
  roster.forEach(person => {
    html += renderPersonRow(ACTIVE_MANAGER, person.label, person.sites.length + ' cafés assigned', person.plan, person.sites.map(s => s.name));
  });

  grid.innerHTML = html;
  wireWeekGridEvents(roster, groupSites, franchisePlan);
  wireFsmNameEditing();
}

function renderPersonRow(managerKey, personLabel, subtitle, planArr, addOptions) {
  const isManager = personLabel === MANAGER_LABEL;
  let html = `<div class="fsm-row-name">
      <span class="${isManager ? '' : 'fsm-name-edit'}" ${isManager ? '' : `data-editname="${managerKey}|${personLabel}"`}>${displayLabel(managerKey, personLabel)}</span>
      <div class="sub">${subtitle}</div>
    </div>`;
  for (let i = 0; i < 7; i++) {
    const entries = getCellEntries(managerKey, personLabel, i, VIEW_WEEK, planArr);
    const slot = slotKeyFor(VIEW_WEEK, i);
    const ck = cellKey(managerKey, personLabel, slot);
    let cellHtml = '';
    if (entries.length === 0 && i === 0) cellHtml = `<div class="admin-day-label">Admin Day</div>`;
    if (entries.length === 0 && i >= 5) cellHtml = `<div class="support-day-label">Support Day</div>`;
    entries.forEach((e, idx) => {
      const chipId = ck + '::' + idx;
      const isOpen = OPEN_CHIP === chipId;
      const chipClass = isManager ? 'cafe-chip franchisee' : ('cafe-chip ' + (e.status || ''));
      cellHtml += `<div class="${chipClass}" data-chip="${chipId}" data-mgr="${managerKey}" data-person="${personLabel}" data-week="${VIEW_WEEK}" data-dayidx="${i}" data-idx="${idx}">
        ${e.text}
        ${e.status==='confirmed' ? '<span class="badge green" style="margin-left:4px;">✓</span>' : ''}
        ${e.status==='rescheduled' ? '<span class="badge amber" style="margin-left:4px;">↻</span>' : ''}
        ${isOpen ? `<div class="chip-actions">
          <button class="confirmBtn" data-act="confirm" data-mgr="${managerKey}" data-person="${personLabel}" data-week="${VIEW_WEEK}" data-dayidx="${i}" data-idx="${idx}">Confirm</button>
          <button class="rescheduleBtn" data-act="reschedule" data-mgr="${managerKey}" data-person="${personLabel}" data-week="${VIEW_WEEK}" data-dayidx="${i}" data-idx="${idx}">Reschedule</button>
          <button class="removeBtn" data-act="remove" data-mgr="${managerKey}" data-person="${personLabel}" data-week="${VIEW_WEEK}" data-dayidx="${i}" data-idx="${idx}">Remove</button>
        </div>` : ''}
      </div>`;
    });
    const addLabel = isManager ? '+ Add Franchisee Visit' : '+ Add Café';
    cellHtml += `<button class="add-cafe-btn" data-mgr="${managerKey}" data-person="${personLabel}" data-week="${VIEW_WEEK}" data-dayidx="${i}">${addLabel}</button>`;
    html += `<div class="day-cell">${cellHtml}</div>`;
  }
  return html;
}

function wireWeekGridEvents(roster, groupSites, franchisePlan) {
  function planFor(personLabel) {
    return personLabel === MANAGER_LABEL ? franchisePlan : (roster.find(p => p.label === personLabel) || {}).plan;
  }
  document.querySelectorAll('.cafe-chip[data-chip]').forEach(chip => {
    chip.addEventListener('click', (e) => {
      if (e.target.closest('.chip-actions')) return;
      OPEN_CHIP = OPEN_CHIP === chip.dataset.chip ? null : chip.dataset.chip;
      renderWeeklyTab();
    });
  });
  document.querySelectorAll('[data-act]').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      const mgrKey = btn.dataset.mgr, personLabel = btn.dataset.person;
      const weekNum = parseInt(btn.dataset.week, 10), dayIdx = parseInt(btn.dataset.dayidx, 10);
      const idx = parseInt(btn.dataset.idx, 10), act = btn.dataset.act;
      const plan = planFor(personLabel);
      let entries = getCellEntries(mgrKey, personLabel, dayIdx, weekNum, plan).slice();
      const absDay = absoluteWeekdayIndex(weekNum, dayIdx);

      if (act === 'confirm') {
        entries[idx] = Object.assign({}, entries[idx], { status: 'confirmed' });
        const vk = visitKey(mgrKey, personLabel, slotKeyFor(weekNum, dayIdx), entries[idx].text);
        CONFIRM_LOG[vk] = { confirmedAt: new Date().toISOString(), confirmedBy: window.__ME.displayName || window.__ME.username };
        saveConfirmations();
        setCellEntries(mgrKey, personLabel, dayIdx, weekNum, entries);
        toast('Visit confirmed');
      } else if (act === 'reschedule') {
        // Actually move it: pull it out of today's slot and drop it into the
        // next open day in this person's own cycle (first weekday, skipping
        // Mondays, where they have fewer than 2 cafés already) — rather than
        // just slapping a "rescheduled" label on the same day. Works the
        // same way for a franchisee visit on the manager's own row.
        const moved = entries[idx];
        entries.splice(idx, 1);
        setCellEntries(mgrKey, personLabel, dayIdx, weekNum, entries);
        const targetAbsDay = findNextOpenSlot(mgrKey, personLabel, plan, absDay);
        if (targetAbsDay === null) {
          toast('No open slot found in the next few weeks — try again later');
        } else {
          const targetEntries = getCellEntriesByAbsDay(mgrKey, personLabel, targetAbsDay, plan).slice();
          targetEntries.push({ id: 'resched' + Date.now(), text: moved.text, status: 'rescheduled' });
          setCellEntriesByAbsDay(mgrKey, personLabel, targetAbsDay, targetEntries);
          const targetWeek = Math.floor(targetAbsDay / 5) + 1;
          const targetDate = absDayToDate(targetAbsDay);
          toast('Rescheduled to ' + fmtDayDate(targetDate) + (targetWeek !== weekNum ? ' (week ' + targetWeek + ')' : ''));
        }
      } else if (act === 'remove') {
        entries.splice(idx, 1);
        setCellEntries(mgrKey, personLabel, dayIdx, weekNum, entries);
        toast('Visit removed');
      }
      OPEN_CHIP = null;
      renderWeeklyTab();
    });
  });
  document.querySelectorAll('.add-cafe-btn').forEach(btn => {
    btn.addEventListener('click', (e) => {
      const mgrKey = btn.dataset.mgr, personLabel = btn.dataset.person;
      const weekNum = parseInt(btn.dataset.week, 10), dayIdx = parseInt(btn.dataset.dayidx, 10);
      const isManager = personLabel === MANAGER_LABEL;
      const existing = btn.parentElement.querySelector('.cafe-search-box');
      if (existing) { existing.remove(); return; }
      const box = document.createElement('div');
      box.className = 'cafe-search-box';
      box.innerHTML = `<input type="text" placeholder="${isManager ? 'Search franchisee...' : 'Search café...'}" style="width:100%;font-size:11px;padding:6px;border:1px solid var(--grey-300);"><div class="cafe-search-results" style="display:none;"></div>`;
      btn.parentElement.insertBefore(box, btn);
      const input = box.querySelector('input');
      const results = box.querySelector('.cafe-search-results');
      const searchPool = isManager
        ? FRANCHISEES.filter(f => f.sites.some(id => SITES.find(s => s.id === id && REGION_GROUPS[mgrKey].regions.includes(s.region))))
            .map(f => { const site = SITES.find(s => s.id === f.sites[0]); return '🤝 ' + f.name + ' (at ' + (site ? site.name : '?') + ')'; })
        : groupSites.map(s => s.name);
      input.addEventListener('input', () => {
        const q = input.value.trim().toLowerCase();
        if (!q) { results.style.display = 'none'; return; }
        const matches = searchPool.filter(name => name.toLowerCase().includes(q)).slice(0, 15);
        results.innerHTML = matches.map(name => `<div data-name="${name.replace(/"/g,'&quot;')}">${name}</div>`).join('');
        results.style.display = matches.length ? 'block' : 'none';
        results.querySelectorAll('div').forEach(opt => opt.addEventListener('mousedown', (ev) => {
          ev.preventDefault();
          const plan = planFor(personLabel);
          const entries = getCellEntries(mgrKey, personLabel, dayIdx, weekNum, plan).slice();
          entries.push({ id: 'manual' + Date.now(), text: opt.dataset.name, status: '' });
          setCellEntries(mgrKey, personLabel, dayIdx, weekNum, entries);
          toast(isManager ? 'Franchisee visit added' : 'Café added');
          renderWeeklyTab();
        }));
      });
      input.focus();
    });
  });
}

function wireFsmNameEditing() {
  document.querySelectorAll('.fsm-name-edit').forEach(el => {
    el.addEventListener('click', () => {
      const [mgrKey, personLabel] = el.dataset.editname.split('|');
      const current = NAME_OVERRIDES[mgrKey + '|' + personLabel] || '';
      const wrap = el.parentElement;
      wrap.innerHTML = `<input type="text" class="fsm-name-input" value="${current.replace(/"/g,'&quot;')}" placeholder="Assign a name..." style="font-size:12px;font-weight:700;width:100%;padding:3px 4px;border:1px solid var(--gold);">`;
      const input = wrap.querySelector('input');
      input.focus(); input.select();
      const commit = () => {
        const val = input.value.trim();
        if (val) NAME_OVERRIDES[mgrKey + '|' + personLabel] = val;
        else delete NAME_OVERRIDES[mgrKey + '|' + personLabel];
        saveNameOverrides();
        renderWeeklyTab();
      };
      input.addEventListener('blur', commit);
      input.addEventListener('keydown', (e) => { if (e.key === 'Enter') input.blur(); });
    });
  });
}

/* ============================================================
   TAB: CAFÉ DIRECTORY
   ============================================================ */
function cafeVisitStats(site) {
  // Find which roster bucket (if any) this site belongs to, across both managers
  for (const mgrKey of Object.keys(ROSTER)) {
    const person = ROSTER[mgrKey].find(p => p.sites.some(s => s.id === site.id));
    if (person) {
      const effectivePlan = getEffectivePlan(mgrKey, person.label, person.plan);
      const scheduledDays = [];
      effectivePlan.forEach((names, absDay) => { if (names.includes(site.name)) scheduledDays.push(absDay); });
      return { managerKey: mgrKey, personLabel: person.label, scheduledDays };
    }
  }
  return { managerKey: null, personLabel: null, scheduledDays: [] };
}
function absDayToDate(absDay) {
  const weekNum = Math.floor(absDay / 5) + 1;
  const dayIdx = absDay % 5;
  const d = weekStartDate(weekNum);
  d.setDate(d.getDate() + dayIdx);
  return d;
}
// The plan's absDay counts only weekdays (5 per week), so it can't be
// compared against a raw calendar-day difference from YEAR_ANCHOR (which
// includes weekends) — that mismatch was under-counting "today" by however
// many weekends had passed, making genuinely-upcoming visits look like
// they'd already happened. This converts "now" into that same weekday-only
// numbering instead.
function nowAbsDayIndex() {
  const wn = currentWeekNum();
  const ws = weekStartDate(wn);
  const diffDays = Math.floor((new Date() - ws) / 86400000); // 0=Mon..6=Sun within this week
  const dayIdx = Math.min(Math.max(diffDays, 0), 4);
  return absoluteWeekdayIndex(wn, dayIdx);
}
function confirmedVisitsForSite(site, managerKey, personLabel) {
  const prefix = managerKey + '|' + personLabel + '|';
  return Object.entries(CONFIRM_LOG)
    .filter(([k]) => k.startsWith(prefix) && k.endsWith('|' + site.name))
    .map(([k, v]) => v);
}
function currentMonthEnd() {
  const now = new Date();
  return new Date(now.getFullYear(), now.getMonth() + 1, 0, 23, 59, 59);
}
function isThisMonth(date) {
  const now = new Date();
  return date.getFullYear() === now.getFullYear() && date.getMonth() === now.getMonth();
}
// "At risk of not being visited in cycle" — the next scheduled visit is
// further away than this café's own cadence allows (outlying ≈ 6 weeks,
// everything else ≈ monthly), or there's no upcoming visit at all. This
// only happens if a manual remove/reschedule has left a genuine gap, since
// the rotation engine itself never lets a café go this long unvisited.
function isAtRisk(site, upcomingDays, nowAbsDay) {
  const cadence = site.outlying ? CADENCE.outlying : CADENCE.local;
  if (!upcomingDays.length) return true;
  return (upcomingDays[0] - nowAbsDay) > cadence;
}

function fsmOptionsFor(managerFilter) {
  const keys = managerFilter ? [managerFilter] : Object.keys(REGION_GROUPS);
  const opts = [];
  keys.forEach(mk => ROSTER[mk].forEach(p => opts.push({ value: mk + '|' + p.label, label: mk + ' · ' + displayLabel(mk, p.label) })));
  return opts;
}

      <select id="dirMgrFilter">
        <option value="">All Regions</option>
        <option value="Franlo" ${DIR_FILTER_MANAGER==='Franlo'?'selected':''}>Franlo's Team (WC/EC/Namibia)</option>
        <option value="Tarryn" ${DIR_FILTER_MANAGER==='Tarryn'?'selected':''}>Tarryn's Team (GP/LP/MP/FS/KZN/NC/NW)</option>
      </select>
      <select id="dirFsmFilter"><option value="">All Support Members</option></select>
      <input type="text" id="dirSearch" placeholder="Search café..." value="${DIR_SEARCH.replace(/"/g,'&quot;')}">
      <select id="dirCafeSelect" style="min-width:220px;">
        <option value="">— Jump to a café —</option>
        ${allSiteNames.map(s => `<option value="${s.id}" ${DIR_EXPANDED===s.id?'selected':''}>${s.name}</option>`).join('')}
      </select>
    </div>
    <div id="dirExpandedPanel"></div>
    <div class="card" style="padding:0;">
      <table class="data-table">
        <thead><tr><th>Café</th><th>Region</th><th>Support Member</th><th>Scheduled (this month)</th><th>Confirmed / Actual</th><th>Next Visit</th><th>Status</th></tr></thead>
        <tbody id="dirTableBody"></tbody>
      </table>
    </div>
  `;
  function refreshFsmOptions() {
    const sel = document.getElementById('dirFsmFilter');
    const opts = fsmOptionsFor(DIR_FILTER_MANAGER);
    sel.innerHTML = `<option value="">All Support Members</option>` + opts.map(o => `<option value="${o.value}" ${DIR_FILTER_FSM===o.value?'selected':''}>${o.label}</option>`).join('');
  }
  refreshFsmOptions();
  document.getElementById('dirMgrFilter').addEventListener('change', (e) => { DIR_FILTER_MANAGER = e.target.value; DIR_FILTER_FSM = ''; refreshFsmOptions(); renderDirTable(); });
  document.getElementById('dirFsmFilter').addEventListener('change', (e) => { DIR_FILTER_FSM = e.target.value; renderDirTable(); });
  document.getElementById('dirSearch').addEventListener('input', (e) => { DIR_SEARCH = e.target.value; renderDirTable(); });
  document.getElementById('dirCafeSelect').addEventListener('change', (e) => { DIR_EXPANDED = e.target.value || null; renderDirExpanded(); });
  renderDirTable();
}

function renderDirTable() {
  const tbody = document.getElementById('dirTableBody');
  const q = DIR_SEARCH.trim().toLowerCase();
  let sites = SITES.slice();
  if (DIR_FILTER_MANAGER) sites = sites.filter(s => s.manager === DIR_FILTER_MANAGER);
  if (DIR_FILTER_FSM) {
    const [fmgr, flabel] = DIR_FILTER_FSM.split('|');
    sites = sites.filter(s => {
      const stats = cafeVisitStats(s);
      return stats.managerKey === fmgr && stats.personLabel === flabel;
    });
  }
  if (q) sites = sites.filter(s => s.name.toLowerCase().includes(q));
  sites.sort((a, b) => a.name.localeCompare(b.name));

  const nowAbsDay = nowAbsDayIndex();
  const monthEnd = currentMonthEnd();

  let kpiScheduled = 0, kpiConfirmed = 0, kpiRescheduled = 0, kpiAtRisk = 0;
  const rows = sites.map(site => {
    const stats = cafeVisitStats(site);
    const upcoming = stats.scheduledDays.filter(d => d >= nowAbsDay);
    const scheduledThisMonth = upcoming.filter(d => absDayToDate(d) <= monthEnd);
    const confirmed = confirmedVisitsForSite(site, stats.managerKey, stats.personLabel);
    const confirmedThisMonth = confirmed.filter(c => isThisMonth(new Date(c.confirmedAt)));
    const rescheduledThisMonth = scheduledThisMonth.filter(d => {
      const entries = stats.managerKey ? getCellEntriesByAbsDay(stats.managerKey, stats.personLabel, d, ROSTER[stats.managerKey].find(p=>p.label===stats.personLabel).plan) : [];
      return entries.some(e => e.text === site.name && e.status === 'rescheduled');
    });
    const atRisk = isAtRisk(site, upcoming, nowAbsDay);
    kpiScheduled += scheduledThisMonth.length;
    kpiConfirmed += confirmedThisMonth.length;
    kpiRescheduled += rescheduledThisMonth.length;
    if (atRisk) kpiAtRisk++;
    const nextDay = upcoming.length ? upcoming[0] : null;
    return { site, stats, scheduledThisMonth, confirmed, nextDay, atRisk };
  });

  document.getElementById('dirKpiStrip').innerHTML = `
    <div><div class="card-label">Scheduled (This Month)</div><div class="card-value">${kpiScheduled}</div></div>
    <div><div class="card-label">Confirmed (This Month)</div><div class="card-value" style="color:var(--green);">${kpiConfirmed}</div></div>
    <div><div class="card-label">Rescheduled (This Month)</div><div class="card-value" style="color:var(--amber);">${kpiRescheduled}</div></div>
    <div><div class="card-label">At Risk of Missing Cycle</div><div class="card-value" style="color:var(--red);">${kpiAtRisk}</div></div>
  `;

  tbody.innerHTML = rows.map(({ site, stats, scheduledThisMonth, confirmed, nextDay, atRisk }) => `<tr data-site="${site.id}" style="${atRisk ? 'background:var(--red-bg);' : ''}">
      <td><b>${site.name}</b></td>
      <td>${site.region}${site.outlying ? ' <span class="badge amber" style="margin-left:4px;">outlying</span>' : ''}</td>
      <td>${stats.personLabel ? (stats.managerKey + ' · ' + displayLabel(stats.managerKey, stats.personLabel)) : '—'}</td>
      <td>${scheduledThisMonth.length}</td>
      <td>${confirmed.length ? `<span class="badge green">${confirmed.length} confirmed</span>` : '<span class="badge grey">0 confirmed</span>'}</td>
      <td>${nextDay !== null ? fmtShort(absDayToDate(nextDay)) : '—'}</td>
      <td>${atRisk ? '<span class="badge red">AT RISK</span>' : '<span class="badge green">ON TRACK</span>'}</td>
    </tr>`).join('') || '<tr><td colspan="7" class="empty-state">No cafés match this filter.</td></tr>';

  document.querySelectorAll('#dirTableBody tr[data-site]').forEach(row => {
    row.addEventListener('click', () => {
      DIR_EXPANDED = DIR_EXPANDED === row.dataset.site ? null : row.dataset.site;
      const sel = document.getElementById('dirCafeSelect');
      if (sel) sel.value = DIR_EXPANDED || '';
      renderDirExpanded();
    });
  });
  renderDirExpanded();
}

function renderDirExpanded() {
  const panel = document.getElementById('dirExpandedPanel');
  if (!DIR_EXPANDED) { panel.innerHTML = ''; return; }
  const site = SITES.find(s => s.id === DIR_EXPANDED);
  if (!site) { panel.innerHTML = ''; return; }
  const stats = cafeVisitStats(site);
  const nowAbsDay = nowAbsDayIndex();
  const confirmed = confirmedVisitsForSite(site, stats.managerKey, stats.personLabel);
  const upcoming = stats.scheduledDays.filter(d => d >= nowAbsDay).slice(0, 10);
  const past = stats.scheduledDays.filter(d => d < nowAbsDay).slice(-5);

  panel.innerHTML = `
    <div class="card">
      <div class="section-title">${site.name} — Visit History &amp; Schedule</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;">
        <div>
          <div style="font-size:10px;font-weight:700;color:var(--grey-500);text-transform:uppercase;margin-bottom:8px;">Confirmed / Actual Visits</div>
          ${confirmed.length ? confirmed.map(c => `<div style="font-size:12px;padding:5px 0;border-bottom:1px solid var(--grey-200);">${new Date(c.confirmedAt).toLocaleDateString('en-ZA')} <span style="color:var(--grey-500);">— by ${c.confirmedBy}</span></div>`).join('') : '<div class="empty-state">No confirmed visits logged yet.</div>'}
        </div>
        <div>
          <div style="font-size:10px;font-weight:700;color:var(--grey-500);text-transform:uppercase;margin-bottom:8px;">Upcoming Scheduled Visits</div>
          ${upcoming.length ? upcoming.map(d => `<div style="font-size:12px;padding:5px 0;border-bottom:1px solid var(--grey-200);">${fmtDayDate(absDayToDate(d))}</div>`).join('') : '<div class="empty-state">Nothing scheduled — check the café is still assigned to a support member.</div>'}
        </div>
      </div>
      <div style="margin-top:10px;font-size:10px;color:var(--grey-500);">Assigned to: ${stats.managerKey || '—'} team · ${stats.personLabel ? displayLabel(stats.managerKey, stats.personLabel) : '—'} · Zone: ${site.zone} · Franchisee: ${site.franchisee || '—'}</div>
    </div>
  `;
}
</script>
</body>
</html>
