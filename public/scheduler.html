// Real backend replacement for the claude.ai-only window.storage API —
// backed by BOS's own Postgres-based generic key/value storage endpoint.
window.storage = {
  async get(key) {
    const token = localStorage.getItem('bos_token');
    const res = await fetch('/api/storage/' + encodeURIComponent(key), { headers: token ? { 'Authorization': 'Bearer ' + token } : {} });
    if (res.status === 404) return null;
    if (!res.ok) throw new Error('storage get failed: ' + res.status);
    return res.json();
  },
  async set(key, value) {
    const token = localStorage.getItem('bos_token');
    const res = await fetch('/api/storage/' + encodeURIComponent(key), {
      method: 'POST',
      headers: Object.assign({ 'Content-Type': 'application/json' }, token ? { 'Authorization': 'Bearer ' + token } : {}),
      body: JSON.stringify({ value })
    });
    if (!res.ok) throw new Error('storage set failed: ' + res.status);
    return res.json();
  }
};

const FRANCHISEE_MEETING_USERS = ['tarryn', 'franlo'];

function personCanSeeFranchisees(username, displayName) {
  const u = (username || '').toLowerCase();
  const d = (displayName || '').toLowerCase();
  return FRANCHISEE_MEETING_USERS.some(name => u.includes(name) || d.includes(name));
}

async function checkBosSession() {
  const token = localStorage.getItem('bos_token');
  if (!token) return null;
  try {
    const res = await fetch('/api/me', { headers: { 'Authorization': 'Bearer ' + token } });
    if (!res.ok) { localStorage.removeItem('bos_token'); return null; }
    return await res.json();
  } catch (e) { return null; }
}

// Kick off the session check immediately; the React app (below) awaits this
// same promise before rendering anything, instead of relying on dynamically
// injecting and re-transforming a <script type="text/babel"> tag after the
// fact — that approach was unreliable and could leave the page stuck on
// "Loading..." with no visible error if the manual Babel step silently
// failed.
window.__bosSessionPromise = checkBosSession().then(me => {
  if (!me) {
    document.getElementById('gateMsg').textContent = 'Sign in on the main BOS Dashboard first — this page shares that login.';
    document.getElementById('gateLink').style.display = 'block';
    return null;
  }
  window.BOS_ROLE = me.role;
  window.BOS_USERNAME = me.username;
  window.BOS_DISPLAY_NAME = me.displayName || '';
  window.BOS_CAN_SEE_FRANCHISEES = personCanSeeFranchisees(me.username, me.displayName);

  document.getElementById('bosGate').style.display = 'none';
  document.getElementById('topBar').style.display = 'flex';
  document.getElementById('whoBadge').textContent = (me.displayName || me.username) + ' · ' + me.role.toUpperCase() +
    (window.BOS_CAN_SEE_FRANCHISEES ? '' : ' · Franchisee meetings hidden (Tarryn/Franlo only)');
  return me;
});
</script>

// ─── WEEK HELPERS ─────────────────────────────────────────────────────────────
const ALL_WEEKS = Array.from({length:52},(_,i)=>i+1).filter(w=>w>=MIN_WEEK);

function isoWeek(date) {
  const d=new Date(date); d.setHours(0,0,0,0);
  d.setDate(d.getDate()+3-(d.getDay()+6)%7);
  const w1=new Date(d.getFullYear(),0,4);
  return 1+Math.round(((d-w1)/86400000-3+(w1.getDay()+6)%7)/7);
}
function weekDates(year,week) {
  const jan4=new Date(year,0,4);
  const w1mon=new Date(jan4); w1mon.setDate(jan4.getDate()-(jan4.getDay()+6)%7);
  const mon=new Date(w1mon); mon.setDate(w1mon.getDate()+(week-1)*7);
  const fri=new Date(mon); fri.setDate(mon.getDate()+4);
  return {start:mon,end:fri};
}
function weekKey(year,week){return `${year}-W${String(week).padStart(2,"0")}`;}
function parseWeek(k){return parseInt(k.split("-W")[1]);}
function weekToQuarter(year,week){
  const m=weekDates(year,week).start.getMonth();
  if(m>=2&&m<=4) return 0; if(m>=5&&m<=7) return 1;
  if(m>=8&&m<=10) return 2; return 3;
}
function weeksForQuarter(qi){return ALL_WEEKS.filter(w=>weekToQuarter(YEAR,w)===qi);}
function weeksForMonth(month){return ALL_WEEKS.filter(w=>weekDates(YEAR,w).start.getMonth()+1===month);}
function fmtShort(d){return d.toLocaleDateString("en-ZA",{day:"numeric",month:"short"});}
function fmtLong(d){return d.toLocaleDateString("en-ZA",{day:"numeric",month:"long",year:"numeric"});}
function fmtTime(decimal){
  const h=Math.floor(decimal);
  const m=Math.round((decimal-h)*60);
  return `${String(h).padStart(2,"0")}:${String(m).padStart(2,"0")}`;
}

// ─── SCHEDULE BUILDER ─────────────────────────────────────────────────────────
function buildSchedule() {
  const sched={};
  const ensure=k=>{if(!sched[k])sched[k]=[];};
  const qWeeks=[0,1,2,3].map(qi=>weeksForQuarter(qi));

  // ── Out-of-town trips ──
  // GR: 4 days Tue–Fri (5 stores)
  // EC: 3 days Tue–Thu (1 store/day)
  // Namibia: 2 days Thu+Fri (1 store/day)
  // Springbok: 1 day Tue
  const GR_SCHED=[{id:"HBos",day:"Tue"},{id:"YS",day:"Wed"},{id:"SKXS",day:"Wed"},{id:"MSC",day:"Thu"},{id:"YC",day:"Fri"}];
  const EC_SCHED=[{id:"VP",day:"Tue"},{id:"WPK",day:"Wed"},{id:"BWK",day:"Thu"}];
  const NAM_SCHED=[{id:"TG",day:"Thu"},{id:"FNB",day:"Fri"}];

  const travelWeeks=new Set();

  [0,1,2,3].forEach(qi=>{
    Object.entries(TRIP_MONTHS[qi]).forEach(([zone,month])=>{
      const mw=weeksForMonth(month);
      let wNum;
      if(qi===1&&month===7&&zone==="GardenRoute")      wNum=mw[0]||mw[0];
      else if(qi===1&&month===7&&zone==="EasternCape") wNum=mw[2]||mw[mw.length-1];
      else if(zone==="Springbok")                      wNum=mw[2]||mw[mw.length-1];
      else                                             wNum=mw[1]||mw[0];
      const k=weekKey(YEAR,wNum);
      travelWeeks.add(k);
      ensure(k);
      let items=[];
      if(zone==="GardenRoute")  items=GR_SCHED;
      else if(zone==="EasternCape") items=EC_SCHED;
      else if(zone==="Namibia") items=NAM_SCHED;
      else if(zone==="Springbok") items=[{id:"SBKXS",day:"Tue"}];
      items.forEach(({id,day})=>{
        const site=SITE_MAP[id]; if(!site) return;
        sched[k].push({type:"visit",siteId:site.id,siteName:site.name,siteType:site.type,
          region:site.region,zone:site.zone,address:site.address,fid:site.fid,
          scheduledDay:day,confirmed:false,outOfTown:true});
      });
    });
  });

  // ── Monday admin every week ──
  ALL_WEEKS.forEach(w=>{
    const k=weekKey(YEAR,w); ensure(k);
    ["ND","PWXS"].forEach(id=>{
      const site=SITE_MAP[id]; if(!site) return;
      sched[k].push({type:"visit",siteId:site.id,siteName:site.name,siteType:site.type,
        region:site.region,zone:site.zone,address:site.address,fid:site.fid,
        scheduledDay:"Mon",confirmed:false});
    });
  });

  // ── Standalone day trips: Langebaan (Tue) and Hermanus (Thu) ──
  [1,2,3].forEach(qi=>{
    const avail=qWeeks[qi];
    [{zone:"WestCoast",id:"LMXS",day:"Tue",offset:4},
     {zone:"Overberg",id:"HMKK",day:"Thu",offset:7}].forEach(({id,day,offset})=>{
      const wNum=avail[offset%avail.length];
      if(!wNum) return;
      const k=weekKey(YEAR,wNum); ensure(k);
      const site=SITE_MAP[id]; if(!site) return;
      sched[k].push({type:"visit",siteId:site.id,siteName:site.name,siteType:site.type,
        region:site.region,zone:site.zone,address:site.address,fid:site.fid,
        scheduledDay:day,confirmed:false});
    });
  });

  // ── Local sites: 2 per day in geo pairs, Q2–Q4 only ──
  [1,2,3].forEach(qi=>{
    const availWeeks=qWeeks[qi];
    const daySlots={};
    Object.keys(GEO_DAY_SITES).forEach(day=>{daySlots[day]=[...availWeeks];});
    Object.entries(GEO_DAY_SITES).forEach(([day,siteIds])=>{
      let slotIdx=0;
      for(let i=0;i<siteIds.length;i+=2){
        if(slotIdx>=daySlots[day].length) slotIdx=0;
        const wNum=daySlots[day][slotIdx++];
        const k=weekKey(YEAR,wNum); ensure(k);
        [siteIds[i],siteIds[i+1]].forEach(id=>{
          if(!id) return;
          const site=SITE_MAP[id]; if(!site) return;
          sched[k].push({type:"visit",siteId:site.id,siteName:site.name,siteType:site.type,
            region:site.region,zone:site.zone,address:site.address,fid:site.fid,
            scheduledDay:day,confirmed:false});
        });
      }
    });
  });

  // ── Franchisee meetings: natural zone day, Q2–Q4 ──
  // Out-of-town franchisees meet during their trip week
  const TRIP_WEEK_F={
    "F13":"GardenRoute","F15":"GardenRoute","F19":"GardenRoute",
    "F24":"EasternCape","F25":"EasternCape","F26":"Namibia",
  };
  const FDAY={
    "F01":"Wed","F02":"Wed","F03":"Wed","F04":"Wed","F05":"Fri","F06":"Fri",
    "F07":"Fri","F08":"Thu","F09":"Fri","F10":"Tue","F11":"Fri","F12":"Tue",
    "F13":"Tue","F14":"Thu","F15":"Thu","F16":"Wed","F17":"Tue","F18":"Tue",
    "F19":"Wed","F20":"Thu","F21":"Wed","F22":"Fri","F23":"Tue",
    "F24":"Tue","F25":"Wed","F26":"Thu","F27":"Tue",
  };
  // Build trip week lookup per qi
  const tripWkByZoneQi={};
  [0,1,2,3].forEach(qi=>{
    tripWkByZoneQi[qi]={};
    Object.entries(TRIP_MONTHS[qi]).forEach(([zone,month])=>{
      const mw=weeksForMonth(month);
      let wNum;
      if(qi===1&&month===7&&zone==="GardenRoute")      wNum=mw[0];
      else if(qi===1&&month===7&&zone==="EasternCape") wNum=mw[2]||mw[mw.length-1];
      else if(zone==="Springbok")                      wNum=mw[2]||mw[mw.length-1];
      else                                             wNum=mw[1]||mw[0];
      tripWkByZoneQi[qi][zone]=wNum;
    });
  });

  const mtgDayUsed={};
  FRANCHISEES.forEach((f,idx)=>{
    [1,2,3].forEach(qi=>{
      const pDay=FDAY[f.id]||"Wed";
      const tripZone=TRIP_WEEK_F[f.id];
      let chosenWeek=null;
      if(tripZone&&tripWkByZoneQi[qi]?.[tripZone]){
        chosenWeek=tripWkByZoneQi[qi][tripZone];
      } else {
        const mid=qWeeks[qi].slice(3,10);
        for(let a=0;a<mid.length;a++){
          const wNum=mid[(idx+a)%mid.length];
          const dk=`${wNum}-${pDay}`;
          if(!mtgDayUsed[dk]){chosenWeek=wNum;mtgDayUsed[dk]=true;break;}
        }
        if(!chosenWeek) chosenWeek=qWeeks[qi].slice(3,10)[idx%7];
      }
      const k=weekKey(YEAR,chosenWeek); ensure(k);
      sched[k].push({type:"meeting",franchiseeId:f.id,franchiseeName:f.name,
        franchiseeRegion:f.region,siteCount:f.sites,quarter:qi,
        scheduledDay:pDay,confirmed:false});
    });
  });

  return sched;
}

// ─── AUTO-RESCHEDULE ─────────────────────────────────────────────────────────
function applyReschedule(sched) {
  const now=Math.max(isoWeek(new Date()),RESCHEDULE_FROM_WEEK);
  const out={}; Object.keys(sched).forEach(k=>{out[k]=sched[k].map(e=>({...e}));});
  // Round-robin counter per target quarter, so overdue visits spread evenly
  // across every remaining week of the quarter instead of all piling onto
  // a single week (which is what made "Rescheduled" balloon to 100+ before).
  const distCounter={};
  let changed=true,passes=0;
  while(changed&&passes<8){
    changed=false; passes++;
    Object.keys(out).forEach(k=>{
      const wNum=parseWeek(k);
      if(wNum>=now) return;
      out[k]=(out[k]||[]).filter(e=>{
        if(e.confirmed) return true;
        const qi=weekToQuarter(YEAR,wNum);
        let tqi=qi;
        let remainingWeeks=weeksForQuarter(tqi).filter(w=>w>=now);
        let att=0;
        while(remainingWeeks.length===0&&att<4){tqi=(tqi+1)%4;remainingWeeks=weeksForQuarter(tqi).filter(w=>w>=now);att++;}
        if(remainingWeeks.length===0) return true; // nowhere left to place it — leave as-is
        distCounter[tqi]=(distCounter[tqi]||0);
        const tw=remainingWeeks[distCounter[tqi]%remainingWeeks.length];
        distCounter[tqi]++;
        const tk=weekKey(YEAR,tw);
        if(!out[tk]) out[tk]=[];
        const dup=out[tk].some(x=>x.type===e.type&&(e.type==="visit"?x.siteId===e.siteId:x.franchiseeId===e.franchiseeId));
        if(!dup){
          const distDays=["Tue","Wed","Thu","Fri"];
          const usedDay=e.scheduledDay||distDays[out[tk].length%4];
          out[tk].push({...e,scheduledDay:usedDay,rescheduled:true,
            rescheduleCount:(e.rescheduleCount||0)+1,
            originalWeek:e.originalWeek||wNum,originalQuarter:e.originalQuarter??qi});
          changed=true;
        }
        return false;
      });
    });
  }
  Object.keys(out).forEach(k=>{if(out[k].length===0)delete out[k];});
  return out;
}

// ─── ADD EVENT MODAL ─────────────────────────────────────────────────────────
const AD_HOC_TYPES=["Visit","Meeting","Call","Training","Event","Other"];
function AddEventModal({day,wk,onAdd,onClose}){
  const [kind,setKind]=useState("Visit");
  const [siteId,setSiteId]=useState("");
  const [fId,setFId]=useState("");
  const [title,setTitle]=useState("");
  const [notes,setNotes]=useState("");
  function submit(){
    if(kind==="Visit"&&!siteId) return;
    let ev;
    if(kind==="Visit"){
      const site=SITE_MAP[siteId];
      ev={type:"visit",siteId:site.id,siteName:site.name,siteType:site.type,
        region:site.region,zone:site.zone,address:site.address,fid:site.fid,
        scheduledDay:day,confirmed:false,adhoc:true};
    } else if(kind==="Meeting"&&fId){
      const f=F_MAP[fId];
      ev={type:"meeting",franchiseeId:f.id,franchiseeName:f.name,
        franchiseeRegion:f.region,siteCount:f.sites,
        quarter:weekToQuarter(YEAR,parseWeek(wk)),
        scheduledDay:day,confirmed:false,adhoc:true};
    } else {
      ev={type:"adhoc",title:title||kind,notes,scheduledDay:day,confirmed:false,adhoc:true,kind};
    }
    onAdd(wk,ev); onClose();
  }
  return(
    <div style={{position:"fixed",inset:0,background:"#000000aa",zIndex:200,display:"flex",alignItems:"center",justifyContent:"center"}}
      onClick={onClose}>
      <div onClick={e=>e.stopPropagation()} style={{background:"#141414",border:"1px solid #2a2a2a",borderRadius:10,padding:24,width:380,maxWidth:"90vw"}}>
        <div style={{fontSize:13,fontWeight:800,color:"#f0ebe1",marginBottom:16}}>Add Event — {day}</div>
        <div style={{display:"flex",gap:4,flexWrap:"wrap",marginBottom:14}}>
          {AD_HOC_TYPES.map(t=>(
            <button key={t} onClick={()=>setKind(t)} style={{background:kind===t?"#c8a96e":"transparent",border:`1px solid ${kind===t?"#c8a96e":"#333"}`,color:kind===t?"#111":"#888",borderRadius:4,padding:"4px 10px",fontSize:10,fontWeight:700,cursor:"pointer"}}>{t}</button>
          ))}
        </div>
        {kind==="Visit"&&(
          <select value={siteId} onChange={e=>setSiteId(e.target.value)}
            style={{width:"100%",background:"#0d0d0d",border:"1px solid #2a2a2a",color:"#f0ebe1",borderRadius:4,padding:"8px 10px",fontSize:11,marginBottom:10}}>
            <option value="">Select site…</option>
            {ALL_SITES.map(s=><option key={s.id} value={s.id}>[{s.type}] {s.name} — {s.town}</option>)}
          </select>
        )}
        {kind==="Meeting"&&(
          <select value={fId} onChange={e=>setFId(e.target.value)}
            style={{width:"100%",background:"#0d0d0d",border:"1px solid #2a2a2a",color:"#f0ebe1",borderRadius:4,padding:"8px 10px",fontSize:11,marginBottom:10}}>
            <option value="">Select franchisee…</option>
            {FRANCHISEES.map(f=><option key={f.id} value={f.id}>{f.name} — {f.region}</option>)}
          </select>
        )}
        {!["Visit","Meeting"].includes(kind)&&(
          <>
            <input value={title} onChange={e=>setTitle(e.target.value)} placeholder={`${kind} title…`}
              style={{width:"100%",background:"#0d0d0d",border:"1px solid #2a2a2a",color:"#f0ebe1",borderRadius:4,padding:"8px 10px",fontSize:11,marginBottom:10,boxSizing:"border-box"}}/>

              style={{width:"100%",background:"#0d0d0d",border:"1px solid #2a2a2a",color:"#f0ebe1",borderRadius:4,padding:"8px 10px",fontSize:11,marginBottom:10,boxSizing:"border-box"}}/>
          </>
        )}
        <div style={{display:"flex",gap:8,marginTop:6}}>
          <button onClick={submit} style={{flex:1,background:"#c8a96e",color:"#111",border:"none",borderRadius:5,padding:"9px",fontSize:12,fontWeight:800,cursor:"pointer"}}>Add to Schedule</button>

        </div>
      </div>
    </div>
  );
}

  const DAY_KEYS=["Mon","Tue","Wed","Thu","Fri"];

  const qi=weekToQuarter(YEAR,viewWeek);
  const qc=Q_COLORS[qi];
  const {start:wMon,end:wFri}=weekDates(YEAR,viewWeek);

  function qStats(q){
    const ev=weeksForQuarter(q).flatMap(w=>(schedule[weekKey(YEAR,w)]||[]));
    const vis=ev.filter(e=>e.type==="visit");
    return{visits:vis.length,confirmed:vis.filter(e=>e.confirmed).length};

// ─── SITES VIEW ───────────────────────────────────────────────────────────────
function SitesView({schedule}){
  const [search,setSearch]=useState("");
  const [expandedSite,setExpandedSite]=useState(null);
  const visitMap={};
  Object.entries(schedule).forEach(([wk,evs])=>{
    evs.forEach(e=>{
      if(e.type!=="visit") return;
      if(!visitMap[e.siteId]) visitMap[e.siteId]=[];
      visitMap[e.siteId].push({wk, date: weekDates(YEAR,parseWeek(wk)).start, confirmed: e.confirmed, rescheduled: e.rescheduled, day: e.scheduledDay});
    });
  });
  const filtered=ALL_SITES.filter(s=>!search||[s.name,s.town].some(x=>x?.toLowerCase().includes(search.toLowerCase())))
    .sort((a,b)=>a.name.localeCompare(b.name));
  return(
    <div>
      <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search café name…"
        style={{width:"100%",background:"#141414",border:"1px solid #1e1e1e",color:"#f0ebe1",borderRadius:4,padding:"8px 12px",fontSize:11,marginBottom:12}}/>
      <div style={{fontSize:10,color:"#3a3a3a",marginBottom:10}}>{filtered.length} sites — click a café to see who's visiting and when</div>
      <div style={{background:"#0e0e0e",border:"1px solid #181818",borderRadius:6,overflow:"hidden"}}>
        {filtered.map(s=>{
          const visits=(visitMap[s.id]||[]).sort((a,b)=>a.date-b.date);
          const isExpanded=expandedSite===s.id;
          return (
            <div key={s.id} style={{borderBottom:"1px solid #181818"}}>
              <div onClick={()=>setExpandedSite(isExpanded?null:s.id)} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 14px",cursor:"pointer"}}>
                <span style={{fontSize:12,color:"#f0ebe1",fontWeight:700}}>{s.name}</span>
                <span style={{fontSize:11,color:visits.length?"#c8a96e":"#333",fontWeight:800}}>{visits.length} visit{visits.length===1?"":"s"} {isExpanded?"▲":"▼"}</span>
              </div>
              {isExpanded && (
                <div style={{padding:"0 14px 12px",background:"#0a0a0a"}}>
                  {visits.length ? visits.map((v,i)=>(
                    <div key={i} style={{display:"flex",justifyContent:"space-between",fontSize:10.5,padding:"5px 0",borderBottom:i<visits.length-1?"1px solid #161616":"none"}}>
                      <span style={{color:"#888"}}>Franlo{v.day?` · ${v.day}`:""}</span>
                      <span style={{color:"#666"}}>{fmtShort(v.date)} (W{parseWeek(v.wk)}){v.confirmed?" · ✓ confirmed":v.rescheduled?" · rescheduled":""}</span>
                    </div>
                  )) : <div style={{fontSize:10.5,color:"#444",padding:"6px 0"}}>No visits scheduled for this café.</div>}
                </div>
              )}
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ─── OVERDUE VIEW ─────────────────────────────────────────────────────────────
function OverdueView({schedule,onToggle,onResetShuffle}){
  const now=Math.max(isoWeek(new Date()),RESCHEDULE_FROM_WEEK);
  const overdue=[],rescheduled=[];
  Object.entries(schedule).forEach(([k,evs])=>{
    const wNum=parseWeek(k);
    evs.forEach((e,idx)=>{
      if(e.confirmed) return;
      if(e.rescheduled) rescheduled.push({...e,wk:k,idx});
      else if(wNum<now) overdue.push({...e,wk:k,idx});
    });
  });
  const total=overdue.length+rescheduled.length;
  if(total===0) return(
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"60px 0",textAlign:"center"}}>
      <div style={{fontSize:32,marginBottom:10}}>✓</div>
      <div style={{fontSize:14,color:"#4a6a4a",fontWeight:700}}>All clear</div>
      <div style={{fontSize:11,color:"#3a3a3a",marginTop:4}}>No overdue or rescheduled items</div>
    </div>
  );
  function Card({e,badge,col}){
    const tm=e.siteType?TYPE_META[e.siteType]||TYPE_META.Full:null;
    const {start}=weekDates(YEAR,parseWeek(e.wk));
    return(
      <div style={{background:"#0e0e0e",border:`1px solid ${col}33`,borderLeft:`3px solid ${col}`,borderRadius:5,padding:"11px 13px",marginBottom:6,display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
        <div style={{flex:1}}>
          <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:5}}>
            <Pill label={badge} color={col} small/>
            {e.rescheduleCount>0&&<Pill label={`×${e.rescheduleCount} rescheduled`} color="#666" small/>}
            {Number.isFinite(e.originalWeek)&&<span style={{fontSize:9,color:"#3a3a3a"}}>Originally W{e.originalWeek}</span>}
          </div>
          {e.type==="visit"?(
            <><div style={{fontSize:12,fontWeight:700,color:"#f0ebe1",marginBottom:3}}>{tm?.icon} {e.siteName}</div>
            {e.address&&<div style={{fontSize:9,color:"#444"}}>{e.address}</div>}</>
          ):e.type==="meeting"?(
            <><div style={{fontSize:12,fontWeight:700,color:"#f0ebe1",marginBottom:3}}>◆ {e.franchiseeName}</div>
            {e.franchiseeRegion&&<div style={{fontSize:9,color:"#444"}}>{e.franchiseeRegion}</div>}</>
          ):(
            <div style={{fontSize:12,fontWeight:700,color:"#f0ebe1",marginBottom:3}}>{e.title}</div>
          )}
          <div style={{fontSize:9,color:"#444",marginTop:5}}>→ W{parseWeek(e.wk)} ({fmtShort(start)})</div>
        </div>
        <button onClick={()=>onToggle(e.wk,e.idx)} style={{flexShrink:0,marginLeft:10,background:"transparent",border:"1px solid #2a4a2a",borderRadius:3,color:"#4a6a4a",fontSize:9,padding:"3px 8px",cursor:"pointer",fontWeight:800}}>DONE ✓</button>
      </div>
    );
  }
  return(
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14,flexWrap:"wrap",gap:8}}>
        <div style={{fontSize:10,color:"#666"}}>Rescheduled visits spread evenly across the rest of the quarter's remaining weeks.</div>
        <button onClick={onResetShuffle} style={{background:"#161616",border:"1px solid #2a2a2a",borderRadius:4,color:"#c8a96e",fontSize:10.5,padding:"6px 12px",cursor:"pointer",fontFamily:"inherit",fontWeight:700}}>
          ↻ Reset &amp; Shuffle Into Rest of Quarter
        </button>
      </div>
      <div style={{display:"flex",gap:10,marginBottom:20,flexWrap:"wrap"}}>
        <div style={{background:"#1a0a0a",border:"1px solid #d0877033",borderRadius:6,padding:"12px 18px",flex:1}}>
          <div style={{fontSize:22,fontWeight:900,color:"#d08770"}}>{overdue.length}</div>
          <div style={{fontSize:10,color:"#555",marginTop:3}}>OVERDUE</div>
        </div>
        <div style={{background:"#0a0f1a",border:"1px solid #8fbcbb33",borderRadius:6,padding:"12px 18px",flex:1}}>
          <div style={{fontSize:22,fontWeight:900,color:"#8fbcbb"}}>{rescheduled.length}</div>
          <div style={{fontSize:10,color:"#555",marginTop:3}}>RESCHEDULED</div>
        </div>
      </div>
      {overdue.length>0&&<><div style={{fontSize:10,color:"#d08770",fontWeight:800,letterSpacing:"0.1em",marginBottom:8}}>⚠ OVERDUE</div>{overdue.map((e,i)=><Card key={i} e={e} badge="OVERDUE" col="#d08770"/>)}</>}
      {rescheduled.length>0&&<><div style={{fontSize:10,color:"#8fbcbb",fontWeight:800,letterSpacing:"0.1em",marginBottom:8,marginTop:16}}>↻ RESCHEDULED</div>{rescheduled.map((e,i)=><Card key={i} e={e} badge="RESCHEDULED" col="#8fbcbb"/>)}</>}
    </div>
  );
}

// ─── ROUTE GRID VIEW (WC Master style) ─────────────────────────────────────
// New, additive view — pre-populated weekly route grid grouped by region,
// styled to match the rest of BOS (light background, black/gold accents),
// sitting alongside the existing scheduling mechanism without touching it.
// FSM roster and café portfolios are pulled live from the same reference
// data BOS itself uses, so this never drifts out of sync with the main app.
// Wider support team roster (mirrors BOS's own list) — names here that
// aren't already one of the FSMs above get a roaming, every-café rotation.
const SUPPORT_TEAM_ROSTER = ["Addright Chigama","Tshepo Goqo","Siphesihle Gwadela","Raabia Isaacs","Mini Mohale","Aphiwe Mqakayi","Johannes Moloto"];

const thStyleRG={padding:"8px 10px",textAlign:"left",fontSize:9.5,letterSpacing:"0.05em",textTransform:"uppercase",color:"#8a8368",borderBottom:"2px solid #e5e0d5",fontWeight:800};
const navBtnStyleRG={background:"#fff",border:"1px solid #d8d2c2",borderRadius:4,color:"#333",padding:"4px 10px",fontSize:10.5,cursor:"pointer",fontFamily:"inherit"};

// Cadence targets, expressed in weekdays between visits:
//   FSM local ≈ monthly (20 weekdays) · FSM outlying ≈ every 6 weeks (30) · FSM Namibia ≈ every 2 months (40)
//   Non-FSM support: CPT & Gauteng cafés ≈ monthly (20) · outlying cafés ≈ every 2 months (40)
//   Regional managers (Franlo/Tarryn) local ≈ monthly (20) · outlying (incl. Namibia) ≈ quarterly (65)
//   Support team + managers also gap-fill: any day with no café actually due
//   still gets a visit, cycling through the full list from café #1 onward,
//   rather than sitting empty.
const CADENCE = { local: 20, outlying: 30, namibia: 40, supportLocal: 20, supportOutlying: 40, managerLocal: 20, managerOutlying: 65 };
const NAMIBIA_FALLBACK = new Set(["The Grove", "FNB"]);

// Zones that are technically still "Western Cape" (province) but require a
// genuine trip out of the Cape Town metro — as opposed to e.g. CityBowlAtlantic
// or SouthernSubs, which are same-day local visits. Previously, classifyStore
// only compared province strings, so Stellenbosch/Hartenbos/Hermanus/Franschhoek/
// Langebaan etc. were all silently getting "local" (monthly) cadence just because
// they share the "Western Cape" region value with Cape Town proper.
const OUTLYING_WC_ZONES = new Set(["Winelands","FalseBay","GardenRoute","Overberg","WestCoast"]);

function buildSiteRegionMap(){
  const map = {};
  (typeof ALL_SITES !== "undefined" ? ALL_SITES : []).forEach(s => {
    map[s.name] = { region: s.region, zone: s.zone, areaType: OUTLYING_WC_ZONES.has(s.zone) ? "outlying" : "metro" };
  });
  return map;
}
const SITE_REGION_MAP = buildSiteRegionMap();

function classifyStore(storeName, homeRegion){
  const info = SITE_REGION_MAP[storeName];
  if (info) {
    if (info.region === "Namibia") return "namibia";
    if (info.region !== homeRegion) return "outlying"; // different province entirely
    return info.areaType === "outlying" ? "outlying" : "local"; // same province, but check metro vs out-of-town
  }
  if (NAMIBIA_FALLBACK.has(storeName)) return "namibia";
  // Not in the WC/EC/N.Cape site list at all — most likely a Gauteng café,
  // since this scheduler's own site list doesn't currently include Gauteng.
  return homeRegion === "Gauteng" ? "local" : "outlying";
}

// Support team roams across BOTH Cape Town and Gauteng at once (no single
// "home region" to compare against), so it needs its own metro-vs-outlying
// check rather than classifyStore's home-region comparison: metro means
// Cape Town proper OR Gauteng proper; outlying means anywhere else (Garden
// Route, Overberg, Winelands, False Bay, EC, Namibia, or a Gauteng-team café
// that's actually in KZN/Free State/North West/Mpumalanga/Limpopo/N.Cape).
function isMetroSite(storeName){
  const info = SITE_REGION_MAP[storeName];
  if (!info) return false;
  if (info.region !== "Western Cape" && info.region !== "Gauteng") return false;
  return info.areaType !== "outlying";
}

// Deterministic day-by-day rotation: each store has a target cadence (period,
// in weekdays). Every day, whichever eligible stores are most "overdue"
// relative to their own period get one of up to 2 slots. This naturally
// gives busier days on stores with a short period (local, monthly) and rarer
// appearances for 6-weekly/quarterly/bi-monthly stores, rather than forcing
// every day to show exactly 2 regardless of whether anything's actually due.
function buildRotationPlan(storesWithPeriod, horizonDays, slotsPerDay, opts){
  if (!storesWithPeriod.length) return Array.from({length:horizonDays},()=>[]);
  const fillGaps = !!(opts && opts.fillGaps);
  const lastVisited = {};
  storesWithPeriod.forEach((s,i) => { lastVisited[s.name] = -Math.round((i/storesWithPeriod.length)*s.period); });
  let fillCursor = 0; // gap-filling round-robin pointer — starts at café #1 (index 0)
  const plan = [];
  for (let day=0; day<horizonDays; day++){
    // Mondays default to Admin days — no auto-assigned café visits. A café
    // that happened to be "due" on a Monday simply waits one day; nothing
    // is skipped or lost, it just shifts to Tuesday. Manual visits can still
    // be added to a Monday directly in the grid if genuinely needed.
    if (day % 5 === 0) { plan.push([]); continue; }
    const eligible = storesWithPeriod
      .filter(s => day - lastVisited[s.name] >= s.period)
      .sort((a,b) => ((day-lastVisited[b.name])/b.period) - ((day-lastVisited[a.name])/a.period));
    // Geographic practicality: take the most overdue café first, then for
    // any additional slot(s) that day prefer a café in the SAME zone (so the
    // pairing is an actually sensible little route), only falling back to
    // the next-most-overdue café if nothing nearby is eligible yet.
    const chosen = [];
    if (eligible.length) {
      chosen.push(eligible[0]);
      for (let slot=1; slot<slotsPerDay; slot++){
        const remaining = eligible.filter(s => !chosen.includes(s));
        if (!remaining.length) break;
        const sameZone = remaining.find(s => s.zone && chosen.some(c => c.zone === s.zone));
        chosen.push(sameZone || remaining[0]);
      }
    }
    // Gap-filling (support team / managers only): if nothing — or not
    // enough — is actually due today, don't leave the day empty. Cycle
    // through the full list in order, starting from café #1, so every idle
    // slot still turns into a visit. This never shortens any café's due
    // cadence; it only adds bonus early visits on days that would otherwise
    // be blank, keeping the person out visiting as often as possible.
    if (fillGaps) {
      while (chosen.length < slotsPerDay) {
        let picked = null;
        for (let tries=0; tries<storesWithPeriod.length; tries++){
          const candidate = storesWithPeriod[fillCursor % storesWithPeriod.length];
          fillCursor++;
          if (!chosen.includes(candidate)) { picked = candidate; break; }
        }
        if (!picked) break;
        chosen.push(picked);
      }
    }
    chosen.forEach(s => { lastVisited[s.name] = day; });
    plan.push(chosen.map(s => s.name));
  }
  return plan;
}

// Absolute weekday index since the start of the year — gives every person's
// rotation a stable, continuous cadence across week navigation instead of
// resetting each time you flip weeks.
function absoluteWeekdayIndex(weekNum, dayIdx){ return (weekNum-1)*5 + dayIdx; }
const ROTATION_HORIZON = 300; // ~60 weeks — comfortably covers a year of navigation

function fsmRoutePlan(storeList, homeRegion){
  const withPeriod = storeList.map(name => {
    const cls = classifyStore(name, homeRegion);
    const zone = (SITE_REGION_MAP[name]||{}).zone || null;
    return { name, zone, period: cls==="local" ? CADENCE.local : cls==="outlying" ? CADENCE.outlying : CADENCE.namibia };
  });
  return buildRotationPlan(withPeriod, ROTATION_HORIZON, 2);
}
function supportRoutePlan(allStores, personIndex, personCount){
  // Split the full café list across the support team so each store gets one
  // assigned person (aligned with whichever FSM visit is nearby, for ease of
  // travel) rather than every support member redundantly visiting the same
  // café on the same day.
  const mySlice = allStores.filter((_, i) => i % personCount === personIndex);
  const withPeriod = mySlice.map(name => ({
    name,
    zone: (SITE_REGION_MAP[name]||{}).zone || null,
    period: isMetroSite(name) ? CADENCE.supportLocal : CADENCE.supportOutlying
  }));
  return buildRotationPlan(withPeriod, ROTATION_HORIZON, 2, {fillGaps:true});
}
function managerRoutePlan(storeList, homeRegion){
  const withPeriod = storeList.map(name => {
    const cls = classifyStore(name, homeRegion);
    const zone = (SITE_REGION_MAP[name]||{}).zone || null;
    return { name, zone, period: cls==="local" ? CADENCE.managerLocal : CADENCE.managerOutlying };
  });
  return buildRotationPlan(withPeriod, ROTATION_HORIZON, 2, {fillGaps:true});
}

// Franchisee visits align to a day when the manager is already scheduled to
// be at one of that franchisee's own cafés — e.g. Stephan Jooste (owns
// Strand, Gordon's Bay, Somerset Mall) gets his check-in slotted onto
// whichever of those three the manager's route already touches that week,
// instead of an independent, unrelated date needing a second trip.
function buildFranchiseeStoreMap(){
  const map = {};
  (typeof ALL_SITES !== "undefined" ? ALL_SITES : []).forEach(s => {
    if (s.fid) { if (!map[s.fid]) map[s.fid] = []; map[s.fid].push(s.name); }
  });
  return map;
}
const FRANCHISEE_STORE_MAP = buildFranchiseeStoreMap();

// A franchisee belongs to a manager's region if they own AT LEAST ONE café
// that manager's FSMs actually visit — not by comparing a single static
// region string, which breaks the moment a franchisee's cafés span more
// than one province (e.g. Fayyaz Moosa owns cafés in the Western Cape,
// Gauteng, AND KwaZulu-Natal all at once).
function franchiseesForStores(mgrStores){
  const storeSet = new Set(mgrStores);
  return FRANCHISEES.filter(f => (FRANCHISEE_STORE_MAP[f.id] || []).some(s => storeSet.has(s))).map(f => f.id);
}

function franchiseeVisitPlanAligned(franchiseeIds, regionPlan, horizonDays){
  const period = CADENCE.managerOutlying;
  const plan = Array.from({length:horizonDays},()=>[]);
  franchiseeIds.forEach((fid,idx)=>{
    const linkedStores = FRANCHISEE_STORE_MAP[fid] || [];
    const franchiseeName = (FRANCHISEES.find(f=>f.id===fid)||{}).name || fid;
    let nextDue = Math.round((idx/franchiseeIds.length)*period);
    while (nextDue < horizonDays){
      let placedDay = nextDue;
      let alignedStore = null;
      // Look up to two weeks ahead of the "due" date for a day the manager
      // is already at one of this franchisee's cafés.
      for (let look=0; look<14 && nextDue+look<horizonDays; look++){
        const dayStores = regionPlan[nextDue+look] || [];
        const match = linkedStores.find(s => dayStores.includes(s));
        if (match) { placedDay = nextDue+look; alignedStore = match; break; }
      }
      plan[placedDay].push(alignedStore ? `${franchiseeName} (at ${alignedStore})` : franchiseeName);
      nextDue += period;
    }
  });
  return plan;
}

function RouteGridView({selectedPerson}){
  const [refData,setRefData]=useState(null);
  const [loading,setLoading]=useState(true);
  const [viewWeek,setViewWeek]=useState(()=>Math.max(MIN_WEEK, isoWeek(new Date())));
  const [routes,setRoutes]=useState({});
  const [expandedPerson,setExpandedPerson]=useState(null);
  const filterName = selectedPerson && selectedPerson!=="__admin__"
    ? (selectedPerson.startsWith("__mgr__") ? selectedPerson.replace("__mgr__","") : selectedPerson)
    : null;
  useEffect(()=>{ if(filterName) setExpandedPerson(filterName); }, [filterName]);

  useEffect(()=>{
    (async()=>{
      try{
        const token=localStorage.getItem("bos_token");
        const res=await fetch("/api/reference-data",{headers:token?{Authorization:"Bearer "+token}:{}});
        if(res.ok) setRefData(await res.json());
      }catch(e){/* falls back to empty grid below */}
      setLoading(false);
    })();
  },[]);

  useEffect(()=>{
    (async()=>{
      const saved=await store.get("route-grid:"+weekKey(YEAR,viewWeek));
      try{ setRoutes(saved&&saved.value?JSON.parse(saved.value):{}); }catch(e){ setRoutes({}); }
    })();
  },[viewWeek]);

  if(loading) return <div style={{padding:24,color:"#999",fontSize:12}}>Loading route grid…</div>;
  if(!refData) return <div style={{padding:24,color:"#d08770",fontSize:12}}>Could not load the FSM roster from BOS — check your connection and reload.</div>;

  const wk=weekDates(YEAR,viewWeek);
  // 7 columns: Mon–Fri (auto-populated per the rotation algorithm) plus
  // Sat/Sun as manual "Support Day" columns — same build (Add Visit,
  // Confirm/Reschedule/Maps, multi-entry) as any weekday, but never
  // auto-filled, since the rotation math is weekday-indexed only.
  const days=Array.from({length:7},(_,i)=>{const d=new Date(wk.start);d.setDate(wk.start.getDate()+i);return d;});
  const managers=refData.managers||{};
  const fsmStores=refData.fsmStores||{};
  const allSupportNames = Array.from(new Set([].concat(...Object.values(managers))));
  const allStoreNames = Array.from(new Set([].concat(...Object.values(fsmStores))));
  // Anyone on the wider support-team roster (see SUPPORT_TEAM in BOS) who
  // isn't already one of the FSMs above gets a roaming, every-store rotation.
  const nonFsmSupport = (typeof SUPPORT_TEAM_ROSTER !== "undefined" ? SUPPORT_TEAM_ROSTER : [])
    .filter(name => !allSupportNames.includes(name));

  const regions=Object.entries(managers).map(([mgr,fsms])=>({
    label: mgr==="Franlo" ? "Western Cape — Franlo's Team" : `${mgr}'s Team`,
    homeRegion: mgr==="Franlo" ? "Western Cape" : "Gauteng",
    fsms,
  }));

  const dayStart = absoluteWeekdayIndex(viewWeek, 0);

  function cellKey(person,dayIdx){ return person+"|"+dayIdx; }
  function getCellEntries(person,dayIdx,planFn){
    const k=cellKey(person,dayIdx);
    if(routes[k]!==undefined) return routes[k];
    if(dayIdx>=5) return []; // Sat/Sun support day — manual only, never auto-filled
    const plan = planFn();
    const absDay = dayStart + dayIdx;
    const stores = plan[absDay] || [];
    return stores.map((s,i)=>({id:`auto${i}`, text:s, status:""}));
  }
  function setCellEntries(person,dayIdx,entries){
    setRoutes(prev=>{
      const next={...prev,[cellKey(person,dayIdx)]:entries};
      store.set("route-grid:"+weekKey(YEAR,viewWeek), JSON.stringify(next));
      return next;
    });
  }
  function addVisitEntry(person,dayIdx,planFn){
    const entries = getCellEntries(person,dayIdx,planFn);
    setCellEntries(person,dayIdx,[...entries, {id:"v"+Date.now().toString(36)+Math.random().toString(36).slice(2,6), text:"", status:""}]);
  }
  function updateVisitEntry(person,dayIdx,planFn,visitId,field,value){
    const entries = getCellEntries(person,dayIdx,planFn);
    setCellEntries(person,dayIdx, entries.map(e=>e.id===visitId?{...e,[field]:value}:e));
  }
  function removeVisitEntry(person,dayIdx,planFn,visitId){
    const entries = getCellEntries(person,dayIdx,planFn);
    setCellEntries(person,dayIdx, entries.filter(e=>e.id!==visitId));
  }
  function resetWeekToDefaults(){
    if(!window.confirm("Reset this week's route grid back to the pre-populated defaults? Any manual edits for this week will be lost.")) return;
    setRoutes({});
    store.set("route-grid:"+weekKey(YEAR,viewWeek), JSON.stringify({}));
  }
  function mapsLinkFor(text){
    if(!text || !text.trim()) return null;
    return `https://www.google.com/maps/search/${encodeURIComponent("Bootlegger "+text.trim())}`;
  }

  // Any team member can be assigned ANY café, regardless of their usual

                      </div>

                );

                + Add Visit
              </button>
            </td>

      {isExpanded && (

          <td colSpan={8} style={{padding:"10px 16px",background:"#faf8f3",borderBottom:"2px solid #e5e0d5"}}>
            <div style={{fontSize:9.5,fontWeight:800,color:"#8a6d3b",textTransform:"uppercase",letterSpacing:"0.05em",marginBottom:8}}>{person} — Next 4 Weeks</div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10}}>
              {monthSummaryFor(planFn).map(week=>(
                <div key={week.weekNum} style={{background:"#fff",border:"1px solid #e5e0d5",borderRadius:4,padding:8}}>
                  <div style={{fontSize:9,fontWeight:800,color:"#333",marginBottom:5}}>Week {week.weekNum}</div>

                    <div key={di} style={{fontSize:9.5,color:day.stores.length?"#333":"#bbb",padding:"2px 0",borderBottom:di<6?"1px solid #f5f2ea":"none"}}>

                        {entries.map(entry=>(
                          <div key={entry.id} style={{border:"1px solid #e5e0d5",borderRadius:3,padding:5,marginBottom:5,background:"#fff"}}>
                            <div style={{display:"flex",gap:3,alignItems:"center"}}>
                              <input type="text" value={entry.text} list={storeOptionsId}
                                onChange={e=>updateVisitEntry(mgrName,i,planFn,entry.id,"text",e.target.value)}
                                placeholder="Café name…"
                                style={{flex:1,border:"1px solid #e5e0d5",borderRadius:3,fontSize:10.5,padding:4,fontFamily:"inherit",color:"#333",minWidth:0}}/>
                              <span onClick={()=>removeVisitEntry(mgrName,i,planFn,entry.id)} style={{cursor:"pointer",color:"#bbb",fontSize:12,padding:"0 2px"}}>✕</span>
                            </div>
                            {entry.text.trim() && (
                              <div style={{display:"flex",flexDirection:"column",gap:3,marginTop:4}}>
                                <button onClick={()=>updateVisitEntry(mgrName,i,planFn,entry.id,"status",entry.status==="confirmed"?"":"confirmed")}
                                  style={{fontSize:9,padding:"3px 6px",borderRadius:3,cursor:"pointer",fontFamily:"inherit",fontWeight:700,
                                    background:entry.status==="confirmed"?"#e3f3e9":"#f5f2ea",color:entry.status==="confirmed"?"#1a7a44":"#999",border:`1px solid ${entry.status==="confirmed"?"#b8e0c8":"#e5e0d5"}`}}>
                                  {entry.status==="confirmed" ? "✓ Confirmed" : "Confirm"}
                                </button>
                                <button onClick={()=>updateVisitEntry(mgrName,i,planFn,entry.id,"status",entry.status==="rescheduled"?"":"rescheduled")}
                                  style={{fontSize:9,padding:"3px 6px",borderRadius:3,cursor:"pointer",fontFamily:"inherit",fontWeight:700,
                                    background:entry.status==="rescheduled"?"#e2ecfb":"#f5f2ea",color:entry.status==="rescheduled"?"#1a4d7a":"#999",border:`1px solid ${entry.status==="rescheduled"?"#b8d0f0":"#e5e0d5"}`}}>
                                  ↻ {entry.status==="rescheduled" ? "Rescheduled" : "Reschedule"}
                                </button>
                                {mapsLinkFor(entry.text) && <a href={mapsLinkFor(entry.text)} target="_blank" rel="noreferrer" style={{fontSize:9,color:"#a35c5c",textAlign:"center",textDecoration:"none"}}>📍 Maps</a>}
                              </div>
                            )}
                          </div>
                        ))}
                        <button onClick={()=>addVisitEntry(mgrName,i,planFn)} style={{width:"100%",fontSize:9,padding:"4px 0",borderRadius:3,border:"1px dashed #d8d2c2",background:"#faf8f3",color:"#8a8368",cursor:"pointer",fontFamily:"inherit"}}>
                          + Add Visit
                        </button>
                        {franchiseeDue && <div style={{marginTop:3,fontSize:9,color:"#8a6d3b",background:"#c8ae7922",padding:"2px 5px",borderRadius:2}}>🤝 {franchiseeDue}</div>}
                      </td>
                    );
                  })}
                </tr>
              );
            })}

            {/* FSM regions — local monthly, outlying 6-weekly, Namibia bi-monthly */}
            {regions.map(region=>{
              const visibleFsms = region.fsms.filter(fsm=>!filterName || fsm===filterName);
              if (filterName && visibleFsms.length===0) return null;
              return (
                <React.Fragment key={region.label}>
                  <tr>
                    <td colSpan={8} style={{background:"#c8a96e22",color:"#8a6d3b",fontWeight:800,fontSize:10,letterSpacing:"0.06em",padding:"7px 12px",textTransform:"uppercase"}}>{region.label}</td>
                  </tr>
                  {visibleFsms.map(fsm=>renderRow(fsm, ()=>fsmRoutePlan(fsmStores[fsm]||[], region.homeRegion)))}
                  {visibleFsms.length===0 && (
                    <tr><td colSpan={8} style={{padding:"8px 12px",color:"#b5ae98",fontSize:10.5}}>No support team members assigned to this region yet.</td></tr>
                  )}
                </React.Fragment>
              );
            })}

            {/* Non-FSM support — roaming. CPT & Gauteng cafés monthly,
                outlying cafés every 2 months, gap-filled so no weekday goes
                empty — ideally timed alongside an FSM visit to the same
                café for ease of travel. */}
            {(!filterName || nonFsmSupport.includes(filterName)) && (
              <tr><td colSpan={8} style={{background:"#1a1a1a",color:"#c8a96e",fontWeight:800,fontSize:10,letterSpacing:"0.06em",padding:"7px 12px",textTransform:"uppercase"}}>Support Team (Roaming — CPT & Gauteng monthly, outlying every 2 months)</td></tr>
            )}
            {nonFsmSupport.length ? nonFsmSupport
              .map((person,pIdx)=>({person,pIdx}))
              .filter(({person})=>!filterName || person===filterName)
              .map(({person,pIdx})=>renderRow(person, ()=>supportRoutePlan(allStoreNames, pIdx, nonFsmSupport.length)))
              : (!filterName && <tr><td colSpan={8} style={{padding:"8px 12px",color:"#b5ae98",fontSize:10.5}}>No non-FSM support team members configured yet.</td></tr>)}
          </tbody>
        </table>
      </div>
      <div style={{padding:"9px 18px",fontSize:9.5,color:"#999",borderTop:"1px solid #f0ece0"}}>
        Pre-populated by rotation: local cafés ≈ monthly, outlying ≈ every 6 weeks, Namibia ≈ every 2 months, managers monthly/quarterly (gap-filled from café #1 so no weekday sits empty), support team CPT & Gauteng monthly / outlying every 2 months (also gap-filled). Any cell can be edited to any café — type to search the full list. Changes save automatically per week.
      </div>
    </div>
  );
}

// ─── MAIN APP ─────────────────────────────────────────────────────────────────
function App(){
  const [schedule,setSchedule]=useState(null);
  const [view,setView]=useState("routegrid");
  const [saveStatus,setSaveStatus]=useState("saved");
  const [exportModal,setExportModal]=useState(false);
  const [exportData,setExportData]=useState("");
  const [icsModal,setIcsModal]=useState(false);
  const [icsData,setIcsData]=useState("");
  const [kpiPerson,setKpiPerson]=useState("__admin__");
  const [kpiRefData,setKpiRefData]=useState(null);
  const timer=useRef(null);

  useEffect(()=>{
    (async()=>{
      try{
        const token=localStorage.getItem("bos_token");
        const res=await fetch("/api/reference-data",{headers:token?{Authorization:"Bearer "+token}:{}});
        if(res.ok) setKpiRefData(await res.json());
      }catch(e){/* KPI person-toggle just won't have options if this fails */}
    })();
  },[]);

  useEffect(()=>{
    function dropOldWeeks(sched){
      // Data before week 29 is retired — strip any such keys out of whatever
      // was loaded/built so nothing earlier can resurface in the UI.
      const cleaned = {};
      Object.entries(sched).forEach(([k,v]) => {
        const match = k.match(/-W(\d+)$/);
        if (!match || parseInt(match[1],10) >= MIN_WEEK) cleaned[k] = v;
      });
      return cleaned;
    }
    async function load(){
      try{
        const r=await store.get(STORAGE_KEY);
        if(r?.value){
          const p=JSON.parse(r.value);
          const hasDay=Object.values(p).flat().filter(e=>e.type==="visit").some(e=>e.scheduledDay);
          setSchedule(dropOldWeeks(applyReschedule(hasDay?p:buildSchedule())));
        } else setSchedule(dropOldWeeks(applyReschedule(buildSchedule())));
      } catch(err){ console.warn("Load failed:",err); setSchedule(dropOldWeeks(applyReschedule(buildSchedule()))); }
    }
    load();
  },[]);

  useEffect(()=>{
    if(!schedule) return;
    setSaveStatus("saving");
    clearTimeout(timer.current);
    timer.current=setTimeout(async()=>{
      try{await store.set(STORAGE_KEY,JSON.stringify(schedule));setSaveStatus("saved");}
      catch{setSaveStatus("error");}
    },800);
    return()=>clearTimeout(timer.current);
  },[schedule]);

  if(!schedule) return(
    <div style={{minHeight:"100vh",background:"#0a0a0a",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",fontFamily:"Georgia,serif"}}>
      <div style={{fontSize:13,color:"#c8a96e",letterSpacing:"0.2em",marginBottom:12}}>BOOTLEGGER</div>
      <div style={{fontSize:11,color:"#444",letterSpacing:"0.08em"}}>Loading schedule…</div>
    </div>
  );

  function toggle(wk,idx){ setSchedule(p=>({...p,[wk]:p[wk].map((e,i)=>i===idx?{...e,confirmed:!e.confirmed}:e)})); }
  function addEvent(wk,ev){ setSchedule(p=>({...p,[wk]:[...(p[wk]||[]),ev]})); }
  function removeEvent(wk,idx){ setSchedule(p=>({...p,[wk]:p[wk].filter((_,i)=>i!==idx)})); }

  function resetAndShuffle(){
    if(!window.confirm("Reset all rescheduled flags and re-shuffle overdue visits evenly across the rest of this quarter?")) return;
    setSchedule(prev=>{
      // Put every event back in its ORIGINAL week (undoing any previous
      // reschedule placement) before re-running the spread-across-the-quarter
      // logic fresh — otherwise repeated shuffles would compound on top of
      // each other instead of giving a clean, even redistribution.
      const restored={};
      Object.entries(prev).forEach(([k,evs])=>{
        evs.forEach(e=>{
          const { rescheduled, rescheduleCount, originalWeek, originalQuarter, ...rest } = e;
          const targetKey = originalWeek ? weekKey(YEAR,originalWeek) : k;
          if(!restored[targetKey]) restored[targetKey]=[];
          restored[targetKey].push(rest);
        });
      });
      const reshuffled = applyReschedule(restored);
      store.set(STORAGE_KEY, JSON.stringify(reshuffled));
      return reshuffled;
    });
  }

  function rescheduleEvent(wk,idx){
    setSchedule(p=>{
      const ev=p[wk]?.[idx]; if(!ev) return p;
      const wNum=parseWeek(wk);
      const qi=weekToQuarter(YEAR,wNum);
      const now=Math.max(isoWeek(new Date()),RESCHEDULE_FROM_WEEK);
      const candidates=[...weeksForQuarter(qi),...weeksForQuarter((qi+1)%4)].filter(w=>w>wNum&&w>=now);
      const targetW=candidates[0]||weeksForQuarter((qi+1)%4).slice(-1)[0];
      const tk=weekKey(YEAR,targetW);
      const distDays=["Tue","Wed","Thu","Fri"];
      const usedDay=ev.scheduledDay||distDays[(p[tk]||[]).length%4];
      const movedEv={...ev,scheduledDay:usedDay,rescheduled:true,
        rescheduleCount:(ev.rescheduleCount||0)+1,
        originalWeek:ev.originalWeek||wNum,originalQuarter:ev.originalQuarter??qi};
      const updated={...p,[wk]:p[wk].filter((_,i)=>i!==idx)};
      updated[tk]=[...(updated[tk]||[]),movedEv];
      return updated;
    });
  }

  function exportJSON(){
    const events=[];
    Object.entries(schedule).forEach(([wk,evs])=>{
      evs.forEach(e=>{
        const base={weekKey:wk,scheduledDay:e.scheduledDay||"",type:e.type,
          confirmed:e.confirmed||false,rescheduled:e.rescheduled||false,
          adhoc:e.adhoc||false,outOfTown:e.outOfTown||false};
        if(e.type==="visit"){
          const site=SITE_MAP[e.siteId]||{};
          events.push({...base,siteId:e.siteId,siteName:e.siteName,siteType:e.siteType,
            region:e.region,zone:e.zone||"",address:e.address||site.address||"",
            franchiseeId:e.fid||site.fid||"",
            franchiseeName:e.fid?F_MAP[e.fid]?.name||"":""});
        } else if(e.type==="meeting"){
          events.push({...base,franchiseeId:e.franchiseeId,franchiseeName:e.franchiseeName,
            franchiseeRegion:e.franchiseeRegion,siteCount:e.siteCount,quarter:e.quarter});
        } else if(e.type==="adhoc"){
          events.push({...base,title:e.title||"",notes:e.notes||"",kind:e.kind||""});
        }
      });
    });
    const payload=JSON.stringify({exportedAt:new Date().toISOString(),year:YEAR,totalEvents:events.length,events},null,2);
    setExportData(payload);
    setExportModal(true);
  }

  function exportICS(){
    function eventDate(wk,dayLabel){
      const week=parseInt(wk.split("-W")[1]);
      const year=parseInt(wk.split("-W")[0]);
      const jan4=new Date(year,0,4);
      const w1mon=new Date(jan4); w1mon.setDate(jan4.getDate()-(jan4.getDay()+6)%7);
      const mon=new Date(w1mon); mon.setDate(w1mon.getDate()+(week-1)*7);
      const off={Mon:0,Tue:1,Wed:2,Thu:3,Fri:4}[dayLabel]||0;
      mon.setDate(mon.getDate()+off);
      return mon;
    }
    function icsDate(d,h=9,m=0){
      return `${d.getFullYear()}${String(d.getMonth()+1).padStart(2,"0")}${String(d.getDate()).padStart(2,"0")}T${String(h).padStart(2,"0")}${String(m).padStart(2,"0")}00`;
    }
    function esc(s){return (s||"").replace(/,/g,"\\,").replace(/;/g,"\\;").replace(/\n/g,"\\n");}
    const lines=["BEGIN:VCALENDAR","VERSION:2.0","PRODID:-//Bootlegger Scheduler//EN",
      "CALSCALE:GREGORIAN","METHOD:PUBLISH","X-WR-CALNAME:BL Field Schedule"];
    const seen=new Set();
    let idx=0;
    Object.entries(schedule).forEach(([wk,evs])=>{
      evs.forEach(e=>{
        const day=e.scheduledDay||"Mon";
        const d=eventDate(wk,day);
        let title="",location="",desc="";
        if(e.type==="visit"){
          const tm=TYPE_META[e.siteType]||TYPE_META.Full;
          const f=e.fid?F_MAP[e.fid]:null;
          title=`${tm.icon} ${e.siteName}`;
          location=esc(e.address||"");
          desc=esc([`Type: ${e.siteType}`,`Region: ${e.region}`,f?`Franchisee: ${f.name}`:"",e.outOfTown?"✈ Out of Town":"",e.confirmed?"✓ Confirmed":""].filter(Boolean).join("\\n"));
        } else if(e.type==="meeting"){
          title=`◆ Mtg — ${e.franchiseeName}`;
          desc=esc([`Region: ${e.franchiseeRegion}`,`Sites: ${e.siteCount}`,e.confirmed?"✓ Confirmed":""].filter(Boolean).join("\\n"));
        } else if(e.type==="adhoc"){
          title=e.title||e.kind||"Ad hoc";
          desc=esc(e.notes||"");
        } else { return; }
        lines.push("BEGIN:VEVENT",
          `UID:bl-${e.type}-${e.siteId||e.franchiseeId||idx++}-${wk}@bootlegger`,
          `DTSTART;TZID=Africa/Johannesburg:${icsDate(d,9,0)}`,
          `DTEND;TZID=Africa/Johannesburg:${icsDate(d,11,30)}`,
          `SUMMARY:${esc(title)}`,`LOCATION:${location}`,`DESCRIPTION:${desc}`,
          `STATUS:${e.confirmed?"CONFIRMED":"TENTATIVE"}`,
          "CATEGORIES:BL Scheduler","END:VEVENT");
        // Admin blocks (deduplicated per day)
        const aKey=`${wk}-${day}`;
        if(!seen.has(aKey)&&day!=="Mon"){
          seen.add(aKey);
          ["morning","afternoon"].forEach(t=>{
            const sh=t==="morning"?8:15, eh=t==="morning"?9:16;
            lines.push("BEGIN:VEVENT",
              `UID:bl-admin-${t}-${wk}-${day}@bootlegger`,
              `DTSTART;TZID=Africa/Johannesburg:${icsDate(d,sh,0)}`,
              `DTEND;TZID=Africa/Johannesburg:${icsDate(d,eh,0)}`,
              `SUMMARY:⬜ ${t==="morning"?"Morning":"Afternoon"} Admin / Focus`,
              "DESCRIPTION:Admin and planning block","STATUS:TENTATIVE",
              "CATEGORIES:BL Admin","END:VEVENT");
          });
        }
      });
    });
    lines.push("END:VCALENDAR");
    setIcsData(lines.join("\r\n"));
    setIcsModal(true);
  }

  const canSeeFranchisees = window.BOS_CAN_SEE_FRANCHISEES !== false;
  const scheduleForOverdue = canSeeFranchisees ? schedule : Object.fromEntries(
    Object.entries(schedule).map(([k,evs]) => [k, evs.filter(e => e.type !== "meeting")])
  );
  const allEvs=Object.values(schedule).flat();
  const visits=allEvs.filter(e=>e.type==="visit");
  const confirmed=visits.filter(e=>e.confirmed).length;
  const badgeEvs=Object.values(scheduleForOverdue).flat();
  const overdueCount=badgeEvs.filter(e=>{
    if(e.confirmed) return false;
    const wk=Object.keys(scheduleForOverdue).find(k=>(scheduleForOverdue[k]||[]).includes(e));
    return wk&&parseWeek(wk)<Math.max(isoWeek(new Date()),RESCHEDULE_FROM_WEEK);
  }).length;
  const rescheduledCount=badgeEvs.filter(e=>e.rescheduled&&!e.confirmed).length;
  const saveCol=saveStatus==="saving"?"#555":saveStatus==="error"?"#d08770":"#4a6a4a";
  const saveLabel=saveStatus==="saving"?"⟳ Saving…":saveStatus==="error"?"⚠ Error":"✓ Saved";
  const navItems=[
    {key:"routegrid",label:"Route Grid"},
    {key:"franchiseevisits",label:"Franchisee Visits"},
    ...(canSeeFranchisees ? [{key:"franchisees",label:"Franchisees"}] : []),
    {key:"sites",label:"All Sites"},
    {key:"overdue",label:overdueCount+rescheduledCount>0?`Overdue (${overdueCount+rescheduledCount})`:"Overdue"},
  ];
  const typeCounts={};ALL_SITES.forEach(s=>{typeCounts[s.type]=(typeCounts[s.type]||0)+1;});

  return(
    <div style={{minHeight:"100vh",background:"#0a0a0a",fontFamily:"Georgia,serif",color:"#f0ebe1"}}>

      {/* JSON Export Modal */}
      {exportModal&&(
        <div style={{position:"fixed",inset:0,background:"#000000cc",zIndex:300,display:"flex",alignItems:"center",justifyContent:"center",padding:24}} onClick={()=>setExportModal(false)}>
          <div onClick={e=>e.stopPropagation()} style={{background:"#141414",border:"1px solid #2a2a2a",borderRadius:10,padding:24,width:"min(680px,90vw)",maxHeight:"80vh",display:"flex",flexDirection:"column",gap:12}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div>
                <div style={{fontSize:14,fontWeight:800,color:"#f0ebe1",marginBottom:4}}>schedule.json — Export for SharePoint</div>
                <div style={{fontSize:11,color:"#666"}}>Click box → <strong style={{color:"#c8a96e"}}>Ctrl+A</strong> → <strong style={{color:"#c8a96e"}}>Ctrl+C</strong> → paste into Notepad → save as <code style={{color:"#c8a96e"}}>schedule.json</code> → upload to SharePoint BL-Scheduler folder</div>
              </div>
              <button onClick={()=>setExportModal(false)} style={{background:"transparent",border:"none",color:"#666",fontSize:20,cursor:"pointer",padding:"0 4px"}}>×</button>
            </div>
            <div style={{fontSize:10,color:"#555"}}>{exportData.length.toLocaleString()} characters · {Object.values(schedule).flat().length} events</div>
            <textarea readOnly value={exportData} onFocus={e=>e.target.select()} onClick={e=>e.target.select()}
              style={{flex:1,minHeight:320,background:"#0a0a0a",border:"2px solid #c8a96e44",color:"#a3be8c",borderRadius:5,padding:12,fontSize:10,fontFamily:"monospace",resize:"none",lineHeight:1.5,cursor:"text"}}/>
          </div>
        </div>
      )}

      {/* ICS Export Modal */}
      {icsModal&&(
        <div style={{position:"fixed",inset:0,background:"#000000cc",zIndex:300,display:"flex",alignItems:"center",justifyContent:"center",padding:24}} onClick={()=>setIcsModal(false)}>
          <div onClick={e=>e.stopPropagation()} style={{background:"#141414",border:"1px solid #2a2a2a",borderRadius:10,padding:24,width:"min(640px,90vw)",maxHeight:"85vh",display:"flex",flexDirection:"column",gap:12}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
              <div>
                <div style={{fontSize:14,fontWeight:800,color:"#f0ebe1",marginBottom:4}}>📅 Export to Outlook Calendar</div>
                <div style={{fontSize:11,color:"#666",lineHeight:1.5}}>Click box → <strong style={{color:"#8fbcbb"}}>Ctrl+A</strong> → <strong style={{color:"#8fbcbb"}}>Ctrl+C</strong> → open Notepad → paste → File → Save As → name it <code style={{color:"#8fbcbb"}}>BL_Schedule.ics</code> → set type to All Files → Save → double-click file to import into Outlook</div>
              </div>
              <button onClick={()=>setIcsModal(false)} style={{background:"transparent",border:"none",color:"#666",fontSize:20,cursor:"pointer",padding:"0 4px"}}>×</button>
            </div>
            <div style={{background:"#0d0d0d",border:"1px solid #1e1e1e",borderRadius:6,padding:"10px 14px",fontSize:10,lineHeight:1.8,color:"#666"}}>
              <span style={{color:"#f0ebe1",fontWeight:700}}>Outlook Web:</span> Same steps to save → go to outlook.com → Calendar → Add calendar → Upload from file → select BL_Schedule.ics
            </div>
            <div style={{fontSize:10,color:"#555"}}>{icsData.split("BEGIN:VEVENT").length-1} calendar events</div>
            <textarea readOnly value={icsData} onFocus={e=>e.target.select()} onClick={e=>e.target.select()}
              style={{flex:1,minHeight:280,background:"#0a0a0a",border:"2px solid #8fbcbb44",color:"#8fbcbb",borderRadius:5,padding:12,fontSize:9,fontFamily:"monospace",resize:"none",lineHeight:1.4,cursor:"text"}}/>
          </div>
        </div>
      )}

      {/* Header */}
      <div style={{background:"#070707",borderBottom:"1px solid #141414",padding:"0 24px",display:"flex",alignItems:"center",justifyContent:"space-between",height:52,position:"sticky",top:0,zIndex:100}}>
        <div style={{display:"flex",alignItems:"center",gap:12}}>
          <span style={{fontSize:12,fontWeight:900,letterSpacing:"0.2em",color:"#c8a96e"}}>BOOTLEGGER</span>
          <span style={{fontSize:10,color:"#2a2a2a"}}>·</span>
          <span style={{fontSize:10,color:"#3a3a3a",letterSpacing:"0.05em"}}>REGIONAL SCHEDULER {YEAR}</span>
          <span style={{fontSize:10,color:"#2a2a2a"}}>·</span>
          <span style={{fontSize:10,color:"#444"}}>WC · EC · Namibia · N. Cape · Fiscal Q: Mar–Feb</span>
        </div>
        <div style={{display:"flex",gap:6,alignItems:"center"}}>
          <span style={{fontSize:9,color:saveCol}}>{saveLabel}</span>
          <button onClick={()=>setSchedule(p=>applyReschedule(p))} style={{background:"transparent",border:"1px solid #222",borderRadius:4,color:"#444",padding:"3px 9px",fontSize:9,cursor:"pointer",fontFamily:"inherit"}}>↻ Reschedule</button>
          <button onClick={()=>{if(window.confirm("Reset to defaults?"))setSchedule(applyReschedule(buildSchedule()));}} style={{background:"transparent",border:"1px solid #1e1e1e",borderRadius:4,color:"#2a2a2a",padding:"3px 9px",fontSize:9,cursor:"pointer",fontFamily:"inherit"}}>Reset</button>
          <button onClick={exportJSON} style={{background:"#c8a96e22",border:"1px solid #c8a96e66",borderRadius:4,color:"#c8a96e",padding:"3px 9px",fontSize:9,cursor:"pointer",fontFamily:"inherit",fontWeight:700}}>⬇ Export JSON</button>
          <button onClick={exportICS} style={{background:"#8fbcbb22",border:"1px solid #8fbcbb66",borderRadius:4,color:"#8fbcbb",padding:"3px 9px",fontSize:9,cursor:"pointer",fontFamily:"inherit",fontWeight:700}}>📅 Export ICS</button>
          <div style={{width:1,height:16,background:"#1e1e1e",margin:"0 2px"}}/>
          {navItems.map(n=>{
            const isOD=n.key==="overdue"&&overdueCount+rescheduledCount>0;
            return(<button key={n.key} onClick={()=>setView(n.key)} style={{background:view===n.key?"#181818":"transparent",border:view===n.key?`1px solid ${isOD?"#d0877066":"#252525"}`:"1px solid transparent",color:view===n.key?(isOD?"#d08770":"#f0ebe1"):(isOD?"#d08770aa":"#444"),borderRadius:4,padding:"4px 11px",fontSize:11,cursor:"pointer",fontFamily:"inherit"}}>{n.label}</button>);
          })}
        </div>
      </div>

      {/* Stats bar */}
      <div style={{background:"#070707",borderBottom:"1px solid #111",padding:"7px 24px",display:"flex",gap:20,alignItems:"center",flexWrap:"wrap"}}>
        <select value={kpiPerson} onChange={e=>setKpiPerson(e.target.value)} style={{background:"#161616",border:"1px solid #2a2a2a",borderRadius:4,color:"#c8a96e",fontSize:10,padding:"4px 8px",fontFamily:"inherit"}}>
          <option value="__admin__">This Login's Schedule (detailed)</option>
          {kpiRefData && Object.values(kpiRefData.managers||{}).flat().map(fsm=><option key={fsm} value={fsm}>{fsm} (Route Grid)</option>)}
          {kpiRefData && Object.keys(kpiRefData.managers||{}).map(mgr=><option key={mgr} value={"__mgr__"+mgr}>{mgr==="Franlo"?"Franlo":mgr} — Manager (Route Grid)</option>)}
        </select>
        {kpiPerson==="__admin__" ? (
          [
            {label:"Sites",value:ALL_SITES.length,color:"#c8a96e"},
            {label:"Franchisees",value:FRANCHISEES.length,color:"#d08770"},
            {label:"Visits Planned",value:visits.length,color:"#8fbcbb"},
            {label:"Confirmed",value:confirmed,color:"#a3be8c"},
            {label:"Rescheduled",value:rescheduledCount,color:"#8fbcbb"},
            {label:"Overdue",value:overdueCount,color:overdueCount>0?"#d08770":"#333"},
          ].map(s=>(
            <div key={s.label} style={{display:"flex",alignItems:"center",gap:6}}>
              <span style={{fontSize:15,fontWeight:800,color:s.color}}>{s.value}</span>
              <span style={{fontSize:9,color:"#3a3a3a",letterSpacing:"0.06em",textTransform:"uppercase"}}>{s.label}</span>
            </div>
          ))
        ) : (
          (() => {
            if (!kpiRefData) return <span style={{fontSize:10,color:"#666"}}>Loading…</span>;
            const fsmStores = kpiRefData.fsmStores||{};
            const managers = kpiRefData.managers||{};
            const isManager = kpiPerson.startsWith("__mgr__");
            const mgrKey = isManager ? kpiPerson.replace("__mgr__","") : null;
            const homeRegion = isManager ? (mgrKey==="Franlo" ? "Western Cape" : "Gauteng")
              : (Object.entries(managers).find(([,fsms])=>fsms.includes(kpiPerson))||[])[0]==="Franlo" ? "Western Cape" : "Gauteng";
            const storeList = isManager
              ? Array.from(new Set([].concat(...(managers[mgrKey]||[]).map(f=>fsmStores[f]||[]))))
              : (fsmStores[kpiPerson]||[]);
            const plan = isManager ? managerRoutePlan(storeList, homeRegion) : fsmRoutePlan(storeList, homeRegion);
            const thisWeekIdx = isoWeek(new Date());
            const dayStart = absoluteWeekdayIndex(thisWeekIdx,0);
            const thisWeekVisits = [0,1,2,3,4].reduce((sum,d)=>sum+(plan[dayStart+d]||[]).length, 0);
            return (
              <>
                <div style={{display:"flex",alignItems:"center",gap:6}}>
                  <span style={{fontSize:15,fontWeight:800,color:"#c8a96e"}}>{storeList.length}</span>
                  <span style={{fontSize:9,color:"#3a3a3a",letterSpacing:"0.06em",textTransform:"uppercase"}}>Cafés Assigned</span>
                </div>
                <div style={{display:"flex",alignItems:"center",gap:6}}>
                  <span style={{fontSize:15,fontWeight:800,color:"#8fbcbb"}}>{thisWeekVisits}</span>
                  <span style={{fontSize:9,color:"#3a3a3a",letterSpacing:"0.06em",textTransform:"uppercase"}}>Visits This Week</span>
                </div>
                <span style={{fontSize:9,color:"#555",fontStyle:"italic"}}>From the Route Grid's rotation — not a detailed day-by-day itinerary like the admin schedule above.</span>
              </>
            );
          })()
        )}
        <div style={{marginLeft:"auto",display:"flex",gap:10}}>
          {Object.entries(typeCounts).map(([t,n])=><span key={t} style={{fontSize:9,color:"#3a3a3a"}}><span style={{color:TYPE_META[t]?.color}}>{TYPE_META[t]?.icon}</span> {t} ({n})</span>)}
        </div>
      </div>

      {/* Body */}
      <div style={{padding:"20px 24px",maxWidth:1300,margin:"0 auto"}}>
        {/* Weekly Schedule view retired — its confirm/reschedule/add-visit
            functionality now lives directly in the Route Grid below. */}
        {view==="routegrid"   && <RouteGridView selectedPerson={kpiPerson}/>}
        {view==="franchiseevisits" && <FranchiseeVisitsView/>}
        {view==="franchisees" && canSeeFranchisees && <FranchiseeView schedule={schedule}/>}
        {view==="sites"       && <SitesView schedule={schedule}/>}
        {view==="overdue"     && <OverdueView schedule={scheduleForOverdue} onToggle={toggle} onResetShuffle={resetAndShuffle}/>}
      </div>
    </div>
  );
}

function Root(){
  const [ready, setReady] = useState(false);
  const [ok, setOk] = useState(false);
  useEffect(() => {
    window.__bosSessionPromise.then(me => {
      setOk(!!me);
      setReady(true);
    });
  }, []);
  if (!ready) return null; // the HTML gate overlay is already covering the screen at this point
  if (!ok) return null;    // gate stays visible with its "sign in" message
  return <App />;
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<Root />);
</script>

<script>
// The transform below needs window.Babel from the CDN script tag in <head>.
// Under normal conditions that script finishes loading well before this
// point (it's a blocking, non-async tag near the top of the page) — but on a
// slow connection, or if the CDN request itself hiccups, it's possible to
// reach this line before Babel is actually attached to window. Rather than
// fail immediately with an opaque ReferenceError, wait briefly and retry
// before giving up, and give a real "reload" affordance if it truly can't load.
(function(){
  const source = document.getElementById('app-jsx-source').textContent;

  function showError(message){
    document.getElementById('root').innerHTML =
      '<div style="padding:60px;color:#d08770;font-family:-apple-system,sans-serif;max-width:520px;">' +
      '<div style="margin-bottom:14px;">Could not start the Team Scheduler: ' + message + '</div>' +
      '<button onclick="location.reload()" style="background:#c8a96e;border:none;border-radius:4px;color:#111;padding:8px 16px;font-size:13px;cursor:pointer;font-weight:700;">Reload Page</button>' +
      '</div>';
  }

  function runApp(){
    try {
      const compiled = Babel.transform(source, { presets: [['react', { runtime: 'classic' }]] }).code;
      (0, eval)(compiled);
    } catch (e) {
      console.error('Team Scheduler failed to load:', e);
      showError((e && e.message) ? e.message : String(e));
    }
  }

  function waitForBabel(attemptsLeft){
    if (window.__cdnLoadFailed) {
      console.error('Team Scheduler failed to load: ' + window.__cdnLoadFailed + ' failed to load from the CDN.');
      showError('A required library (' + window.__cdnLoadFailed + ') failed to load — check your internet connection. Try reloading.');
      return;
    }
    if (typeof Babel !== 'undefined') { runApp(); return; }
    if (attemptsLeft <= 0) {
      console.error('Team Scheduler failed to load: Babel did not load from the CDN in time.');
      showError('The page library (Babel) did not finish loading — this is usually a slow or blocked network request, not a bug in the page itself. Try reloading.');
      return;
    }
    setTimeout(() => waitForBabel(attemptsLeft - 1), 150);
  }

  waitForBabel(40); // up to ~6 seconds before giving up
})();
</script>
