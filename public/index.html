          </div>` : ''}
        </div>`;
      }).join('') : `<div class="empty-state">${subTab==='completed' ? 'No completed tasks match this filter.' : 'No open tasks match this filter.'}</div>`;

    document.querySelectorAll('[data-toggle-editlog]').forEach(el => el.addEventListener('click', () => {
      const box = document.getElementById('editlog_' + el.dataset.toggleEditlog);
      box.style.display = box.style.display === 'none' ? 'block' : 'none';
    }));
    document.querySelectorAll('.actEditToggleBtn').forEach(btn => btn.addEventListener('click', () => {
      const form = document.getElementById('editForm_' + btn.dataset.id);
      form.style.display = form.style.display === 'none' ? 'block' : 'none';
    }));
    document.querySelectorAll('.actSaveEditBtn').forEach(btn => btn.addEventListener('click', async () => {
      const id = btn.dataset.id;
      btn.disabled = true;
      try {
        if (btn.dataset.ops === '1') {
          await apiPatch('/api/ops-tasks/' + id, {
            department: document.getElementById('editDept_' + id).value,
            cafe: document.getElementById('editCafe_' + id).value,
            responsiblePerson: document.getElementById('editResp_' + id).value || null,
            submitterName: document.getElementById('editSubmitter_' + id).value,
            comments: document.getElementById('editComments_' + id).value,
          });
          await loadOpsTasksForTracker();
        } else {
          await apiPatch('/api/actions/' + id, {
            store: document.getElementById('editStore_' + id).value,
            fsm: document.getElementById('editFsm_' + id).value,
            pillar: document.getElementById('editPillar_' + id).value,
            owner: document.getElementById('editOwner_' + id).value,
            description: document.getElementById('editDescription_' + id).value,
          });
          await refreshState();
        }
        toast('Task updated');
        render();
      } catch(e) { toast(e.message || 'Could not save changes'); btn.disabled = false; }
    }));

    document.querySelectorAll('.actOpsPhotoThumb').forEach(img => img.addEventListener('click', () => {
      const overlay = document.createElement('div');
      overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:9999;display:flex;align-items:center;justify-content:center;cursor:zoom-out;';
      overlay.innerHTML = `<img src="${img.dataset.src}" style="max-width:92vw;max-height:92vh;border-radius:6px;">`;
      overlay.addEventListener('click', () => overlay.remove());
      document.body.appendChild(overlay);
    }));
    document.querySelectorAll('.actOpsCompleteBtn').forEach(btn => btn.addEventListener('click', async () => {
      const comment = prompt('Add a comment about how this was resolved (optional):');
      if (comment === null) return; // cancelled
      btn.disabled = true;
      try { await apiPatch('/api/ops-tasks/' + btn.dataset.id + '/complete', { comment: comment.trim() || undefined }); await loadOpsTasksForTracker(); render(); }
      catch(e) { toast(e.message || 'Could not complete task'); btn.disabled = false; }
    }));

    document.querySelectorAll('[data-toggle-comments]').forEach(el => el.addEventListener('click', () => {
      const box = document.getElementById('comments_' + el.dataset.toggleComments);
      box.style.display = box.style.display === 'none' ? 'block' : 'none';
    }));
    document.querySelectorAll('.actCompleteBtn, .actResolveBtn').forEach(btn => btn.addEventListener('click', async () => {
      const comment = prompt('Add a closing comment before marking this task complete:');
      if (comment === null) return; // cancelled
      if (!comment.trim()) { toast('A comment is required to close a task'); return; }
      btn.disabled = true;
      try { await apiPatch('/api/actions/' + btn.dataset.id, { status: 'closed', comment: comment.trim() }); await refreshState(); render(); }
      catch(e) { toast(e.message || 'Could not update — check connection and try again'); btn.disabled = false; }
    }));
    document.querySelectorAll('.actReopenBtn').forEach(btn => btn.addEventListener('click', async () => {
      const comment = prompt('Add a comment explaining why this task is being reopened:');
      if (comment === null) return;
      if (!comment.trim()) { toast('A comment is required to reopen a task'); return; }
      btn.disabled = true;
      try { await apiPatch('/api/actions/' + btn.dataset.id, { status: 'open', comment: comment.trim() }); await refreshState(); render(); }
      catch(e) { toast(e.message || 'Could not reopen — check connection and try again'); btn.disabled = false; }
    }));
    document.querySelectorAll('.actExtendBtn').forEach(btn => btn.addEventListener('click', async () => {
      const newDate = document.getElementById('extendDate_' + btn.dataset.id).value;
      if (!newDate) { toast('Pick a new due date first'); return; }
      btn.disabled = true;
      try { await apiPatch('/api/actions/' + btn.dataset.id, { dueDate: newDate, comment: 'Due date updated to ' + newDate }); await refreshState(); render(); }
      catch(e) { toast(e.message || 'Could not update due date'); btn.disabled = false; }
    }));
    document.querySelectorAll('.actCommentBtn').forEach(btn => btn.addEventListener('click', async () => {
      const input = document.getElementById('commentInput_' + btn.dataset.id);
      const text = input.value.trim();
      if (!text) { toast('Write an update before adding it'); return; }
      btn.disabled = true;
      try { await apiPatch('/api/actions/' + btn.dataset.id, { comment: text }); await refreshState(); render();
        setTimeout(() => { const box = document.getElementById('comments_' + btn.dataset.id); if (box) box.style.display = 'block'; }, 0);
      }
      catch(e) { toast(e.message || 'Could not add update'); btn.disabled = false; }
    }));
  }

  function exportCsv(){
    const rows = filteredRows();
    const header = ['Store','FSM','Pillar','Description','Owner','Due Date','Status'];
    const csvRows = rows.map(a => [a.store,a.fsm,a.pillar,a.description,a.owner,a.dueDate,a.status].map(v => `"${String(v||'').replace(/"/g,'""')}"`).join(','));
    const csv = [header.join(','), ...csvRows].join('\n');
    const blob = new Blob([csv], { type:'text/csv' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = (subTab==='completed' ? 'completed-tasks-' : 'open-tasks-') + todayISO() + '.csv';
    a.click();
  }

  document.getElementById('actFsm').addEventListener('change', render);
  document.getElementById('actPillar').addEventListener('change', render);
  document.getElementById('actStatus').addEventListener('change', render);
  document.getElementById('actSearch').addEventListener('input', render);
  document.querySelectorAll('#taskSubTab .segmented-btn').forEach(btn => btn.addEventListener('click', () => {
    subTab = btn.dataset.sub;
    document.querySelectorAll('#taskSubTab .segmented-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    render();
  }));
  document.getElementById('actClear').addEventListener('click', () => {
    document.getElementById('actFsm').value=''; document.getElementById('actPillar').value='';
    document.getElementById('actStatus').value=''; document.getElementById('actSearch').value='';
    render();
  });
  document.getElementById('actRefresh').addEventListener('click', async () => { await refreshState(); await loadOpsTasksForTracker(); render(); });
  document.getElementById('actExportCsv').addEventListener('click', exportCsv);
  document.getElementById('actExportPdf').addEventListener('click', () => window.print());

  render();
  loadOpsTasksForTracker().then(render);
}

/* ============================================================
   VIEW: LTL AUDITS
   ============================================================ */
function viewLTL(){
  document.getElementById('app').innerHTML = `
    <div class="page-header">
      <div><div class="page-title">LTL Audit Dashboard</div><div class="page-subtitle">Looks, Tastes, Like — Brand Standards Audit</div></div>
      <div class="period-badge">AT-RISK THRESHOLD &lt;85%</div>
    </div>
    <div class="grid-2-1">
      <div class="card">
        <div class="section-title">Per-FSM Average LTL Score</div>
        <div id="ltlAvg"></div>
      </div>
      <div class="card">
        <div class="section-title">Open NCs Aged &gt; 7 Days</div>
        <div id="ltlAging"></div>
      </div>
    </div>
    <div class="section-divider"></div>
    <div class="card" id="ltlRiskCard">
      <div class="section-title">Stores At Risk — Below 85% and Overdue NC</div>
      <div id="ltlRisk"></div>
    </div>
    <div class="section-divider"></div>
    <div class="card" id="ltlUploadCard">
      <div class="section-title">Upload Audit Report</div>
      <div class="wrap-copy" style="margin-bottom:10px;">CSV with columns: fsm, store, date, score, cspi, ncRaised, ncClosed, notes. Header row required.</div>
      <input type="file" id="ltlFileInput" accept=".csv">
      <div id="ltlUploadPreview" style="margin-top:10px;"></div>
      <button class="btn btn-gold" id="ltlUploadBtn" style="margin-top:10px;" disabled>Upload Report</button>
    </div>
    <div class="section-divider"></div>
    <div class="card"><div class="section-title">Audit History</div><div id="ltlHistory"></div></div>
  `;

  let pendingRows = [];

  function parseCsv(text){
    const lines = text.split(/\r?\n/).filter(l => l.trim().length);
    if (!lines.length) return [];
    const header = lines[0].split(',').map(h => h.trim().toLowerCase());
    return lines.slice(1).map(line => {
      const cells = line.split(',').map(c => c.trim());
      const row = {};
      header.forEach((h,i) => row[h] = cells[i] !== undefined ? cells[i] : '');
      return row;
    });
  }

  document.getElementById('ltlFileInput').addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      try {
        const rows = parseCsv(reader.result);
        const valid = rows.filter(r => r.fsm && r.store && r.date && r.score !== '');
        pendingRows = valid;
        document.getElementById('ltlUploadPreview').innerHTML = valid.length
          ? `<div class="empty-state" style="padding:6px 0;color:var(--green);">${valid.length} row(s) ready to upload (of ${rows.length} in file).</div>
             <table class="data-table"><thead><tr><th>FSM</th><th>Store</th><th>Date</th><th>Score</th></tr></thead>
             <tbody>${valid.slice(0,10).map(r=>`<tr><td>${r.fsm}</td><td>${r.store}</td><td>${r.date}</td><td>${r.score}</td></tr>`).join('')}</tbody></table>
             ${valid.length>10?`<div style="font-size:11px;color:var(--grey-500);">+ ${valid.length-10} more</div>`:''}`
          : '<div class="empty-state" style="color:var(--red);">No valid rows found — check the column headers match fsm, store, date, score.</div>';
        document.getElementById('ltlUploadBtn').disabled = valid.length === 0;
      } catch(err) {
        document.getElementById('ltlUploadPreview').innerHTML = '<div class="empty-state" style="color:var(--red);">Could not read this file as CSV.</div>';
      }
    };
    reader.readAsText(file);
  });

  document.getElementById('ltlUploadBtn').addEventListener('click', async () => {
    const btn = document.getElementById('ltlUploadBtn');
    btn.disabled = true; btn.textContent = 'Uploading...';
    let ok = 0, failed = 0;
    for (const r of pendingRows) {
      try {
        await apiPost('/api/ltl', { fsm:r.fsm, store:r.store, date:r.date, score:Number(r.score), cspi:Number(r.cspi||0), ncRaised:Number(r.ncraised||r.ncRaised||0), ncClosed:Number(r.ncclosed||r.ncClosed||0), notes:r.notes||'' });
        ok++;
      } catch(e) { failed++; }
    }
    await refreshState();
    toast(`Uploaded ${ok} audit(s)${failed?`, ${failed} failed`:''}`);
    viewLTL();
  });

  function renderAll(){
    const avgByFsm = FSM_LIST.map(f => {
      const audits = STATE.ltlAudits.filter(a=>a.fsm===f);
      const avg = audits.length ? audits.reduce((s,a)=>s+Number(a.score),0)/audits.length : null;
      return { f, avg, count: audits.length };
    });
    document.getElementById('ltlAvg').innerHTML = avgByFsm.map(x => `
      <div style="display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--grey-200);font-size:12px;">
        <span>${x.f}</span>
        <span>
          <span class="rag-text ${x.avg===null?'na':(x.avg<85?'red':'green')}">${x.avg===null?'No audits':fmtPct(x.avg,0)+' ('+x.count+')'}</span>
          ${x.avg!==null && x.avg<85 ? '<span class="badge red" style="margin-left:6px;">AT RISK</span>' : ''}
        </span>
      </div>`).join('');

    const aging = STATE.ltlAudits.filter(a => Number(a.ncRaised) > Number(a.ncClosed) && daysAgo(a.date) > 7);
    document.getElementById('ltlAging').innerHTML = aging.length ? `<ul class="flag-list">${aging.map(a=>`<li><span>${a.store} (${a.fsm})</span><span class="rag-text red">${a.ncRaised-a.ncClosed} open, ${daysAgo(a.date)}d</span></li>`).join('')}</ul>` : '<div class="empty-state">No aged NCs.</div>';

    // Stores at risk: latest score < 85 AND has an aged open NC
    const latestByStore = {};
    [...STATE.ltlAudits].sort((a,b)=>a.date.localeCompare(b.date)).forEach(a => { latestByStore[a.store] = a; });
    const agingStores = new Set(aging.map(a=>a.store));
    const atRisk = Object.values(latestByStore).filter(a => Number(a.score) < 85 && agingStores.has(a.store));
    document.getElementById('ltlRisk').innerHTML = atRisk.length ? `
      <table class="data-table">
        <thead><tr><th>Store</th><th>FSM</th><th>Latest Score</th><th>Open NCs</th><th>NC Age</th></tr></thead>
        <tbody>${atRisk.map(a => {
          const agedEntry = aging.find(x=>x.store===a.store);
          return `<tr>
            <td>${a.store}</td><td>${a.fsm}</td>
            <td class="rag-text red">${fmtPct(Number(a.score),0)}</td>
            <td class="rag-text red">${agedEntry.ncRaised-agedEntry.ncClosed}</td>
            <td>${daysAgo(agedEntry.date)}d</td>
          </tr>`;
        }).join('')}</tbody>
      </table>` : '<div class="empty-state">No stores currently below 85% with an aged open NC.</div>';

    const hist = [...STATE.ltlAudits].sort((a,b)=>b.date.localeCompare(a.date));
    document.getElementById('ltlHistory').innerHTML = hist.length ? `
      <table class="data-table">
        <thead><tr><th>Date</th><th>Store</th><th>FSM</th><th>LTL</th><th>CSPI</th><th>NCs</th></tr></thead>
        <tbody>${hist.map(a => `<tr><td>${a.date}</td><td>${a.store}</td><td>${a.fsm}</td><td class="rag-text ${Number(a.score)<85?'red':'green'}">${a.score}</td><td>${a.cspi}</td><td>${a.ncClosed}/${a.ncRaised} closed</td></tr>`).join('')}</tbody>
      </table>` : '<div class="empty-state">No audits logged yet.</div>';
  }
  renderAll();
}

    </div>
  `;
  function prefill(){
    const fsm = document.getElementById('wrFsm').value;
    const stores = fsmStoresList(fsm);
    const trade = tradeHealth(stores);
    const gaapRows = stores.map(s=>({s,g:gaapOf(s)})).filter(r=>r.g!==null);
    const worstTrade = gaapRows.length ? gaapRows.reduce((a,b)=>b.g<a.g?b:a) : null;
    const std = standardsScore(stores);
    const ktRows = stores.map(s=>({s,kt:keytechOf(s)})).filter(r=>r.kt!==null);
    const lowestStd = ktRows.length ? ktRows.reduce((a,b)=>b.kt<a.kt?b:a) : null;
    const bb = bbetterScore(fsm, stores);

    const weekAgo = new Date(); weekAgo.setDate(weekAgo.getDate()-7);
    const weekAgoStr = weekAgo.toISOString().slice(0,10);
    const visitsThisWeek = STATE.visits.filter(v=>v.fsm===fsm && v.date>=weekAgoStr);
    const closedThisWeek = STATE.actions.filter(a=>a.fsm===fsm && a.status==='closed' && a.closedDate>=weekAgoStr);
    const openTotal = STATE.actions.filter(a=>a.fsm===fsm && a.status!=='closed').length;

    document.getElementById('wrG').value = `Visited ${visitsThisWeek.length} store(s) this week${visitsThisWeek.length? ': '+visitsThisWeek.map(v=>v.store).join(', ')+'.' : '.'} [Add a note on team morale / culture observed.]`;

    document.getElementById('wrI').value = `KeyTech average across my portfolio is ${fmtPct(std.pct,0)}. ${lowestStd? lowestStd.s+' is lowest at '+fmtPct(lowestStd.kt,0)+'.' : 'No KeyTech data for portfolio.'} B-Better portfolio average is ${fmtPct(bb.pct,0)}.`;
    document.getElementById('wrN').value = `This week ${trade.positive||0} of my ${trade.withData||0} stores with data are trading above prior year. ${worstTrade? worstTrade.s+' is my biggest concern — '+fmtSigned(worstTrade.g)+' YOY.' : 'No GAAP data available for a concern store.'}`;
    document.getElementById('wrD').value = `${closedThisWeek.length} action(s) closed this week, ${openTotal} remain open. [State the ONE priority you're driving next week, owner + due date.]`;
  }
  document.getElementById('wrFsm').addEventListener('change', prefill);
  document.getElementById('wrCopy').addEventListener('click', () => {
    const fsm = document.getElementById('wrFsm').value;
    const text = `${fsm.toUpperCase()} — WEEKLY REPORT (GRIND) — ${new Date().toDateString()}\n\n` +
      `G — GREET\n${document.getElementById('wrG').value}\n\n` +
      `R — READ\n${document.getElementById('wrR').value}\n\n` +
      `I — INSPECT\n${document.getElementById('wrI').value}\n\n` +
      `N — NUMBERS\n${document.getElementById('wrN').value}\n\n` +
      `D — DRIVE\n${document.getElementById('wrD').value}`;
    navigator.clipboard.writeText(text).then(()=>toast('Weekly report copied'));
  });
  prefill();
}

          <tr><td>Trade Health</td><td>${fmtPct(k.trade.pct,0)}</td></tr>
          <tr><td>Flow (KeyTech)</td><td>${fmtPct(k.standards.pct,0)}</td></tr>
          <tr><td>B-Better</td><td>${fmtPct(k.bbetter.pct,0)}</td></tr>
          <tr><td>Visit Frequency</td><td>${fmtPct(k.visit.pct,0)}</td></tr>
          <tr><td>Actions Closed</td><td>${fmtPct(k.actions.pct,0)}</td></tr>
        </tbody></table>
      </div>`;
    }).join('')}
  `;
}

/* ============================================================
   VIEW: ADMIN (user management — admin role only)
   ============================================================ */
function viewAdmin(){
  document.getElementById('app').innerHTML = `
    <div class="page-header">
      <div><div class="page-title">Admin — User Management</div><div class="page-subtitle">Create logins and set editor / viewer access</div></div>
    </div>
    <div class="grid-2-1">
      <div class="card">
        <div class="section-title">Add User</div>
        <label class="field-label">Username</label><input type="text" id="admUsername" autocomplete="off">
        <label class="field-label">Display Name</label><input type="text" id="admDisplayName" autocomplete="off">
        <label class="field-label">Temporary Password</label><input type="text" id="admPassword" autocomplete="off" placeholder="min. 8 characters">
        <label class="field-label">Role</label>
        <select id="admRole">
          <option value="viewer">Viewer — read-only mirror access</option>
          <option value="editor">Editor — can log visits / close actions</option>
          <option value="admin">Admin — editor + user management</option>
        </select>
        <button class="btn btn-gold" id="admCreate" style="margin-top:14px;">Create User</button>
      </div>
      <div class="card">
        <div class="section-title">About Roles</div>
        <div class="wrap-copy">Admin — full access, plus this screen.
Editor — can log visits, close actions, log LTL audits and trainer visits.
Viewer — the "mirror" dashboard: sees everything live, cannot change anything.

Share the app URL with everyone. Each person signs in with their own username/password and sees the version of the dashboard that matches their role.</div>
      </div>
    </div>
    <div class="section-divider"></div>
    <div class="card">
      <div class="section-title">Existing Users</div>
      <div id="admUserTable"></div>
    </div>
  `;
  async function loadUsers(){
    try {
      const users = await apiGet('/api/admin/users');
      document.getElementById('admUserTable').innerHTML = `
        <table class="data-table">
          <thead><tr><th>Username</th><th>Display Name</th><th>Role</th><th>Status</th><th></th></tr></thead>
          <tbody>${users.map(u => `
            <tr>
              <td>${u.username}</td>
              <td>${u.display_name || ''}</td>
              <td>
                <select class="admRoleSel" data-id="${u.id}" ${u.username===USERNAME?'disabled':''}>
                  <option value="viewer" ${u.role==='viewer'?'selected':''}>Viewer</option>
                  <option value="editor" ${u.role==='editor'?'selected':''}>Editor</option>
                  <option value="admin" ${u.role==='admin'?'selected':''}>Admin</option>
                </select>
              </td>
              <td>${u.active ? '<span class="badge green">ACTIVE</span>' : '<span class="badge red">DISABLED</span>'}</td>
              <td><button class="btn btn-outline admToggleBtn" data-id="${u.id}" data-active="${u.active}" ${u.username===USERNAME?'disabled':''}>${u.active?'Disable':'Enable'}</button></td>
            </tr>
          `).join('')}</tbody>
        </table>`;
      document.querySelectorAll('.admRoleSel').forEach(sel => sel.addEventListener('change', async () => {
        try { await apiFetchAdmin(sel.dataset.id, { role: sel.value }); toast('Role updated'); loadUsers(); }
        catch(e){ toast(e.message || 'Could not update role'); loadUsers(); }
      }));
      document.querySelectorAll('.admToggleBtn').forEach(btn => btn.addEventListener('click', async () => {
        const nowActive = btn.dataset.active === 'true';
        try { await apiFetchAdmin(btn.dataset.id, { active: !nowActive }); toast(nowActive?'User disabled':'User enabled'); loadUsers(); }
        catch(e){ toast(e.message || 'Could not update user'); }
      }));
    } catch(e) {
      if (e.message !== 'unauthorized') document.getElementById('admUserTable').innerHTML = '<div class="empty-state">Could not load users.</div>';
    }
  }
  async function apiFetchAdmin(id, body){
    const res = await fetch('/api/admin/users/' + id, { method:'PATCH', headers: Object.assign({'Content-Type':'application/json'}, authHeaders()), body: JSON.stringify(body) });
    if (!res.ok) { const e = await res.json().catch(()=>({})); throw new Error(e.error); }
    return res.json();
  }
  document.getElementById('admCreate').addEventListener('click', async () => {
    const username = document.getElementById('admUsername').value.trim();
    const displayName = document.getElementById('admDisplayName').value.trim();
    const password = document.getElementById('admPassword').value;
    const role = document.getElementById('admRole').value;
    if (!username || !password) { toast('Username and password are required'); return; }
    try {
      const res = await fetch('/api/admin/users', { method:'POST', headers: Object.assign({'Content-Type':'application/json'}, authHeaders()), body: JSON.stringify({ username, password, role, displayName }) });
      const data = await res.json();
      if (!res.ok) { toast(data.error || 'Could not create user'); return; }
      toast('User created — share the username/password with them');
      document.getElementById('admUsername').value = '';
      document.getElementById('admDisplayName').value = '';
      document.getElementById('admPassword').value = '';
      loadUsers();
    } catch(e) { toast('Could not reach server'); }
  });
  loadUsers();
}

/* ============================================================
   VIEW: VISIT REPORTS — every submitted GRIND café support summary
   ============================================================ */
function viewVisitReports(){
  document.getElementById('app').innerHTML = `
    <div class="page-header">
      <div><div class="page-title">Visit Reports</div><div class="page-subtitle">Every submitted GRIND café support summary, with linked tasks and PDF download</div></div>
    </div>
    <div class="filter-row no-print">
      <input type="text" id="vrSearch" placeholder="Search store or FSM...">
      <select id="vrTypeFilter"><option value="">All Types</option><option value="Support Visit">Support Visit</option><option value="Trainer Visit">Trainer Visit</option></select>
    </div>
    <div id="vrTableWrap"></div>
    <div id="vrPrintArea" style="display:none;"></div>
  `;

  function render(){
    const search = document.getElementById('vrSearch').value.toLowerCase();
    const typeFilter = document.getElementById('vrTypeFilter').value;
    const rows = [...STATE.visits]
      .filter(v => (!typeFilter || v.type === typeFilter) && (!search || v.store.toLowerCase().includes(search) || v.fsm.toLowerCase().includes(search)))
      .sort((a,b) => b.date.localeCompare(a.date));

    document.getElementById('vrTableWrap').innerHTML = rows.length ? `
      <table class="data-table">
        <thead><tr><th>Date</th><th>Store</th><th>FSM</th><th>Type</th><th>Flagged</th><th>Tasks</th><th></th></tr></thead>
        <tbody>${rows.map(v => {
          const fr = v.fullReport;
          const flagCount = fr && fr.nextSteps ? Object.keys(fr.nextSteps).filter(k => fr.nextSteps[k] && fr.nextSteps[k].action).length : null;
          const linkedActions = STATE.actions.filter(a => a.visitId === v.id);
          const open = linkedActions.filter(a => a.status !== 'closed').length;
          return `<tr>
            <td>${v.date}</td><td>${v.store}</td><td>${v.fsm}</td><td>${v.type}</td>
            <td>${flagCount===null ? '—' : flagCount}</td>
            <td>${linkedActions.length}${open ? ` <span class="badge amber">${open} open</span>` : ''}</td>
            <td style="white-space:nowrap;">
              <button class="btn btn-outline vrViewBtn" data-id="${v.id}">View / PDF</button>
              ${isEditor() && fr ? `<button class="btn btn-outline vrEditBtn" data-id="${v.id}" style="margin-left:4px;">Edit</button>` : ''}
              ${isAdmin() ? `<button class="btn btn-outline vrDeleteBtn" data-id="${v.id}" style="color:var(--red);border-color:var(--red);margin-left:4px;">Delete</button>` : ''}
            </td>
          </tr>`;
        }).join('')}</tbody>
      </table>` : '<div class="empty-state">No visit reports match this filter.</div>';

    document.querySelectorAll('.vrViewBtn').forEach(btn => btn.addEventListener('click', () => openVisitReport(btn.dataset.id, rows)));
    document.querySelectorAll('.vrEditBtn').forEach(btn => btn.addEventListener('click', () => {
      window.location.href = '/log-support-visit.html?editVisitId=' + encodeURIComponent(btn.dataset.id);
    }));
    document.querySelectorAll('.vrDeleteBtn').forEach(btn => btn.addEventListener('click', () => deleteVisitReport(btn.dataset.id)));
  }

  async function deleteVisitReport(id){
    const v = STATE.visits.find(r => r.id === id);
    if (!v) return;
    if (!confirm(`Delete the ${v.type} report for ${v.store} on ${v.date}?\n\nThis removes the report and its photos permanently. Any tasks it already created in the Task Tracker will NOT be deleted — remove those separately if needed.`)) return;
    try {
      await apiDelete('/api/visits/' + id);
      STATE.visits = STATE.visits.filter(r => r.id !== id);
      toast('Visit report deleted');
      render();
    } catch (e) {
      toast(e.message || 'Could not delete visit report');
    }
  }

  function escapeHtmlVR(s){ return (s==null?'':String(s)).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

  // Mirrors the data model in log-support-visit.html (SHARED_ITEMS / SECTIONS /
  // GRIND_RESET / ADMIN / QC_TASTING_CATS) so stored IDs can be turned back
  // into readable labels for the report.
  const VR_SHARED_ITEMS = [
    { key: 'checklist', text: 'Checklist (Latest, including related SOP\'s)' },
    { key: 'hygiene', text: 'Hygiene & cleanliness' },
  ];
  const VR_SECTIONS = [
    { key: 'service', label: 'Service (FOH)', tag: 'FOH', extra: [
        { key: 'stepsofservice', text: 'Steps of Service' },
      ], portion: false },
    { key: 'coffee', label: 'Coffee (Bar)', tag: 'Bar', extra: [
        { key: 'coffeecheck', text: 'Coffee check — shot times & extraction, ask barista to pull a shot' },
        { key: 'ordertimes', text: 'Order times — spot check bar ticket times' },
      ], portion: true },
    { key: 'quality', label: 'Quality (BOH)', tag: 'BOH', extra: [
        { key: 'ordertimes', text: 'Order times — spot check kitchen ticket times' },
      ], portion: true },
  ];
  const VR_GRIND_RESET = [
    { id: 'gr-vibe', text: 'Vibe & feel — flow, control, temp, music on, lighting, customer faces' },
    { id: 'gr-devices', text: 'Devices — MrD & UE tablets on/working, Flow device live to recipe, BBM screens accurate' },
    { id: 'gr-mgmt', text: 'Management presence & control' },
    { id: 'gr-staffing', text: 'Staffing — adequately staffed; mgmt/supervisor on shift & uniformed' },
    { id: 'gr-retail', text: 'Retail & displays — tags, pricing recon, range, appeal, tidiness vs. planogram, incl. cake & pasteis' },
    { id: 'gr-flojet', text: 'Flojet test — works, team can operate, emergency water available (pre-communicate, trade-dependent)' },
    { id: 'gr-plants', text: 'Plants & plant boxes — condition & clean (store dependent)' },
    { id: 'gr-masterfile', text: 'Google, App & Masterfile aligned & up to date — if not, log on task tracker' },
  ];
  const VR_ADMIN = [
    { id: 'a1', text: 'Café status update with franchisee/senior manager — Flow, turnover, B.Better, all KPIs' },
    { id: 'a2', text: 'Check servicing records' },
    { id: 'a3', text: 'Outstanding tasks / non-conformances — Tracker & LTL' },
  ];
  const VR_QC_TASTING_CATS = ['Coffee', 'New Beverages', 'New Dishes', 'Base Sauces'];

  function vrActionLabel(step) {
    if (!step || !step.action) return 'Not yet assigned';
    if (step.action === 'satisfactory') return 'Satisfactory Outcome — No Action ✓';
    if (step.action === 'retrained') return 'Retrained and Rectified ✓';
    if (step.action === 'na') return 'N/A ✓';
    if (step.action === 'tasktracker') return 'Logged on Task Tracker' + (step.owner ? ' — Owner: ' + escapeHtmlVR(step.owner) : '') + (step.dueDate ? ', Due: ' + step.dueDate : '');
    return 'Not yet assigned';
  }
  function vrPhotosBlock(photos) {
    if (!photos || !photos.length) return '';
    return `<div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:6px;">` +
      photos.map(src => `<img src="${src}" style="width:72px;height:72px;object-fit:cover;border:1px solid #d4d4d4;border-radius:2px;">`).join('') +
      `</div>`;
  }
  function vrItemBlock(text, id, fr) {
    const comment = ((fr.comments||{})[id] || '').trim();
    const photos = (fr.photos||{})[id] || [];
    const step = (fr.nextSteps||{})[id];
    const hasAction = !!(step && step.action);
    const flagged = !!comment || hasAction;
    return `
    <div style="padding:8px 0;border-bottom:1px solid #ebebeb;">
      <div style="font-weight:700;font-size:11.5px;">${escapeHtmlVR(text)}</div>
      <div style="font-size:11px;color:${flagged ? '#8f733f' : '#aaaaaa'};border:1px solid ${flagged ? '#c8ae79' : '#ebebeb'};background:${flagged ? 'rgba(200,174,121,0.10)' : '#fafafa'};padding:5px 8px;margin-top:5px;min-height:13px;">${comment ? escapeHtmlVR(comment) : '&nbsp;'}</div>
      ${vrPhotosBlock(photos)}
      ${hasAction ? `<div style="font-size:10px;color:#1a7a44;margin-top:4px;">→ ${vrActionLabel(step)}</div>` : ''}
    </div>`;
  }
  // Team Q&A entries print as plain question/answer text — no boxed
  // comment styling (that's reserved for flagged checklist items).
  function vrTeamQaBlock(entry) {
    const label = entry.q ? escapeHtmlVR(entry.q) : 'Team Q&A';
    const answer = (entry.c || '').trim();
    return `<div style="padding:6px 0;border-bottom:1px solid #ebebeb;font-size:11.5px;">
      <b>${label}</b>${answer ? ' — ' + escapeHtmlVR(answer) : ''}
    </div>`;
  }
  // Portion check entries print as plain item/comment text — no boxed
  // comment styling — but still show the next-step action if one was chosen.
  function vrPortionBlock(p, id, fr) {
    const item = (p.item || '').trim();
    const comment = (p.comment || '').trim();
    if (!item && !comment) return '';
    const step = (fr.nextSteps || {})[id];
    const hasAction = !!(step && step.action);
    return `<div style="padding:6px 0;border-bottom:1px solid #ebebeb;font-size:11.5px;">
      <b>${item ? escapeHtmlVR(item) : 'Portion check'}</b>${comment ? ' — ' + escapeHtmlVR(comment) : ''}
      ${hasAction ? `<div style="font-size:10px;color:#1a7a44;margin-top:2px;">→ ${vrActionLabel(step)}</div>` : ''}
    </div>`;
  }
  function vrSectionBlock(tag, label, bodyHtml) {
    if (!bodyHtml) return '';
    return `
    <div style="margin-top:16px;border:1px solid #ebebeb;">
      <div style="background:#1a1a1a;color:#fff;padding:8px 14px;display:flex;align-items:center;gap:8px;">
        <span style="background:#c8ae79;color:#1a1a1a;font-size:9px;font-weight:800;padding:2px 7px;text-transform:uppercase;letter-spacing:0.05em;">${escapeHtmlVR(tag)}</span>
        <span style="font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:0.03em;">${escapeHtmlVR(label)}</span>
      </div>
      <div style="padding:2px 14px;">${bodyHtml}</div>
    </div>`;
  }
  function vrHeader(v) {
    return `
    <div style="background:#1a1a1a;color:#fff;padding:16px 22px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:6px;">
      <div style="font-weight:800;letter-spacing:0.2em;font-size:15px;text-transform:uppercase;">BOOTLEGGER<span style="color:#c8ae79;">.</span> <span style="font-weight:400;font-size:9px;letter-spacing:0.1em;color:#999;margin-left:6px;">COFFEE CO.</span></div>
      <div style="font-size:10px;color:#c8ae79;text-transform:uppercase;letter-spacing:0.08em;">GRIND Café Support Summary</div>
    </div>
    <div style="border:1px solid #ebebeb;border-top:3px solid #c8ae79;padding:14px 18px;display:grid;grid-template-columns:repeat(3,1fr);gap:10px 16px;font-size:11px;">
      <div><div style="text-transform:uppercase;color:#999;font-size:9px;letter-spacing:0.06em;">Store</div><div style="font-weight:700;">${escapeHtmlVR(v.store||'—')}</div></div>
      <div><div style="text-transform:uppercase;color:#999;font-size:9px;letter-spacing:0.06em;">Date</div><div style="font-weight:700;">${escapeHtmlVR(v.date||'—')}</div></div>
      <div><div style="text-transform:uppercase;color:#999;font-size:9px;letter-spacing:0.06em;">Visit Type</div><div style="font-weight:700;">${escapeHtmlVR(v.type||'—')}</div></div>
      <div><div style="text-transform:uppercase;color:#999;font-size:9px;letter-spacing:0.06em;">FSM / Support Member</div><div style="font-weight:700;">${escapeHtmlVR(v.fsm||'—')}</div></div>
      <div><div style="text-transform:uppercase;color:#999;font-size:9px;letter-spacing:0.06em;">Manager on Duty</div><div style="font-weight:700;">${escapeHtmlVR((v.fullReport&&v.fullReport.meta&&v.fullReport.meta.manager)||'—')}</div></div>
      <div><div style="text-transform:uppercase;color:#999;font-size:9px;letter-spacing:0.06em;">Visit Started / Completed</div><div style="font-weight:700;">${escapeHtmlVR((v.fullReport&&v.fullReport.meta&&v.fullReport.meta.startTime)?new Date(v.fullReport.meta.startTime).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}):'—')} – ${escapeHtmlVR((v.fullReport&&v.fullReport.meta&&v.fullReport.meta.endTime)?new Date(v.fullReport.meta.endTime).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}):'—')}</div></div>
    </div>`;
  }

  function buildVisitReportHtml(v) {
    const fr = v.fullReport;
    const linkedActions = STATE.actions.filter(a => a.visitId === v.id);

    if (!fr) {
      let html = `<div style="font-family:-apple-system,'Segoe UI','Helvetica Neue',sans-serif;max-width:820px;margin:0 auto;color:#1a1a1a;">${vrHeader(v)}`;
      html += `<div style="padding:14px 4px;color:#666;font-size:11.5px;">This visit was logged before the detailed report format was introduced. Here's everything that's actually still recoverable for it:</div>
        <div style="margin:0 4px 10px;padding:10px;background:#f7f7f7;font-size:11.5px;">${escapeHtmlVR(v.notes)}</div>`;
      if (linkedActions.length) {
        html += vrSectionBlock('Tasks', 'Tasks Created From This Visit', linkedActions.map(a =>
          `<div style="padding:6px 0;border-bottom:1px solid #eee;font-size:11.5px;"><b>${escapeHtmlVR(a.pillar)}: ${escapeHtmlVR(a.description)}</b><br><span style="color:#666;">Owner: ${escapeHtmlVR(a.owner)} · Due: ${escapeHtmlVR(a.dueDate)} · Status: ${escapeHtmlVR(a.status)}</span></div>`
        ).join(''));
      } else {
        html += `<div style="margin:10px 4px;color:#999;font-size:11.5px;">No tasks were linked to this visit, or they've since been removed.</div>`;
      }
      if (Array.isArray(v.grindResponses) && v.grindResponses.length) {
        html += vrSectionBlock('Legacy', 'Raw Checklist Data (legacy format)', v.grindResponses.map(r => {
          const label = r.text || r.question || r.label || r.id || 'Item';
          const answer = r.rating != null ? r.rating : (r.answer != null ? r.answer : (r.value != null ? r.value : ''));
          const comment = r.comment || r.notes || '';
          return `<div style="padding:6px 0;border-bottom:1px solid #eee;font-size:11.5px;"><b>${escapeHtmlVR(label)}</b>${answer!==''?' — '+escapeHtmlVR(answer):''}${comment?'<br><span style="color:#a15c1a;">"'+escapeHtmlVR(comment)+'"</span>':''}</div>`;
        }).join(''));
      }
      html += `</div>`;
      return html;
    }

    let body = '';
    body += vrSectionBlock('Reset', 'GRIND Reset', VR_GRIND_RESET.map(g => vrItemBlock(g.text, g.id, fr)).join(''));

    VR_SECTIONS.forEach(sec => {
      let html = VR_SHARED_ITEMS.map(s => vrItemBlock(s.text, `${s.key}-${sec.key}`, fr)).join('');
      html += sec.extra.map(e => vrItemBlock(e.text, `${e.key}-${sec.key}`, fr)).join('');
      ((fr.customItems||{})[sec.key]||[]).forEach(c => { html += vrItemBlock(c.text, c.id, fr); });
      if (sec.portion) {
        const rows = ((fr.portion||{})[sec.key]||[]).map((p, i) => vrPortionBlock(p, `portion-${sec.key}-${i}`, fr)).join('');
        if (rows) html += `<div style="margin-top:6px;font-size:9px;font-weight:800;text-transform:uppercase;color:#999;letter-spacing:0.05em;">Portion Check</div>${rows}`;
      }
      const qa = ((fr.teamQA||{})[sec.key]||[]).filter(e => e.q || e.c).map(e => vrTeamQaBlock(e)).join('');
      if (qa) html += `<div style="margin-top:6px;font-size:9px;font-weight:800;text-transform:uppercase;color:#999;letter-spacing:0.05em;">Team Q&amp;A</div>${qa}`;
      body += vrSectionBlock(sec.tag, sec.label, html);
    });

    let tastingHtml = '';
    VR_QC_TASTING_CATS.forEach(cat => {
      ((fr.tasting||{})[cat]||[]).forEach(t => {
        tastingHtml += vrItemBlock(`${cat} — ${t.product || '(untitled product)'}`, t.id, fr);
      });
    });
    body += vrSectionBlock('Inspect', 'QC Tasting', tastingHtml);

    body += vrSectionBlock('Admin', 'FSM Only — Status Check', VR_ADMIN.map(a => vrItemBlock(a.text, a.id, fr)).join(''));

    // Map every possible ID back to its readable question text, so the
    // summary below can show "Check servicing records" instead of "a2".
    const vrTextMap = {};
    const vrCommentMap = {}; // portion comments live in fr.portion, not fr.comments
    VR_GRIND_RESET.forEach(g => { vrTextMap[g.id] = g.text; });
    VR_SECTIONS.forEach(sec => {
      VR_SHARED_ITEMS.forEach(s => { vrTextMap[`${s.key}-${sec.key}`] = s.text; });
      sec.extra.forEach(e => { vrTextMap[`${e.key}-${sec.key}`] = e.text; });
      ((fr.customItems||{})[sec.key]||[]).forEach(c => { vrTextMap[c.id] = c.text; });
      ((fr.teamQA||{})[sec.key]||[]).forEach(e => { vrTextMap[e.id] = e.q ? `Team Q&A — ${e.q}` : 'Team Q&A'; });
      if (sec.portion) {
        ((fr.portion||{})[sec.key]||[]).forEach((p, i) => {
          vrTextMap[`portion-${sec.key}-${i}`] = 'Portion check — ' + (p.item || `item ${i+1}`);
          vrCommentMap[`portion-${sec.key}-${i}`] = p.comment || '';
        });
      }
    });
    VR_ADMIN.forEach(a => { vrTextMap[a.id] = a.text; });
    VR_QC_TASTING_CATS.forEach(cat => {
      ((fr.tasting||{})[cat]||[]).forEach(t => { vrTextMap[t.id] = `${cat} — ${t.product || '(untitled product)'}`; });
    });

    // Anything with a comment OR a next-step action chosen counts as
    // "flagged" for this summary — a dropdown selection on its own (no
    // comment typed) still needs to show up here.
    const flagIds = new Set([
      ...Object.entries(fr.comments||{}).filter(([,c]) => c && c.trim()).map(([id]) => id),
      ...Object.entries(fr.nextSteps||{}).filter(([,s]) => s && s.action).map(([id]) => id),
      ...Object.entries(vrCommentMap).filter(([,c]) => c && c.trim()).map(([id]) => id),
    ]);
    let flagsHtml = '';
    if (!flagIds.size) {
      flagsHtml = `<div style="color:#666;font-size:11.5px;padding:8px 0;">No flags raised on this visit.</div>`;
    } else {
      flagIds.forEach(id => {
        const c = (fr.comments||{})[id] || vrCommentMap[id] || '';
        const step = (fr.nextSteps || {})[id] || {};
        const photos = (fr.photos||{})[id] || [];
        const label = vrTextMap[id] || id;
        flagsHtml += `<div style="padding:8px 0;border-bottom:1px solid #ebebeb;">
          <div style="font-weight:700;font-size:11.5px;">${escapeHtmlVR(label)}</div>
          ${c ? `<div style="color:#8f733f;font-size:11px;margin-top:3px;">${escapeHtmlVR(c)}</div>` : ''}
          ${vrPhotosBlock(photos)}
          <div style="font-size:10px;color:#1a7a44;margin-top:4px;">→ ${vrActionLabel(step)}</div>
        </div>`;
      });
    }
    body += vrSectionBlock('Summary', 'Flagged Items & Resolution', flagsHtml);

    if (linkedActions.length) {
      body += vrSectionBlock('Tasks', 'Tasks Created From This Visit', linkedActions.map(a =>
        `<div style="padding:6px 0;border-bottom:1px solid #eee;font-size:11.5px;"><b>${escapeHtmlVR(a.pillar)}: ${escapeHtmlVR(a.description)}</b><br><span style="color:#666;">Owner: ${escapeHtmlVR(a.owner)} · Due: ${escapeHtmlVR(a.dueDate)} · Status: ${escapeHtmlVR(a.status)}</span></div>`
      ).join(''));
    }

    return `<div style="font-family:-apple-system,'Segoe UI','Helvetica Neue',sans-serif;max-width:820px;margin:0 auto;color:#1a1a1a;">${vrHeader(v)}${body}</div>`;
  }

  function openVisitReport(id, rows){
    const v = rows.find(r => r.id === id);
    if (!v) return;
    document.getElementById('vrPrintArea').innerHTML = buildVisitReportHtml(v);
    const w = window.open('', '_blank');
    w.document.write('<html><head><title>Visit Report — ' + v.store + ' ' + v.date + '</title></head><body>' + buildVisitReportHtml(v) + '</body></html>');
    w.document.close();
    w.focus();
    setTimeout(() => w.print(), 300);
  }

  document.getElementById('vrSearch').addEventListener('input', render);
  document.getElementById('vrTypeFilter').addEventListener('change', render);
  render();
}

  let otPhotoDataUrl = '';
  function resizeImageFile(file, maxDim, quality){
    return new Promise((resolve, reject) => {
      const img = new Image();
      const reader = new FileReader();
      reader.onload = () => { img.src = reader.result; };
      reader.onerror = reject;
      img.onload = () => {
        let { width, height } = img;
        if (width > maxDim || height > maxDim) {
          const scale = maxDim / Math.max(width, height);
          width = Math.round(width * scale);
          height = Math.round(height * scale);
        }
        const canvas = document.createElement('canvas');
        canvas.width = width; canvas.height = height;
        canvas.getContext('2d').drawImage(img, 0, 0, width, height);
        resolve(canvas.toDataURL('image/jpeg', quality));
      };
      img.onerror = reject;
      reader.readAsDataURL(file);
    });
  }
  document.getElementById('otPhoto').addEventListener('change', async (e) => {

  function timeLeft(t){
    const due = new Date(t.createdAt).getTime() + t.escalationHours * 3600000;
    const hrs = Math.round((due - Date.now()) / 3600000);
    return hrs < 0 ? 'Overdue' : hrs + 'h left';

        <thead><tr><th>Café</th><th>Department</th><th>Reported By</th><th>Responsible</th><th>Status</th><th>Comments</th><th>Photo</th><th></th></tr></thead>

          return `<tr>

      const respOther = document.getElementById('otResponsibleOther');
      const tf = document.getElementById('otTimeframe');
      const customDue = document.getElementById('otCustomDue');
      const comments = document.getElementById('otComments');
      const photo = document.getElementById('otPhoto');
      const photoWrap = document.getElementById('otPhotoPreviewWrap');

      if (dept) dept.value = dept.options[0] ? dept.options[0].value : '';
      if (cafe) cafe.value = '';
      if (name) name.value = '';
      if (nameOther) { nameOther.value = ''; nameOther.style.display = 'none'; }
      if (resp) resp.value = '';
      if (respOther) { respOther.value = ''; respOther.style.display = 'none'; }

      otPhotoDataUrl = '';

      if (photoWrap) photoWrap.style.display = 'none';
    } catch (err) {
      console.error('Could not fully reset Add Task form:', err);
    }
  }

  document.getElementById('otSubmit').addEventListener('click', async () => {
    const dept = document.getElementById('otDept').value;

    if (cafe !== 'HQ Internal' && !ALL_STORES.some(s => s.store === cafe)) { toast('Please pick a café from the search list'); return; }

    if (tfValue === 'custom') {

      const dueMs = new Date(customVal).getTime();

    try {
      await apiPost('/api/ops-tasks', body);
      toast('Task submitted');
    } catch(e) {
      toast(e.message || 'Could not submit task');
      submitBtn.disabled = false;
      return;
    }
    // Reset and refresh happen regardless of any DOM quirk in either step —
    // a failure in one must never block the other.
    resetOpsTaskForm();
    submitBtn.disabled = false;
    try { await loadTasks(); } catch(e) { /* loadTasks already handles its own error UI */ }
  });

  loadTasks();
}

    ].map(([l,v]) => `<div><div class="card-label">${l}</div><div class="card-value">${v}</div></div>`).join('');

    document.getElementById('otlUpcoming').innerHTML = stores
      .filter(s=>s.openDate && s.openDate >= today).sort((a,b)=>a.openDate.localeCompare(b.openDate)).slice(0,12)
      .map(s => {
        const days = Math.ceil((new Date(s.openDate)-new Date(today))/86400000);
        return `<div style="display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--grey-200);">
          <div><div style="font-size:13px;font-weight:600;">${s.name}</div><div style="font-size:11px;color:var(--grey-500);">${s.type} · ${s.region} · FSM: ${s.fsm||'—'}</div></div>
          <div style="text-align:right;"><div style="font-size:12px;font-weight:700;color:${days<=14?'var(--amber)':'var(--green)'}">${days===0?'Today!':days+'d'}</div></div>
        </div>`;
      }).join('') || '<div class="empty-state">No upcoming openings.</div>';

    document.getElementById('otlAlerts').innerHTML = cpaAlerts.slice(0,15).map(a => `
      <div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--grey-200);">
        <div><div style="font-size:12px;font-weight:600;">${a.store}</div><div style="font-size:11px;color:var(--grey-500);">${a.label}</div></div>
        <span class="badge ${a.daysLeft<=7?'red':'amber'}">${a.daysLeft===0?'Today':a.daysLeft+'d'}</span>
      </div>`).join('') || '<div class="empty-state">No CPA milestones in the next 30 days.</div>';

    renderStoreList();

    if (isEditor()) {
      document.getElementById('otlAddedList').innerHTML = extraStores.length ? extraStores.map(s => `
        <div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--grey-200);">
          <div><b>${s.name}</b> — ${s.openDate||'TBC'}</div>
          <button class="btn btn-outline otlRemove" data-id="${s.id}">Remove</button>
        </div>`).join('') : '';
      document.querySelectorAll('.otlRemove').forEach(btn => btn.addEventListener('click', async () => {
        extraStores = extraStores.filter(s => String(s.id) !== btn.dataset.id);
        await saveExtra(); renderAll();
      }));
    } else {
      document.getElementById('otlAddCard').style.display = 'none';
    }
  }

  function renderStoreList(){
    const search = document.getElementById('otlSearch').value.toLowerCase();
    const region = document.getElementById('otlRegion').value;
    let rows = allStores()
      .filter(s => subTab === 'archive' ? isArchived(s) : !isArchived(s))
      .filter(s => (!search || s.name.toLowerCase().includes(search)) && (!region || region==='All' || s.region===region));
    rows.sort((a,b) => (a.openDate||'9999').localeCompare(b.openDate||'9999'));

    document.getElementById('otlStoreList').innerHTML = rows.map(s => {
      const isExp = expanded === s.name;
      const days = s.openDate ? Math.ceil((new Date(s.openDate)-new Date(today))/86400000) : null;
      const status = days===null?'TBD':days<0?'Opened':days===0?'Today!':days+'d';
      let detail = '';
      if (isExp) {
        const milestoneList = s.cpa ? [
          { key: 'tabCreated', label: 'Tab Created', date: s.cpa.tabCreated },
          { key: 'recruitCommence', label: 'Recruitment Commences', date: s.cpa.recruitCommence },
          { key: 'staffRecruitmentDeadline', label: 'Staff Recruited By', date: s.cpa.staffRecruitmentDeadline },
          { key: 'accountApplicationDue', label: 'Account Application Info Due', date: s.cpa.accountApplicationDue },
          { key: 'accountOpeningComplete', label: 'Account Opening Completion', date: s.cpa.accountOpeningComplete },
          { key: 'trainingStart', label: 'Training Start', date: s.cpa.trainingStart },
          { key: 'openingOrderDate', label: 'Opening Order Date', date: s.cpa.openingOrderDate },
          { key: 'handoverDate', label: 'Handover Date', date: s.cpa.handoverDate },
          { key: 'openDate', label: 'Opening Date', date: s.cpa.openDate },
          ...(s.cpa.checkins || []).map(c => ({ key: c.key, label: '🤝 ' + c.label, date: c.date, isCheckin: true })),
        ].sort((a,b) => (a.date||'').localeCompare(b.date||'')) : [];
        const storeConf = cpaConfirmations[s.name] || {};
        const cpaRows = milestoneList.length ? milestoneList.map(({key, label, date, isCheckin}) => {
          const confirmed = !!storeConf[key];
          return `<div style="display:flex;align-items:center;gap:8px;font-size:12px;padding:4px 6px;border-bottom:1px solid var(--grey-200);${isCheckin ? 'background:#e6f6f6;border-radius:3px;' : ''}">
            <span style="flex:1;${isCheckin ? 'font-style:italic;' : ''}">${label}</span>
            <b style="white-space:nowrap;">${date || '—'}</b>
            <input type="checkbox" class="cpaConfirmCheck" data-store="${s.name}" data-key="${key}" ${confirmed ? 'checked' : ''} title="Confirm next phase started successfully" style="cursor:pointer;width:14px;height:14px;flex-shrink:0;">
          </div>`;
        }).join('') + '<div style="font-size:10px;color:var(--grey-500);margin-top:6px;">☑ Confirms the next phase started successfully</div>'
          : '<div class="empty-state">Set an opening date to generate CPA milestones.</div>';
        const postSupportRows = s.cpa && s.cpa.postSupportWeeks ? s.cpa.postSupportWeeks.map(w =>
          `<div style="display:flex;justify-content:space-between;font-size:12px;padding:5px 0;border-bottom:1px solid var(--grey-200);"><b>${w.label}</b><span>${fmtShortDate(w.start)} – ${fmtShortDate(w.end)}</span></div>`
        ).join('') : '';
        const postSupport = s.cpa && s.cpa.postSupportWeeks ? `
          <div style="margin-top:16px;">
            <div class="section-title" style="color:var(--gold);">🍯 Post-Support Schedule</div>
            ${postSupportRows}
            <div style="font-size:10px;color:var(--grey-500);font-style:italic;margin-top:6px;">Auto-archives: ${fmtShortDate(s.cpa.archiveDate)}</div>
          </div>` : '';
        const t = s.training;
        const bars = ['managers','boh','bar','foh'].filter(k => otStoreStructure(s.type)==='full' || k==='managers')
          .map(k => `<div style="margin-bottom:6px;"><div style="display:flex;justify-content:space-between;font-size:11px;"><span>${k}</span><b>${Math.round((t[k]||0)*100)}%</b></div><div style="background:var(--grey-200);height:6px;border-radius:4px;"><div style="width:${Math.round((t[k]||0)*100)}%;background:var(--gold);height:100%;border-radius:4px;"></div></div></div>`).join('');
        const fullFsm = fsmFullName(s.fsm);
        const bb = fullFsm ? beelineOf(fullFsm, s.name) : null;
        const bbetterSection = bb !== null && bb !== undefined ? `
          <div style="margin-bottom:10px;"><div style="display:flex;justify-content:space-between;font-size:11px;"><span>Completion</span><b>${Math.round(bb)}%</b></div><div style="background:var(--grey-200);height:6px;border-radius:4px;"><div style="width:${Math.round(bb)}%;background:${bb>=85?'var(--green)':bb>=60?'var(--gold)':'var(--red)'};height:100%;border-radius:4px;"></div></div></div>
          <div style="font-size:10px;color:var(--grey-500);">FSM: ${fullFsm} · Source: B.Better upload</div>`
          : `<div class="empty-state" style="padding:20px 10px;font-size:11px;">No B.Better data loaded for this store.<br>Upload a B.Better report in the B.Better tab to populate this section.</div>`;
        detail = `<div style="border-top:1px solid var(--grey-200);padding:16px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:20px;">
          <div><div class="section-title">📅 CPA Timeline</div>${cpaRows}${postSupport}</div>
          <div><div class="section-title">📊 Training Progress</div>${bars}
            <div style="margin-top:8px;"><div style="display:flex;justify-content:space-between;font-size:11px;"><span>Overall</span><b>${Math.round((t.overall||0)*100)}%</b></div><div style="background:var(--grey-200);height:6px;border-radius:4px;"><div style="width:${Math.round((t.overall||0)*100)}%;background:var(--green);height:100%;border-radius:4px;"></div></div></div>
          </div>
          <div><div class="section-title">🎓 B.Better Academy</div>${bbetterSection}</div>
        </div>
        <div style="border-top:1px solid var(--grey-200);padding:16px;">
          <div class="section-title">🤝 Support Team Allocation</div>
          <div>${OT_PEOPLE_LIST.map(member => {
            const assigned = (supportAllocations[s.name] || []).includes(member);
            return `<button type="button" class="supportAllocChip" data-store="${s.name}" data-member="${member}" style="cursor:pointer;font-size:11px;padding:5px 10px;border-radius:14px;margin:3px 4px 3px 0;border:1px solid ${assigned?'var(--gold)':'var(--grey-200)'};background:${assigned?'var(--gold)':'#fff'};color:${assigned?'#000':'var(--grey-700)'};font-weight:${assigned?'700':'500'};">${member}</button>`;
          }).join('')}</div>
          <div style="font-size:10px;color:var(--grey-500);margin-top:6px;">Tap a name to allocate or remove them from this café's opening support team.</div>
        </div>`;
      }
      const assignedSupport = supportAllocations[s.name] || [];
      return `<div class="card" style="margin-bottom:8px;padding:0;">
        <div style="display:flex;align-items:center;gap:12px;padding:12px 16px;cursor:pointer;" data-toggle="${s.name}">
          <div style="flex:1;"><b>${s.name}</b><div style="font-size:11px;color:var(--grey-500);">${s.type} · ${s.region} · FSM: ${s.fsm||'—'} · Support: ${assignedSupport.length ? assignedSupport.join(', ') : '—'}</div></div>
          <div style="font-size:12px;font-weight:700;">${status}</div>
          <div style="font-size:11px;color:var(--grey-500);">${s.openDate||'Date TBC'}</div>
        </div>
        ${detail}
      </div>`;
    }).join('') || (subTab==='archive' ? '<div class="empty-state">No archived cafés yet — stores move here 4 weeks after opening.</div>' : '<div class="empty-state">No stores match your filters.</div>');

    document.querySelectorAll('[data-toggle]').forEach(el => el.addEventListener('click', () => {
      expanded = expanded === el.dataset.toggle ? null : el.dataset.toggle;
      renderStoreList();
    }));
    document.querySelectorAll('.cpaConfirmCheck').forEach(el => {
      el.addEventListener('click', (e) => e.stopPropagation());
      el.addEventListener('change', (e) => {
        e.stopPropagation();
        toggleCpaConfirm(el.dataset.store, el.dataset.key);
      });
    });
    document.querySelectorAll('.supportAllocChip').forEach(el => {
      el.addEventListener('click', (e) => {
        e.stopPropagation();
        toggleSupportAllocation(el.dataset.store, el.dataset.member);
      });
    });
  }

  document.getElementById('otlSearch').addEventListener('input', renderStoreList);
  document.getElementById('otlRegion').addEventListener('change', renderStoreList);
  document.querySelectorAll('#otlSubTab .segmented-btn').forEach(btn => btn.addEventListener('click', () => {
    subTab = btn.dataset.sub;
    document.querySelectorAll('#otlSubTab .segmented-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    renderStoreList();
  }));
  document.getElementById('otlAdd').addEventListener('click', async () => {
    const name = document.getElementById('otlName').value.trim();
    const openDate = document.getElementById('otlOpenDate').value;
    if (!name || !openDate) { toast('Store name and open date are required'); return; }
    extraStores.push({ id: Date.now(), name, type:'Full Store', region:'WC', openDate, fsm: document.getElementById('otlFsm').value, notes: document.getElementById('otlNotes').value });
    await saveExtra();
    if (newStoreSupport.length) {
      supportAllocations = Object.assign({}, supportAllocations, { [name]: [...newStoreSupport] });
      await saveSupportAllocations();
    }
    document.getElementById('otlName').value = ''; document.getElementById('otlOpenDate').value = '';
    document.getElementById('otlFsm').value = ''; document.getElementById('otlNotes').value = '';
    newStoreSupport = [];
    renderNewStoreSupportChips();
    toast('Store added');
    renderAll();
  });

  loadCpaConfirmations().then(renderStoreList);
  loadSupportAllocations().then(renderStoreList);
  renderNewStoreSupportChips();
  loadExtra();
}

/* ============================================================
   ROUTER
   ============================================================ */
const VIEW_FN = {
  home: viewHome, dashboard: viewDashboard, trade: viewTrade, standards: viewStandards,
  bbetter: viewBBetter, actions: viewActions, ltl: viewLTL,
  weekly: viewWeekly, print: viewPrint, admin: viewAdmin,
  ops: viewOpsTasks, timelines: viewOpeningTimelines, visitreports: viewVisitReports
};
function formatNavDate(){
  const d = new Date();
  const wd = d.toLocaleString('en-GB',{weekday:'short'}).toUpperCase();
  const day = String(d.getDate()).padStart(2,'0');
  const mon = d.toLocaleString('en-GB',{month:'short'}).toUpperCase();
  return `${wd}, ${day} ${mon} ${d.getFullYear()}`;
}
function render(){
  renderNav();
  const nm = document.getElementById('navMeta');
  if (nm) nm.textContent = formatNavDate();
  (VIEW_FN[ACTIVE_TAB] || viewDashboard)();
  applyRoleLock();
}

async function startApp(){
  hideLogin();
  document.getElementById('app').innerHTML = '<div class="empty-state" style="padding:80px 0;">Loading shared BOS data...</div>';
  try {
    await refreshState();
    await loadDataOverrides();
  } catch(e) {
    if (e.message === 'unauthorized') return;
    document.getElementById('app').innerHTML = '<div class="empty-state" style="padding:80px 0;color:var(--red);">Could not connect to the server. Refresh to try again.</div>';
    return;
  }
  render();
  // keep the dashboard fresh for anyone leaving it open (shared, multi-user data)
  setInterval(async () => {
    if (ACTIVE_TAB === 'dashboard') {
      try { await refreshState(); render(); } catch(e) {}
    }
  }, 20000);
}

async function attemptLogin(){
  const username = document.getElementById('loginUsername').value.trim();
  const password = document.getElementById('loginPassword').value;
  const btn = document.getElementById('loginSubmit');
  if (!username || !password) { showLogin('Enter a username and password'); return; }
  btn.disabled = true; btn.textContent = 'Signing In...';
  try {
    const res = await fetch('/api/login', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ username, password }) });
    const data = await res.json();
    if (!res.ok) { showLogin(data.error || 'Login failed'); return; }
    setSession(data);
    document.getElementById('loginPassword').value = '';
    await startApp();
  } catch (e) {
    showLogin('Could not reach the server — try again');
  } finally {
    btn.disabled = false; btn.textContent = 'Sign In';
  }
}

async function init(){
  document.getElementById('loginSubmit').addEventListener('click', attemptLogin);
  document.getElementById('loginPassword').addEventListener('keydown', e => { if (e.key === 'Enter') attemptLogin(); });

  if (!TOKEN) { showLogin(); return; }
  // validate stored token before trusting it
  try {
    const me = await apiGet('/api/me');
    ROLE = me.role; USERNAME = me.username; DISPLAY_NAME = me.displayName;
    await startApp();
  } catch (e) {
    clearSession();
    showLogin();
  }
}
init();

</script>
