  function allStores(){
    return extraStores.map(s => {
      const cal = getTrainingCalendar(s.name);
      return {
        ...s,
        cpa: calcCPA(s),
        training: computeCafeProgress(cal, s.openDate),
      };
    });
  }

  function renderAll(){
    const stores = allStores().filter(s => !isArchived(s));
    const regions = ['All', ...Array.from(new Set(stores.map(s=>s.region))).sort()];
    const regionSel = document.getElementById('otlRegion');
    if (regionSel.options.length === 0) regionSel.innerHTML = regions.map(r=>`<option>${r}</option>`).join('');

    const upcoming90 = stores.filter(s => s.openDate && (new Date(s.openDate)-new Date(today))/86400000 <= 90 && (new Date(s.openDate)-new Date(today))/86400000 >= 0).length;
    const thisMonth = stores.filter(s => s.openDate && s.openDate.slice(0,7) === today.slice(0,7)).length;
    const overallAvgVals = stores.map(s => s.training && s.training.overallPct).filter(v => v !== null && v !== undefined);
    const overallAvg = overallAvgVals.length ? overallAvgVals.reduce((a,b)=>a+b,0)/overallAvgVals.length : 0;
    const cpaAlerts = [];
    stores.forEach(s => {
      if (!s.cpa) return;
      s.cpa.milestones.forEach(({label, date}) => {
        const diff = Math.ceil((new Date(date)-new Date(today))/86400000);
        if (diff >= 0 && diff <= 30) cpaAlerts.push({label, date, store:s.name, daysLeft:diff});
      });
    });
    cpaAlerts.sort((a,b)=>a.daysLeft-b.daysLeft);

    document.getElementById('otlKpis').innerHTML = [
      ['Total Stores', stores.length], ['Opening ≤90 Days', upcoming90],
      ['CPA Alerts (30d)', cpaAlerts.length], ['Avg Training %', Math.round(overallAvg)+'%'], ['This Month', thisMonth]
    ].map(([l,v]) => `<div><div class="card-label">${l}</div><div class="card-value">${v}</div></div>`).join('');

    document.getElementById('otlUpcoming').innerHTML = stores
      .filter(s=>s.openDate && s.openDate >= today).sort((a,b)=>a.openDate.localeCompare(b.openDate)).slice(0,12)
      .map(s => {
        const days = Math.ceil((new Date(s.openDate)-new Date(today))/86400000);
        return `<div style="display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--grey-200);">
          <div><div style="font-size:13px;font-weight:600;">${s.name}</div><div style="font-size:11px;color:var(--grey-500);">${s.type} · ${s.region} · FSM: ${s.fsm||'—'}</div></div>
          <div style="text-align:right;"><div style="font-size:12px;font-weight:700;color:${days<=14?'var(--amber)':'var(--green)'}">${days===0?'Today!':days+'d'}</div></div>
        </div>`;
      }).join('') || '<div class="empty-state">No upcoming openings.</div>';

    document.getElementById('otlAlerts').innerHTML = cpaAlerts.slice(0,15).map(a => `
      <div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--grey-200);">
        <div><div style="font-size:12px;font-weight:600;">${a.store}</div><div style="font-size:11px;color:var(--grey-500);">${a.label}</div></div>
        <span class="badge ${a.daysLeft<=7?'red':'amber'}">${a.daysLeft===0?'Today':a.daysLeft+'d'}</span>
      </div>`).join('') || '<div class="empty-state">No CPA milestones in the next 30 days.</div>';

    renderStoreList();

    if (isEditor()) {
      document.getElementById('otlAddedList').innerHTML = extraStores.length ? extraStores.map(s => `
        <div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--grey-200);">
          <div><b>${s.name}</b> — ${s.openDate||'TBC'}</div>
          <button class="btn btn-outline otlRemove" data-id="${s.id}">Remove</button>
        </div>`).join('') : '';
      document.querySelectorAll('.otlRemove').forEach(btn => btn.addEventListener('click', async () => {
        extraStores = extraStores.filter(s => String(s.id) !== btn.dataset.id);
        await saveExtraStores(); renderAll();
      }));
    } else {
      document.getElementById('otlAddCard').style.display = 'none';
    }
  }

                const startValue = p.startDateOverride || isoDate(computeTrainingStartDate(s.openDate, null));
                return `<tr data-store="${escTC(s.name)}" data-idx="${pi}">
                <td style="padding:4px 6px;border-bottom:1px solid var(--grey-100);"><input class="tcField" data-field="position" value="${escTC(p.position)}" placeholder="Position" style="width:100px;border:none;font-size:11px;background:transparent;"></td>
                <td style="padding:4px 6px;border-bottom:1px solid var(--grey-100);"><input class="tcField" data-field="name" value="${escTC(p.name)}" placeholder="Name" style="width:120px;border:none;font-size:11px;background:transparent;"></td>
                <td style="padding:4px 6px;border-bottom:1px solid var(--grey-100);"><input type="date" class="tcStartOverride" data-field="startDateOverride" value="${escTC(startValue)}" title="Defaults to this café's Training Start Date (Opening Date − 5 weeks) — override here for a trainee starting on a different date." style="font-size:11px;border:none;background:transparent;width:120px;"></td>
                <td style="padding:4px 6px;border-bottom:1px solid var(--grey-100);"><input class="tcField" data-field="store" value="${escTC(p.store)}" placeholder="Store" style="width:100px;border:none;font-size:11px;background:transparent;"></td>
                ${cal.weekLabels.map((wl, wi) => `<td style="padding:4px 6px;border-bottom:1px solid var(--grey-100);"><input class="tcWeekField" data-week="${wi}" value="${escTC((p.weeks||[])[wi]||'')}" placeholder="—" style="width:100px;border:none;font-size:11px;background:transparent;"></td>`).join('')}
                <td style="padding:4px 6px;border-bottom:1px solid var(--grey-100);"><button type="button" class="tcRemoveBtn" data-store="${escTC(s.name)}" data-idx="${pi}" title="Remove" style="border:none;background:none;color:var(--red);cursor:pointer;font-size:14px;line-height:1;">×</button></td>
              </tr>`;
              }).join('') || `<tr><td colspan="${colCount}" style="padding:8px 6px;color:var(--grey-500);font-size:11px;">No training staff added yet — add one manually or upload a CSV.</td></tr>`;
              return `
              <div style="overflow-x:auto;">
                <table style="width:100%;border-collapse:collapse;font-size:11px;min-width:560px;">
                  <thead><tr>
                    <th style="text-align:left;padding:4px 6px;border-bottom:1px solid var(--grey-200);color:var(--grey-500);font-weight:700;">Position</th>
                    <th style="text-align:left;padding:4px 6px;border-bottom:1px solid var(--grey-200);color:var(--grey-500);font-weight:700;">Name</th>
                    <th style="text-align:left;padding:4px 6px;border-bottom:1px solid var(--grey-200);color:var(--grey-500);font-weight:700;">Start Date</th>
                    <th style="text-align:left;padding:4px 6px;border-bottom:1px solid var(--grey-200);color:var(--grey-500);font-weight:700;">Store</th>
                    ${cal.weekLabels.map(wl => `<th style="text-align:left;padding:4px 6px;border-bottom:1px solid var(--grey-200);color:var(--grey-500);font-weight:700;white-space:nowrap;">${escTC(wl)}</th>`).join('')}
                    <th style="border-bottom:1px solid var(--grey-200);"></th>
                  </tr></thead>
                  <tbody>${rows}</tbody>
                </table>
              </div>
              <div style="display:flex;gap:8px;margin-top:10px;flex-wrap:wrap;align-items:center;">
                <button type="button" class="btn btn-outline tcAddStaffBtn" data-store="${escTC(s.name)}" style="font-size:11px;padding:5px 10px;">+ Add Staff Member</button>
                <label class="btn btn-outline" style="font-size:11px;padding:5px 10px;cursor:pointer;">Upload CSV<input type="file" accept=".csv" class="tcCsvInput" data-store="${escTC(s.name)}" style="display:none;"></label>
                <span style="font-size:10px;color:var(--grey-500);">CSV columns: Position, Name, Store, Wk 1, Wk 2, Wk 3, Wk 4. Start Date defaults to this café's Training Start Date (Opening Date − 5 weeks) for everyone — edit an individual row's Start Date to override it.</span>
              </div>`;
            })()}
          </div>
        </div>`;
        const bbetterSectionHtml = `<div><div class="section-title">🏅 B.Better Academy</div>${bbetterSection}</div>`;
        const detailsSectionHtml = `<div><div class="section-title">🏢 Franchisee &amp; Store Details</div>
          ${(() => {
            const det = storeDetails[s.name] || {};
            const field = (key, label, type) => `<div>
              <label style="display:block;font-size:9px;text-transform:uppercase;color:var(--grey-500);letter-spacing:0.04em;margin-bottom:2px;">${label}</label>
              <input type="${type||'text'}" class="sdField" data-store="${escTC(s.name)}" data-field="${key}" value="${escTC(det[key]||'')}" style="width:100%;padding:5px 6px;border:1px solid var(--grey-200);border-radius:2px;font-size:11.5px;box-sizing:border-box;">
            </div>`;
            // Representative / FSM / Project Manager / Landlord Contact each
            // get their own Name / Email / Contact No. group. FSM's name is
            // the store's own FSM field (already tracked elsewhere in the
            // app for roster matching), shown read-only here — only its
            // email/contact are store-detail fields; the other three are
            // fully editable since there's no equivalent field for them.
            const contactGroup = (label, nameField, nameValue, emailField, phoneField) => `
              <div style="border:1px solid var(--grey-200);border-radius:3px;padding:8px 10px;">
                <div style="font-size:9.5px;font-weight:800;text-transform:uppercase;color:var(--grey-500);letter-spacing:0.05em;margin-bottom:6px;">${label}</div>
                <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:8px;">
                  ${nameField ? field(nameField, 'Name') : `<div><label style="display:block;font-size:9px;text-transform:uppercase;color:var(--grey-500);letter-spacing:0.04em;margin-bottom:2px;">Name</label><div style="padding:5px 0;font-size:11.5px;">${escTC(nameValue || '—')}</div></div>`}
                  ${field(emailField, 'Email')}
                  ${field(phoneField, 'Contact No.')}
                </div>
              </div>`;
            const isEditableStore = s.id !== undefined; // extraStores (added manually or via approval) carry an id; the original hardcoded pipeline stores don't
            const openDateField = `<div>
              <label style="display:block;font-size:9px;text-transform:uppercase;color:var(--grey-500);letter-spacing:0.04em;margin-bottom:2px;">Store Opening Date</label>
              <input type="date" ${isEditableStore ? `class="odField" data-store="${escTC(s.name)}"` : 'disabled'} value="${escTC(s.openDate||'')}" title="${isEditableStore ? 'Drives the CPA Timeline dates and the Post-Support Schedule' : 'This café is part of the original pipeline data — its date lives in the app source, not editable here'}" style="width:100%;padding:5px 6px;border:1px solid var(--grey-200);border-radius:2px;font-size:11.5px;box-sizing:border-box;${isEditableStore?'':'background:var(--grey-100);color:var(--grey-500);'}">
            </div>`;
            const createdDateField = `<div>
              <label style="display:block;font-size:9px;text-transform:uppercase;color:var(--grey-500);letter-spacing:0.04em;margin-bottom:2px;">Café Created Date</label>
              <input type="date" ${isEditableStore ? `class="cdField" data-store="${escTC(s.name)}"` : 'disabled'} value="${escTC(s.createdDate || (s.cpa && s.cpa.createdDate) || '')}" title="${isEditableStore ? 'Drives the Franchisee Check-in schedule and Account Application Due date — set the real date this café was first created if it differs from the default' : 'This café is part of the original pipeline data — not editable here'}" style="width:100%;padding:5px 6px;border:1px solid var(--grey-200);border-radius:2px;font-size:11.5px;box-sizing:border-box;${isEditableStore?'':'background:var(--grey-100);color:var(--grey-500);'}">
            </div>`;
            return `
            <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px;margin-bottom:12px;">
              ${openDateField}
              ${createdDateField}
              ${field('location','Location')}
              ${field('seats','Seat No.')}
              ${field('turnover','Anticipated Turnover')}
              ${field('address','Store Address')}
              ${field('invoicingDetails','Franchisee Invoicing Details')}
            </div>
            <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:10px;">
              ${contactGroup('Representative', 'representative', null, 'representativeEmail', 'representativeContactNumber')}
              ${contactGroup('FSM', null, s.fsm, 'fsmEmail', 'fsmContactNumber')}
              ${contactGroup('Project Manager', 'pm', null, 'pmEmail', 'pmContactNumber')}
              ${contactGroup('Landlord Contact', 'landlordContact', null, 'landlordEmail', 'landlordContactNumber')}
            </div>`;
          })()}
        </div>`;
        const sectionByTab = { cpa: cpaSectionHtml, training: trainingSectionHtml, bbetter: bbetterSectionHtml, details: detailsSectionHtml };
        detail = `<div style="border-top:1px solid var(--grey-200);padding:16px;">
          ${subDashNav}
          ${sectionByTab[activeSub] || cpaSectionHtml}
        </div>`;
      }
      const assignedSupport = supportAllocations[s.name] || [];
      return `<div class="card" style="margin-bottom:8px;padding:0;">
        <div style="display:flex;align-items:center;gap:12px;padding:12px 16px;cursor:pointer;" data-toggle="${s.name}">
          <div style="flex:1;"><b>${s.name}</b><div style="font-size:11px;color:var(--grey-500);">${s.type} · ${s.region} · FSM: ${s.fsm||'—'} · Support: ${assignedSupport.length ? assignedSupport.join(', ') : '—'}</div></div>
          <div style="font-size:12px;font-weight:700;">${status}</div>
          <div style="font-size:11px;color:var(--grey-500);">${s.openDate||'Date TBC'}</div>
        </div>
        ${detail}
      </div>`;
    }).join('') || (subTab==='archive' ? '<div class="empty-state">No archived cafés yet — stores move here 4 weeks after opening.</div>' : '<div class="empty-state">No stores match your filters.</div>');

    document.querySelectorAll('[data-toggle]').forEach(el => el.addEventListener('click', () => {
      expanded = expanded === el.dataset.toggle ? null : el.dataset.toggle;
      renderStoreList();
    }));
    document.querySelectorAll('.detailSubTabBtn').forEach(el => el.addEventListener('click', (e) => {
      e.stopPropagation();
      detailSubTab[el.dataset.store] = el.dataset.sub;
      renderStoreList();
    }));
    document.querySelectorAll('.cpaConfirmCheck').forEach(el => {
      el.addEventListener('click', (e) => e.stopPropagation());
      el.addEventListener('change', (e) => {
        e.stopPropagation();
        toggleCpaConfirm(el.dataset.store, el.dataset.key);
      });
    });
    document.querySelectorAll('.cpaMilestoneToggle').forEach(el => el.addEventListener('click', (e) => {
      e.stopPropagation();
      const k = el.dataset.mkey;
      if (expandedMilestones.has(k)) expandedMilestones.delete(k); else expandedMilestones.add(k);
      renderStoreList();
    }));
    document.querySelectorAll('.cpaDateOverride').forEach(el => {
      el.addEventListener('click', e => e.stopPropagation());
      el.addEventListener('change', () => setCpaOverride(el.dataset.store, el.dataset.key, el.value));
    });
    document.querySelectorAll('.cpaComment').forEach(el => {
      el.addEventListener('click', e => e.stopPropagation());
      el.addEventListener('change', () => setCpaMilestoneComment(el.dataset.store, el.dataset.key, el.value));
    });
    document.querySelectorAll('.cpaFileInput').forEach(el => {
      el.addEventListener('click', e => e.stopPropagation());
      el.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (file) uploadCpaMilestoneFile(el.dataset.store, el.dataset.key, file);
      });
    });
    document.querySelectorAll('.cpaFileRemove').forEach(el => el.addEventListener('click', (e) => {
      e.stopPropagation();
      removeCpaMilestoneFile(el.dataset.store, el.dataset.key);
    }));
    document.querySelectorAll('.supportAllocChip').forEach(el => {
      el.addEventListener('click', (e) => {
        e.stopPropagation();
        toggleSupportAllocation(el.dataset.store, el.dataset.member);
      });
    });
    document.querySelectorAll('.tcAddStaffBtn').forEach(el => el.addEventListener('click', (e) => { e.stopPropagation(); addTrainingStaff(el.dataset.store); }));
    document.querySelectorAll('.tcRemoveBtn').forEach(el => el.addEventListener('click', (e) => { e.stopPropagation(); removeTrainingStaff(el.dataset.store, parseInt(el.dataset.idx, 10)); }));
    document.querySelectorAll('.tcField').forEach(el => {
      el.addEventListener('click', e => e.stopPropagation());
      el.addEventListener('change', () => {
        const tr = el.closest('tr');
        setTrainingField(tr.dataset.store, parseInt(tr.dataset.idx, 10), el.dataset.field, el.value);
      });
    });
    document.querySelectorAll('.tcStartOverride').forEach(el => {
      el.addEventListener('click', e => e.stopPropagation());
      el.addEventListener('change', () => {
        const tr = el.closest('tr');
        setTrainingField(tr.dataset.store, parseInt(tr.dataset.idx, 10), 'startDateOverride', el.value);
      });
    });
    document.querySelectorAll('.tcWeekField').forEach(el => {
      el.addEventListener('click', e => e.stopPropagation());
      el.addEventListener('change', () => {
        const tr = el.closest('tr');
        setTrainingWeekField(tr.dataset.store, parseInt(tr.dataset.idx, 10), parseInt(el.dataset.week, 10), el.value);
      });
    });
    document.querySelectorAll('.tcCsvInput').forEach(el => {
      el.addEventListener('click', e => e.stopPropagation());
      el.addEventListener('change', () => {
        const file = el.files[0];
        if (file) importTrainingCsv(el.dataset.store, file);
      });
    });
    document.querySelectorAll('.sdField').forEach(el => {
      el.addEventListener('click', e => e.stopPropagation());
      el.addEventListener('change', () => setStoreDetailField(el.dataset.store, el.dataset.field, el.value));
    });
    document.querySelectorAll('.odField').forEach(el => {
      el.addEventListener('click', e => e.stopPropagation());
      el.addEventListener('change', () => setStoreOpenDate(el.dataset.store, el.value));
    });
    document.querySelectorAll('.cdField').forEach(el => {
      el.addEventListener('click', e => e.stopPropagation());
      el.addEventListener('change', () => setStoreCreatedDate(el.dataset.store, el.value));
    });
  }

  document.getElementById('otlSearch').addEventListener('input', renderStoreList);
  document.getElementById('otlRegion').addEventListener('change', renderStoreList);
  document.querySelectorAll('#otlSubTab .segmented-btn').forEach(btn => btn.addEventListener('click', () => {
    subTab = btn.dataset.sub;
    document.querySelectorAll('#otlSubTab .segmented-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    const isPending = subTab === 'pending';
    document.getElementById('otlFilterRow').style.display = isPending ? 'none' : '';
    document.getElementById('otlStoreList').style.display = isPending ? 'none' : '';
    document.getElementById('otlPendingList').style.display = isPending ? '' : 'none';
    if (isPending) renderPendingList(); else renderStoreList();
  }));
  document.getElementById('otlAdd').addEventListener('click', async () => {
    const name = document.getElementById('otlName').value.trim();
    const openDate = document.getElementById('otlOpenDate').value;
    if (!name || !openDate) { toast('Store name and open date are required'); return; }
    extraStores.push({ id: Date.now(), name, type:'Full Store', region:'WC', openDate, createdDate: todayISO(), fsm: document.getElementById('otlFsm').value, notes: document.getElementById('otlNotes').value });
    await saveExtraStores();
    if (newStoreSupport.length) {
      supportAllocations = Object.assign({}, supportAllocations, { [name]: [...newStoreSupport] });
      await saveSupportAllocations();
    }
    document.getElementById('otlName').value = ''; document.getElementById('otlOpenDate').value = '';
    document.getElementById('otlFsm').value = ''; document.getElementById('otlNotes').value = '';
    newStoreSupport = [];
    renderNewStoreSupportChips();
    toast('Store added');
    renderAll();
  });

  document.getElementById('ncBBetterBtn').addEventListener('click', () => document.getElementById('ncBBetterInput').click());
  document.getElementById('ncBBetterInput').addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (file) importBBetterWorkbook(file);
    e.target.value = '';
  });

  loadCpaConfirmations().then(renderStoreList);
  loadSupportAllocations().then(renderStoreList);
  loadTrainingCalendars().then(renderStoreList);
  loadNewCafeBBetter().then(renderStoreList);
  loadStoreDetails().then(() => migrateStoreDetailsFromMasterSheetIfNeeded().then(renderStoreList));
  loadCafeSubmissions().then(updatePendingBadge);
  renderNewStoreSupportChips();
  loadExtraStores().then(renderAll);
}

/* ============================================================
   ROUTER
   ============================================================ */
const VIEW_FN = {
  home: viewHome, dashboard: viewDashboard, trade: viewTrade, standards: viewStandards,
  bbetter: viewBBetter, actions: viewActions, ltl: viewLTL,
  weekly: viewWeekly, print: viewPrint, admin: viewAdmin,
  ops: viewOpsTasks, timelines: viewOpeningTimelines, visitreports: viewVisitReports
};
function formatNavDate(){
  const d = new Date();
  const wd = d.toLocaleString('en-GB',{weekday:'short'}).toUpperCase();
  const day = String(d.getDate()).padStart(2,'0');
  const mon = d.toLocaleString('en-GB',{month:'short'}).toUpperCase();
  return `${wd}, ${day} ${mon} ${d.getFullYear()}`;
}
function render(){
  renderNav();
  const nm = document.getElementById('navMeta');
  if (nm) nm.textContent = formatNavDate();
  (VIEW_FN[ACTIVE_TAB] || viewDashboard)();
  applyRoleLock();
}

async function startApp(){
  hideLogin();
  document.getElementById('app').innerHTML = '<div class="empty-state" style="padding:80px 0;">Loading shared BOS data...</div>';
  try {
    await refreshState();
    await loadDataOverrides();
    await loadExtraStores();
    await migrateHardcodedStoresIfNeeded();
    await correctOpeningDates20260714IfNeeded();
    await migrateBBetterReport20260722IfNeeded();
  } catch(e) {
    if (e.message === 'unauthorized') return;
    document.getElementById('app').innerHTML = '<div class="empty-state" style="padding:80px 0;color:var(--red);">Could not connect to the server. Refresh to try again.</div>';
    return;
  }
  render();
  // keep the dashboard fresh for anyone leaving it open (shared, multi-user data)
  setInterval(async () => {
    if (ACTIVE_TAB === 'dashboard') {
      try { await refreshState(); render(); } catch(e) {}
    }
  }, 20000);
}

async function attemptLogin(){
  const username = document.getElementById('loginUsername').value.trim();
  const password = document.getElementById('loginPassword').value;
  const btn = document.getElementById('loginSubmit');
  if (!username || !password) { showLogin('Enter a username and password'); return; }
  btn.disabled = true; btn.textContent = 'Signing In...';
  try {
    const res = await fetch('/api/login', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ username, password }) });
    const data = await res.json();
    if (!res.ok) { showLogin(data.error || 'Login failed'); return; }
    setSession(data);
    document.getElementById('loginPassword').value = '';
    await startApp();
  } catch (e) {
    showLogin('Could not reach the server — try again');
  } finally {
    btn.disabled = false; btn.textContent = 'Sign In';
  }
}

async function init(){
  document.getElementById('loginSubmit').addEventListener('click', attemptLogin);
  document.getElementById('loginPassword').addEventListener('keydown', e => { if (e.key === 'Enter') attemptLogin(); });

  if (!TOKEN) { showLogin(); return; }
  // validate stored token before trusting it
  try {
    const me = await apiGet('/api/me');
    ROLE = me.role; USERNAME = me.username; DISPLAY_NAME = me.displayName;
    await startApp();
  } catch (e) {
    clearSession();
    showLogin();
  }
}
init();

</script>
