<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BOS — Bootlegger Operating System</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<style>
@import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&display=swap');
:root {
  --gold: #c8ae79;
  --gold-light: rgba(200,174,121,0.12);
  --black: #1a1a1a;
  --white: #ffffff;
  --grey-100: #f7f7f7;
  --grey-200: #ebebeb;
  --grey-300: #d4d4d4;
  --grey-500: #999999;
  --grey-700: #555555;
  --green: #2e7d32;
  --green-bg: rgba(46,125,50,0.10);
  --amber: #e65100;
  --amber-bg: rgba(230,81,0,0.10);
  --red: #c62828;
  --red-bg: rgba(198,40,40,0.10);
  --font: 'Montserrat', Arial, sans-serif;
}
* , *::before, *::after { box-sizing: border-box; margin:0; padding:0; }
body { font-family: var(--font); background: var(--grey-100); color: var(--black); min-height:100vh; }

/* ---- LOGIN ---- */
.login-screen {
  position: fixed; inset: 0; background: var(--black);
  display: flex; align-items: center; justify-content: center; z-index: 100;
}
.login-screen.hidden { display: none; }
.login-card {
  background: var(--white); width: 320px; padding: 32px 28px; border-top: 3px solid var(--gold);
}
.login-brand { color: var(--black); font-weight:700; font-size:16px; letter-spacing:0.2em; text-transform:uppercase; }
.login-sub { color: var(--grey-700); font-size:11px; text-transform:uppercase; letter-spacing:0.06em; margin-bottom:20px; margin-top:4px; }
.login-card input { width:100%; padding:9px 10px; border:1px solid var(--grey-300); font-family:var(--font); font-size:13px; margin-bottom:14px; }
.login-error {
  background: var(--red-bg); color: var(--red); font-size:11px; padding:8px 10px; margin-bottom:14px;
  border-left: 2px solid var(--red);
}

/* ---- USER BADGE / LOGOUT ---- */
.user-badge { margin-left:16px; padding-left:16px; border-left:1px solid var(--grey-700); }
.user-badge .role-tag {
  display:inline-block; font-size:9px; font-weight:700; letter-spacing:0.06em; padding:2px 6px; margin-left:6px;
  background: var(--gold-light); color: var(--gold); text-transform:uppercase;
}
.user-badge .role-tag.viewer { background: rgba(255,255,255,0.1); color: var(--grey-500); }
.user-badge button { background:none; border:none; color: var(--grey-500); font-family:var(--font); font-size:10px; letter-spacing:0.06em; text-transform:uppercase; cursor:pointer; margin-left:10px; }
.user-badge button:hover { color: var(--white); }

/* ---- VIEW-ONLY LOCK ---- */
.view-only-banner {
  background: var(--grey-200); color: var(--grey-700); font-size:11px; text-transform:uppercase; letter-spacing:0.06em;
  padding:8px 12px; margin-bottom:16px; border-left:2px solid var(--grey-500);
}
[data-locked="true"] { opacity:0.55; cursor:not-allowed !important; }

/* ---- NAV ---- */
nav.topnav {
  background: var(--black);
  height: 52px;
  position: sticky; top:0; z-index: 50;
  display:flex; align-items:center; justify-content:space-between;
  padding: 0 24px;
}
.brand { color: var(--white); font-weight:700; font-size:13px; letter-spacing:0.2em; text-transform:uppercase; white-space:nowrap; }
.tabs { display:flex; gap: 2px; overflow-x:auto; scrollbar-width:none; flex:1; margin: 0 20px; }
.tabs::-webkit-scrollbar{ display:none; }
.tab-btn {
  background:none; border:none; color: var(--grey-500);
  font-family: var(--font); font-size:10px; font-weight:700; letter-spacing:0.08em; text-transform:uppercase;
  padding: 18px 12px; cursor:pointer; border-bottom:2px solid transparent; white-space:nowrap;
}
.tab-btn:hover { color: var(--white); }
.tab-btn.active { color: var(--gold); border-bottom:2px solid var(--gold); }
.tab-btn.home-btn { border-right:1px solid var(--grey-700); margin-right:6px; padding-right:16px; }
.nav-meta { color: var(--grey-500); font-size:10px; letter-spacing:0.06em; text-transform:uppercase; white-space:nowrap; }

/* ---- PAGE ---- */
.container { max-width: 1180px; margin:0 auto; padding: 28px 24px 60px; }
.view { display:none; }
.view.active { display:block; }

/* ---- HOME / LANDING PAGE ---- */
.home-header { margin-bottom: 28px; }
.home-title { font-size: 26px; font-weight: 700; color: var(--black); }
.home-subtitle { font-size: 13px; color: var(--grey-500); margin-top: 4px; }
.home-group { margin-bottom: 28px; }
.home-group-title { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: var(--grey-500); margin-bottom: 12px; border-bottom: 1px solid var(--grey-200); padding-bottom: 6px; }
.home-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 14px; }
.home-card { background: var(--white); border: 1px solid var(--grey-200); padding: 18px; cursor: pointer; transition: border-color 0.12s, transform 0.08s; }
.home-card:hover { border-color: var(--gold); transform: translateY(-1px); }
.home-card-icon { font-size: 22px; margin-bottom: 8px; }
.home-card-label { font-size: 14px; font-weight: 700; color: var(--black); margin-bottom: 4px; }
.home-card-desc { font-size: 11px; color: var(--grey-500); line-height: 1.4; }
@media (max-width: 700px) { .home-grid { grid-template-columns: 1fr 1fr; } }

.page-header {
  display:flex; align-items:flex-end; justify-content:space-between;
  border-bottom: 1px solid var(--gold); padding-bottom: 14px; margin-bottom: 24px; flex-wrap:wrap; gap:10px;
}
.page-title { font-size:18px; font-weight:700; text-transform:uppercase; letter-spacing:0.03em; }
.page-subtitle { font-size:11px; color:var(--grey-500); text-transform:uppercase; letter-spacing:0.06em; margin-top:4px; }
.period-badge {
  border:1px solid var(--gold); background:var(--gold-light); color:var(--gold);
  font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:0.06em; padding:6px 12px;
}

.section-divider { border-bottom:1px solid rgba(200,174,121,0.5); margin: 28px 0; }

/* ---- GRID ---- */
.grid-5 { display:grid; grid-template-columns:repeat(5,1fr); border:1px solid var(--grey-200); background:var(--white); }
.grid-5 > div { border-right:1px solid var(--grey-200); }
.grid-5 > div:last-child { border-right:none; }
.grid-2 { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
.grid-2-1 { display:grid; grid-template-columns:2fr 1fr; gap:16px; }
.grid-3 { display:grid; grid-template-columns:1fr 1fr 1fr; gap:16px; }
.grid-4 { display:grid; grid-template-columns:1fr 1fr 1fr 1fr; gap:16px; }
.grid-6 { display:grid; grid-template-columns:repeat(6,1fr); gap:14px; }
@media (max-width: 900px){ .grid-5, .grid-6, .grid-4 { grid-template-columns:repeat(2,1fr); } .grid-5>div{border-right:none;border-bottom:1px solid var(--grey-200);} .grid-2,.grid-2-1,.grid-3{grid-template-columns:1fr;} }

.card { background:var(--white); border:1px solid var(--grey-200); padding:20px 22px; margin-bottom:16px; }
.section-title { font-size:11px; font-weight:700; letter-spacing:0.08em; text-transform:uppercase; margin-bottom:14px; }

/* ---- KPI CARD ---- */
.kpi-cell { padding: 18px 20px; }
.card-label { font-size:9px; font-weight:700; letter-spacing:0.1em; text-transform:uppercase; color:var(--grey-500); margin-bottom:8px; }
.card-value { font-size:26px; font-weight:700; color:var(--black); }
.card-sub { font-size:10px; color:var(--grey-500); margin-top:6px; text-transform:uppercase; letter-spacing:0.04em; }
.pill { display:inline-flex; align-items:center; gap:4px; font-size:10px; font-weight:700; padding:3px 9px; margin-top:8px; text-transform:uppercase; letter-spacing:0.04em; }
.pill.green { background:var(--green-bg); color:var(--green); }
.pill.amber { background:var(--amber-bg); color:var(--amber); }
.pill.red { background:var(--red-bg); color:var(--red); }
.dot { display:inline-block; width:8px; height:8px; border-radius:50%; margin-right:6px; }
.dot.green{background:var(--green);} .dot.amber{background:var(--amber);} .dot.red{background:var(--red);}

/* ---- TABLE ---- */
table.data-table { width:100%; border-collapse:collapse; font-size:12px; }
.data-table thead th { font-weight:700; font-size:10px; letter-spacing:0.06em; text-transform:uppercase; padding:8px 10px; border-bottom:1px solid var(--black); text-align:left; color:var(--black); cursor:pointer; user-select:none; }
.data-table tbody td { padding:9px 10px; border-bottom:1px solid var(--grey-200); vertical-align:middle; }
.data-table tbody tr:last-child td { border-bottom:none; }
.data-table tbody tr:hover { background: var(--grey-100); }
.rag-text.green{color:var(--green); font-weight:700;} .rag-text.amber{color:var(--amber); font-weight:700;} .rag-text.red{color:var(--red); font-weight:700;} .rag-text.na{color:var(--grey-500);}

.badge { font-size:9px; font-weight:700; text-transform:uppercase; letter-spacing:0.04em; padding:3px 8px; }
.badge.green { background:var(--green-bg); color:var(--green); }
.badge.amber { background:var(--amber-bg); color:var(--amber); }
.badge.red { background:var(--red-bg); color:var(--red); }
.badge.grey { background:var(--grey-200); color:var(--grey-700); }

/* ---- BARS / PROGRESS ---- */
.bar-track { width:100%; height:6px; background:var(--grey-200); position:relative; }
.bar-fill { height:6px; background:var(--gold); }
.bar-fill.green{background:var(--green);} .bar-fill.amber{background:var(--amber);} .bar-fill.red{background:var(--red);}
.mini-bar-track { width:60px; height:5px; background:var(--grey-200); display:inline-block; vertical-align:middle; }
.mini-bar-fill { height:5px; background:var(--gold); }

/* ---- FORM ---- */
label.field-label { display:block; font-size:9px; font-weight:700; text-transform:uppercase; letter-spacing:0.06em; color:var(--grey-500); margin-bottom:5px; margin-top:12px; }
select, input[type=text], input[type=date], input[type=number], textarea {
  width:100%; font-family:var(--font); font-size:13px; padding:9px 10px; border:1px solid var(--grey-300); background:var(--white); color:var(--black);
}
textarea { resize:vertical; min-height:70px; }
.form-row { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
.checklist { display:flex; flex-direction:column; gap:8px; margin-top:10px; }

/* ---- GRIND accountability workflow ---- */
.grind-summary { display:flex; gap:18px; font-size:11px; color:var(--grey-700); margin-bottom:12px; }
.grind-summary b { color:var(--black); }
.grind-item { border:1px solid var(--grey-200); margin-bottom:6px; padding:10px 12px; }
.grind-item-row { display:flex; align-items:center; gap:10px; }
.grind-label { flex:1; font-size:13px; }
.grind-tag { font-size:9px; text-transform:uppercase; letter-spacing:0.05em; color:var(--grey-500); background:var(--grey-100); padding:2px 6px; }
.grind-check { color:var(--green); font-weight:700; width:16px; text-align:center; }
.grind-check-no { color:var(--red); }
.grind-item-yes { border-left:3px solid var(--green); background:var(--grey-100); }
.grind-item-no-resolved { border-left:3px solid var(--amber); }
.grind-item-no-open { border-left:3px solid var(--red); background:var(--red-bg); }
.grind-yn { display:flex; gap:6px; }
.btn-mini { padding:4px 10px; font-size:11px; }
.btn-no.btn-outline { border-color:var(--red); color:var(--red); }
.grind-required { margin-top:10px; padding-top:10px; border-top:1px dashed var(--grey-300); }
.checklist label { display:flex; align-items:center; gap:8px; font-size:12px; cursor:pointer; }
.checklist input[type=checkbox]{ width:16px; height:16px; accent-color:var(--gold); }

.btn { display:inline-flex; align-items:center; gap:8px; padding:12px 22px; font-family:var(--font); font-size:12px; font-weight:700; letter-spacing:0.05em; text-transform:uppercase; cursor:pointer; border:none; }
.btn-gold { background:var(--gold); color:var(--black); }
.btn-black { background:var(--black); color:var(--gold); }
.btn-outline { background:transparent; color:var(--black); border:2px solid var(--black); }
.btn:hover{ opacity:0.85; }
.btn:disabled{ opacity:0.4; cursor:not-allowed; }

.filter-row { display:flex; gap:10px; flex-wrap:wrap; margin-bottom:16px; align-items:center; }
.filter-row select, .filter-row input { width:auto; min-width:150px; }

.flag-list { list-style:none; }
.flag-list li { display:flex; justify-content:space-between; padding:7px 0; border-bottom:1px solid var(--grey-200); font-size:12px; }
.flag-list li:last-child{ border-bottom:none; }

.empty-state { color:var(--grey-500); font-size:12px; padding:24px 0; text-align:center; }

.wrap-copy { white-space:pre-wrap; font-family:var(--font); font-size:12px; line-height:1.8; background:var(--grey-100); border:1px solid var(--grey-200); padding:18px 20px; }

footer.app-footer { border-top:1px solid var(--grey-200); padding:16px 36px; display:flex; justify-content:space-between; font-size:10px; color:var(--grey-500); text-transform:uppercase; letter-spacing:0.06em; flex-wrap:wrap; gap:6px; }

.toast { position:fixed; bottom:24px; right:24px; background:var(--black); color:var(--gold); padding:12px 20px; font-size:12px; font-weight:700; text-transform:uppercase; letter-spacing:0.05em; display:none; z-index:100; }

/* ---- SEGMENTED CONTROL (team toggle) ---- */
.segmented { display:flex; border:1px solid var(--grey-200); background:var(--white); margin-bottom:16px; }
.segmented-btn { flex:1; text-align:center; padding:12px 16px; background:var(--white); color:var(--grey-500); border:none; border-right:1px solid var(--grey-200);
  font-family:var(--font); font-size:11px; font-weight:700; letter-spacing:0.06em; text-transform:uppercase; cursor:pointer; }
.segmented-btn:last-child{ border-right:none; }
.segmented-btn.active { background:var(--black); color:var(--gold); }
.segmented-btn:not(.active):hover { color:var(--black); }

/* ---- DATA SOURCE STATUS PILLS ---- */
.source-row { display:flex; gap:10px; flex-wrap:wrap; margin-bottom:20px; }
.source-pill { font-size:11px; font-weight:600; padding:8px 14px; border:1px solid var(--green); background:var(--green-bg); color:var(--green); }
.source-pill.grey { border-color:var(--grey-300); background:var(--grey-100); color:var(--grey-500); }

/* ---- KPI STRIP (dashboard) ---- */
.kpi-strip { display:grid; grid-template-columns:repeat(5,1fr); background:var(--white); border:1px solid var(--grey-200); margin-bottom:8px; }
.kpi-strip > div { padding:18px 20px; border-right:1px solid var(--grey-200); }
.kpi-strip > div:last-child{ border-right:none; }
.kpi-strip .card-value { font-size:28px; }
.kpi-clickable { cursor:pointer; transition:background 0.12s; }
.kpi-clickable:hover { background:var(--grey-100); }
.kpi-clickable.kpi-active { background:var(--gold-light); }
.kpi-hint { font-size:11px; color:var(--grey-500); text-align:right; margin-bottom:24px; }
.status-pill { display:inline-flex; align-items:center; gap:5px; font-size:10px; font-weight:700; padding:3px 9px; margin-top:9px; text-transform:uppercase; letter-spacing:0.03em; }
.status-pill.green { background:var(--green-bg); color:var(--green); }
.status-pill.amber { background:var(--amber-bg); color:var(--amber); }
.status-pill.red { background:var(--red-bg); color:var(--red); }

/* ---- SCORECARD ROW CARDS ---- */
.grid-3-cards { display:grid; grid-template-columns:repeat(3,1fr); gap:16px; }
@media (max-width: 900px){ .kpi-strip, .grid-3-cards { grid-template-columns:1fr 1fr; } .kpi-strip>div{border-right:none;border-bottom:1px solid var(--grey-200);} }
@media (max-width: 600px){ .kpi-strip, .grid-3-cards { grid-template-columns:1fr; } }
.sc-card { background:var(--white); border:1px solid var(--grey-200); padding:22px 24px; }
.sc-meta { font-size:9px; font-weight:700; color:var(--grey-500); text-transform:uppercase; letter-spacing:0.06em; margin-bottom:4px; }
.sc-name { font-size:15px; font-weight:700; text-transform:uppercase; padding-bottom:12px; border-bottom:1px solid var(--gold); margin-bottom:4px; }
.sc-row { display:flex; justify-content:space-between; align-items:center; padding:10px 0; border-bottom:1px solid var(--grey-200); }
.sc-row:last-child{ border-bottom:none; }
.sc-row .sc-label { font-size:12px; color:var(--grey-700); }
.sc-row .sc-val { font-size:11px; font-weight:700; padding:3px 9px; }
.sc-val.green{ background:var(--green-bg); color:var(--green); } .sc-val.amber{ background:var(--amber-bg); color:var(--amber); } .sc-val.red{ background:var(--red-bg); color:var(--red); }

@media print {
  nav.topnav, .no-print { display:none !important; }
  .view { display:block !important; }
}
</style>
</head>

let TOKEN = localStorage.getItem('bos_token') || null;
let ROLE = localStorage.getItem('bos_role') || null;
let USERNAME = localStorage.getItem('bos_username') || null;
let DISPLAY_NAME = localStorage.getItem('bos_display_name') || null;
const WRITE_ROLES = ['admin', 'editor'];
function isEditor(){ return WRITE_ROLES.includes(ROLE); }
function isAdmin(){ return ROLE === 'admin'; }

function setSession(payload){
  TOKEN = payload.token; ROLE = payload.role; USERNAME = payload.username; DISPLAY_NAME = payload.displayName;
  localStorage.setItem('bos_token', TOKEN);
  localStorage.setItem('bos_role', ROLE);
  localStorage.setItem('bos_username', USERNAME);
  localStorage.setItem('bos_display_name', DISPLAY_NAME || '');
}
function clearSession(){
  TOKEN = null; ROLE = null; USERNAME = null; DISPLAY_NAME = null;
  localStorage.removeItem('bos_token'); localStorage.removeItem('bos_role');
  localStorage.removeItem('bos_username'); localStorage.removeItem('bos_display_name');
}
function authHeaders(){ return TOKEN ? { 'Authorization': 'Bearer ' + TOKEN } : {}; }

function showLogin(message){
  document.getElementById('loginScreen').classList.remove('hidden');
  const err = document.getElementById('loginError');
  if (message) { err.textContent = message; err.style.display = 'block'; } else { err.style.display = 'none'; }
}
function hideLogin(){ document.getElementById('loginScreen').classList.add('hidden'); }

function renderUserBadge(){
  const el = document.getElementById('userBadge');
  if (!el) return;
  if (!ROLE) { el.innerHTML = ''; return; }
  el.innerHTML = `${DISPLAY_NAME || USERNAME}<span class="role-tag ${ROLE==='viewer'?'viewer':''}">${ROLE}</span><button id="logoutBtn">Sign Out</button>`;
  const logoutBtn = document.getElementById('logoutBtn');
  if (logoutBtn) logoutBtn.addEventListener('click', () => { clearSession(); location.reload(); });
}

async function apiGet(pathUrl){
  const res = await fetch(pathUrl, { headers: authHeaders() });
  if (res.status === 401) { clearSession(); showLogin('Session expired — please sign in again'); throw new Error('unauthorized'); }
  if (!res.ok) throw new Error('Request failed: ' + res.status);
  return res.json();
}

function resolveAlias(name){ return DATA.aliases[name] || name; }

const FSM_LIST = Object.keys(DATA.fsmStores);
const MANAGER_OF_FSM = {};
Object.entries(DATA.managers).forEach(([mgr, fsms]) => fsms.forEach(f => MANAGER_OF_FSM[f] = mgr));

function fsmOfStore(store){
  for (const f of FSM_LIST) if (DATA.fsmStores[f].includes(store)) return f;
  return null;
}
const ALL_STORES = [];
FSM_LIST.forEach(f => DATA.fsmStores[f].forEach(s => ALL_STORES.push({ store: s, fsm: f, manager: MANAGER_OF_FSM[f] })));

const BEELINE_FLAT = {}; // fsm -> canonicalStore -> pct
FSM_LIST.forEach(f => {
  BEELINE_FLAT[f] = {};
  const raw = DATA.beeline[f] || {};
  Object.entries(raw).forEach(([k,v]) => { BEELINE_FLAT[f][resolveAlias(k)] = v; });
});

function gaapOf(store){ const v = DATA.gaap[resolveAlias(store)]; return (v===undefined) ? null : v; }
function keytechOf(store){ const v = DATA.keytech[resolveAlias(store)]; return (v===undefined) ? null : v; }
function beelineOf(fsm, store){ const v = (BEELINE_FLAT[fsm]||{})[resolveAlias(store)]; return (v===undefined) ? null : v; }

/* ---------- data upload overrides (Flow/KeyTech + B-Better) ---------- */
// Uploaded CSVs (store,score) merge into the in-memory lookups immediately
// and persist via BOS's generic storage API so the update survives reloads
// and is visible to everyone, not just the uploader.
function parseTwoColCsv(text){
  return text.split(/\r?\n/).map(l=>l.trim()).filter(Boolean).slice(1) // skip header
    .map(line => {
      const [store, score] = line.split(',').map(c=>c.trim());
      return { store, score: Number(score) };
    })
    .filter(r => r.store && !isNaN(r.score));
}
async function loadDataOverrides(){
  try {
    const r = await apiGet('/api/storage/keytech-overrides');
    const overrides = JSON.parse(r.value || '{}');
    Object.entries(overrides).forEach(([store,score]) => { DATA.keytech[store] = score; });
  } catch(e) { /* no overrides uploaded yet */ }
  try {
    const r = await apiGet('/api/storage/bbetter-overrides');
    const overrides = JSON.parse(r.value || '{}');
    Object.entries(overrides).forEach(([store,score]) => {
      const fsm = fsmOfStore(store);
      if (fsm) { if (!BEELINE_FLAT[fsm]) BEELINE_FLAT[fsm] = {}; BEELINE_FLAT[fsm][resolveAlias(store)] = score; }
    });
  } catch(e) { /* no overrides uploaded yet */ }
}
async function uploadDataOverride(key, rows, applyFn){
  const existing = await apiGet('/api/storage/' + key).catch(() => null);
  const merged = existing ? JSON.parse(existing.value || '{}') : {};
  rows.forEach(r => { merged[r.store] = r.score; applyFn(r.store, r.score); });
  await fetch('/api/storage/' + key, { method:'POST', headers: Object.assign({'Content-Type':'application/json'}, authHeaders()), body: JSON.stringify({ value: JSON.stringify(merged) }) });
}
function wireUploadButton(inputId, btnId, statusId, storageKey, applyFn, onDone){
  const btn = document.getElementById(btnId);
  const input = document.getElementById(inputId);
  if (!btn || !input) return;
  btn.addEventListener('click', () => input.click());
  input.addEventListener('change', async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = async () => {
      const rows = parseTwoColCsv(reader.result);
      const status = document.getElementById(statusId);
      if (!rows.length) { if (status) status.textContent = 'No valid rows found — expected columns: store,score'; return; }
      if (status) status.textContent = 'Uploading...';
      try {
        await uploadDataOverride(storageKey, rows, applyFn);
        if (status) status.textContent = `Updated ${rows.length} store(s).`;
        toast(`Uploaded ${rows.length} row(s)`);
        onDone();
      } catch(err) { if (status) status.textContent = 'Upload failed — check connection.'; }
    };
    reader.readAsText(file);
  });
}

function ragOf(value, t){
  if (value === null || value === undefined || isNaN(value)) return 'na';
  if (value >= t.green) return 'green';
  if (value >= t.amber) return 'amber';
  return 'red';
}
function fmtPct(v, dp){ if (v===null||v===undefined||isNaN(v)) return '—'; return v.toFixed(dp===undefined?1:dp) + '%'; }
function fmtSigned(v, dp){ if (v===null||v===undefined||isNaN(v)) return '—'; const s = v>=0?'+':''; return s + v.toFixed(dp===undefined?1:dp) + '%'; }
function todayISO(){ return new Date().toISOString().slice(0,10); }
function daysAgo(dateStr){ const d = new Date(dateStr); const now = new Date(); return Math.floor((now-d)/86400000); }
function weekRangeLabel(){
  const now = new Date();
  const day = now.getDay(); // 0=Sun..6=Sat
  const mondayOffset = day===0 ? -6 : 1-day;
  const monday = new Date(now); monday.setDate(now.getDate()+mondayOffset);
  const friday = new Date(monday); friday.setDate(monday.getDate()+4);
  const fmt = d => String(d.getDate()).padStart(2,'0') + ' ' + d.toLocaleString('en-GB',{month:'short'}).toUpperCase() + ' ' + d.getFullYear();
  return 'W/C ' + fmt(monday) + ' – ' + fmt(friday);
}
function firstName(m){ return (m||'').split(' ')[0]; }
function fsmsForScope(scope){
  if (scope === 'all') return FSM_LIST;
  return DATA.managers[scope] || FSM_LIST;
}
function storesForScope(scope){
  const fsms = fsmsForScope(scope);
  return ALL_STORES.filter(s => fsms.includes(s.fsm)).map(s=>s.store);
}

/* ---------- KPI computation ---------- */
function tradeHealth(storesList){
  const withData = storesList.map(s => gaapOf(s)).filter(v => v!==null);
  if (!withData.length) return { pct: null, total: storesList.length, withData: 0 };
  const positive = withData.filter(v => v > 0).length;
  return { pct: (positive/withData.length)*100, total: storesList.length, withData: withData.length, positive };
}
function standardsScore(storesList){
  const withData = storesList.map(s => keytechOf(s)).filter(v => v!==null);
  if (!withData.length) return { pct: null, total: storesList.length, withData: 0 };
  const avg = withData.reduce((a,b)=>a+b,0)/withData.length;
  return { pct: avg, total: storesList.length, withData: withData.length };
}
function bbetterScore(fsm, storesList){
  const withData = storesList.map(s => beelineOf(fsm, s)).filter(v => v!==null);
  if (!withData.length) return { pct: null, total: storesList.length, withData: 0 };
  const avg = withData.reduce((a,b)=>a+b,0)/withData.length;
  return { pct: avg, total: storesList.length, withData: withData.length };
}
function visitFrequency(storesList){
  const visited = new Set();
  STATE.visits.forEach(v => { if (daysAgo(v.date) <= 28 && storesList.includes(v.store)) visited.add(v.store); });
  if (!storesList.length) return { pct:null, visited:0, total:0 };
  return { pct: (visited.size/storesList.length)*100, visited: visited.size, total: storesList.length };
}
function actionsClosed(fsmFilter){
  const relevant = STATE.actions.filter(a => !fsmFilter || a.fsm === fsmFilter);
  if (!relevant.length) return { pct:null, closed:0, total:0, overdue:0 };
  const closed = relevant.filter(a => a.status === 'closed').length;
  const overdue = relevant.filter(a => a.status !== 'closed' && a.dueDate && a.dueDate < todayISO()).length;
  return { pct: (closed/relevant.length)*100, closed, total: relevant.length, overdue };
}
function actionsClosedForFsms(fsms){
  const relevant = STATE.actions.filter(a => fsms.includes(a.fsm));
  if (!relevant.length) return { pct:null, closed:0, total:0, overdue:0 };
  const closed = relevant.filter(a => a.status === 'closed').length;
  const overdue = relevant.filter(a => a.status !== 'closed' && a.dueDate && a.dueDate < todayISO()).length;
  return { pct: (closed/relevant.length)*100, closed, total: relevant.length, overdue };
}
function bbetterForFsms(fsms){
  let sum=0, n=0;
  fsms.forEach(f => Object.values(BEELINE_FLAT[f]||{}).forEach(v => { sum+=v; n++; }));
  return { pct: n? sum/n : null, withData: n };
}
function scopedKPIs(scope){
  const fsms = fsmsForScope(scope);
  const stores = storesForScope(scope);
  return {
    fsms, stores,
    trade: tradeHealth(stores),
    standards: standardsScore(stores),
    bbetter: bbetterForFsms(fsms),
    visit: visitFrequency(stores),
    actions: actionsClosedForFsms(fsms)
  };
}

function fsmStoresList(fsm){ return DATA.fsmStores[fsm]; }
function networkStoresList(){ return ALL_STORES.map(s=>s.store); }

function fsmKPIs(fsm){
  const stores = fsmStoresList(fsm);
  return {
    trade: tradeHealth(stores),
    standards: standardsScore(stores),
    bbetter: bbetterScore(fsm, stores),
    visit: visitFrequency(stores),
    actions: actionsClosed(fsm)
  };
}
function networkKPIs(){
  const stores = networkStoresList();
  return {
    trade: tradeHealth(stores),
    standards: standardsScore(stores),
    bbetter: (() => {
      let sum=0, n=0;
      FSM_LIST.forEach(f => Object.values(BEELINE_FLAT[f]).forEach(v => { sum+=v; n++; }));
      return { pct: n? sum/n : null, withData: n, total: stores.length };
    })(),
    visit: visitFrequency(stores),
    actions: actionsClosed(null)
  };
}

function renderDrilldown(){
  const el = document.getElementById('kpiDrilldown');
  if (!el) return;
  if (!DASH_DRILLDOWN) { el.innerHTML = ''; return; }
  const fsms = fsmsForScope(DASH_SCOPE);
  const stores = ALL_STORES.filter(s => fsms.includes(s.fsm));
  const metric = DASH_DRILLDOWN;

  let title = '', rows = [];

  if (metric === 'trade') {
    title = 'Stores Dragging Down Trade Health — YOY Flat or Negative';
    rows = stores.map(s => ({ store:s.store, fsm:s.fsm, value: gaapOf(s.store) }))
      .filter(r => r.value !== null && r.value <= 0)
      .sort((a,b) => a.value - b.value)
      .map(r => `<tr><td>${r.store}</td><td>${r.fsm}</td><td class="rag-text red">${fmtSigned(r.value)}</td></tr>`);
    var head = '<tr><th>Store</th><th>FSM</th><th>Trade YOY</th></tr>';
  } else if (metric === 'standards') {
    title = 'Stores Below Flow Score Target — Recipe Compliance';
    rows = stores.map(s => ({ store:s.store, fsm:s.fsm, value: keytechOf(s.store) }))
      .filter(r => r.value !== null && ragOf(r.value, THRESH.standards) !== 'green')
      .sort((a,b) => a.value - b.value)
      .map(r => `<tr><td>${r.store}</td><td>${r.fsm}</td><td class="rag-text ${ragOf(r.value,THRESH.standards)}">${fmtPct(r.value,0)}</td></tr>`);
    var head = '<tr><th>Store</th><th>FSM</th><th>Recipe Compliance</th></tr>';
  } else if (metric === 'bbetter') {
    title = 'Stores Below B-Better Target';
    rows = stores.map(s => ({ store:s.store, fsm:s.fsm, value: beelineOf(s.fsm, s.store) }))
      .filter(r => r.value !== null && ragOf(r.value, THRESH.bbetter) !== 'green')
      .sort((a,b) => a.value - b.value)
      .map(r => `<tr><td>${r.store}</td><td>${r.fsm}</td><td class="rag-text ${ragOf(r.value,THRESH.bbetter)}">${fmtPct(r.value,0)}</td></tr>`);
    var head = '<tr><th>Store</th><th>FSM</th><th>B-Better Score</th></tr>';
  } else if (metric === 'visit') {
    title = 'Stores Not Visited in the Last 28 Days';
    const visited = new Set();
    STATE.visits.forEach(v => { if (daysAgo(v.date) <= 28) visited.add(v.store); });
    rows = stores.filter(s => !visited.has(s.store))
      .map(s => `<tr><td>${s.store}</td><td>${s.fsm}</td><td class="rag-text red">No visit logged</td></tr>`);
    var head = '<tr><th>Store</th><th>FSM</th><th>Status</th></tr>';
  } else if (metric === 'actions') {
    title = 'Overdue Open Tasks';
    const overdue = STATE.actions.filter(a => fsms.includes(a.fsm) && a.status !== 'closed' && a.dueDate && a.dueDate < todayISO())
      .sort((a,b) => a.dueDate.localeCompare(b.dueDate));
    rows = overdue.map(a => `<tr><td>${a.store}</td><td>${a.fsm}</td><td>${a.description||''}</td><td class="rag-text red">${a.dueDate}</td></tr>`);
    var head = '<tr><th>Store</th><th>FSM</th><th>Action</th><th>Due Date</th></tr>';
  }

  el.innerHTML = `
    <div class="card" style="margin-top:12px;">
      <div class="section-title">${title} <span style="color:var(--grey-500);font-weight:400;">(${rows.length})</span></div>
      ${rows.length ? `<table class="data-table"><thead>${head}</thead><tbody>${rows.join('')}</tbody></table>` : '<div class="empty-state">Nothing flagged here right now.</div>'}
    </div>`;
}

function fmtRand(v){ if (v===null||v===undefined||isNaN(v)) return '—'; const s = v<0?'-':''; return s+'R'+Math.round(Math.abs(v)).toLocaleString('en-ZA'); }
function fmtRandSigned(v){ if (v===null||v===undefined||isNaN(v)) return '—'; const s = v>=0?'+':'-'; return s+'R'+Math.round(Math.abs(v)).toLocaleString('en-ZA'); }
function metricBreakdown(t, prefix, formatAvgObj){
  const cur = t[prefix+'_may26'], prev = t[prefix+'_prev'], ytd = t[prefix+'_fytd'];
  const yoyG = t[prefix+'_may_growth'], ytdG = t[prefix+'_fytd_growth'];
  const mom = (cur!=null && prev) ? { pct:(cur-prev)/prev, val:cur-prev } : null;
  const yoy = (cur!=null && yoyG!=null) ? { pct:yoyG, val:cur-cur/(1+yoyG) } : null;
  const ytdB = (ytd!=null && ytdG!=null) ? { pct:ytdG, val:ytd-ytd/(1+ytdG) } : null;
  const fAvg = formatAvgObj ? formatAvgObj[prefix+'_may26'] : null;
  const vsFormat = (cur!=null && fAvg) ? { pct:(cur-fAvg)/fAvg, val:cur-fAvg } : null;
  const bAvg = BRAND_NETWORK_AVG[prefix+'_may26'];
  const vsBrand = (cur!=null && bAvg) ? { pct:(cur-bAvg)/bAvg, val:cur-bAvg } : null;
  return { cur, mom, yoy, ytd:ytdB, vsFormat, vsBrand };
}
function metricRow(label, m, isMoney){
  const fmt = isMoney ? fmtRandSigned : fmtSigned;
  const cell = x => x ? `<span class="rag-text ${x.pct>=0?'green':'red'}">${fmtSigned(x.pct*100,1)}</span> <span style="color:var(--grey-500);font-size:11px;">(${fmt(x.val)})</span>` : '<span class="rag-text na">—</span>';
  return `<tr><td>${label}</td><td>${cell(m.mom)}</td><td>${cell(m.yoy)}</td><td>${cell(m.ytd)}</td><td>${cell(m.vsFormat)}</td><td>${cell(m.vsBrand)}</td></tr>`;
}

/* ============================================================
   VIEW: LOG VISIT (GRIND)
   ============================================================ */
const GRIND_ITEMS = [
  { id:'greet',        category:'GRIND',   label:'G — Greet every staff member, handshake manager, no phone' },
  { id:'read',         category:'GRIND',   label:'R — Read: door sweep, first impressions as a customer' },
  { id:'keytech',      category:'Inspect', label:'KeyTech machine status' },
  { id:'bar',          category:'Inspect', label:'Bar setup and cleanliness' },
  { id:'customerArea', category:'Inspect', label:'Customer area (tables, floors, music, temp)' },
  { id:'uniform',      category:'Inspect', label:'Team uniform and grooming' },
  { id:'boh',          category:'Inspect', label:'Back-of-house hygiene' },
  { id:'numbers',      category:'GRIND',   label:'N — Numbers: GAAP YOY%, KeyTech %, B-Better % with manager present' },
  { id:'drive',        category:'GRIND',   label:'D — Drive: agree ONE priority, owner + due date, log before leaving' },
];

function viewLogVisit(){
  document.getElementById('app').innerHTML = `
    <div class="page-header">
      <div><div class="page-title">Log Visit</div><div class="page-subtitle">GRIND Checklist · No Failed Standard Without Accountability</div></div>
      <div class="period-badge">20-MIN RITUAL</div>
    </div>
    <div class="grid-2-1">
      <div class="card">
        <div class="section-title">New Visit</div>
        <div class="form-row">
          <div><label class="field-label">FSM</label><select id="lvFsm"><option value="">— select —</option>${fsmSelectOptions()}</select></div>
          <div><label class="field-label">Store</label><select id="lvStore"><option value="">— select FSM first —</option></select></div>
        </div>
        <div class="form-row">
          <div><label class="field-label">Date</label><input type="date" id="lvDate" value="${todayISO()}"></div>
          <div><label class="field-label">Visit Type</label><select id="lvType"><option value="GRIND">GRIND (standard visit)</option><option value="Saturday Support">Saturday Support</option></select></div>
        </div>
        <div id="lvWarning"></div>

        <div id="lvGrindBlock">
          <label class="field-label">GRIND Checklist — Yes / No</label>
          <div class="bar-track" style="margin-bottom:6px;"><div class="bar-fill" id="lvProgressBar" style="width:0%;"></div></div>
          <div id="lvGrindSummary" class="grind-summary"></div>
          <div id="lvGrindItems"></div>
        </div>

        <label class="field-label">Visit Notes / One Priority Agreed</label>
        <textarea id="lvNotes" placeholder="e.g. Agreed with manager to retrain 2 baristas on espresso dosing by Friday."></textarea>

        <div class="section-divider"></div>
        <button class="btn btn-gold" id="lvSave" disabled>Save Visit</button>
        <span id="lvSaveHint" style="font-size:11px;color:var(--grey-500);margin-left:10px;">Complete all GRIND steps to save</span>
      </div>

      <div class="card">
        <div class="section-title">Recent Visits</div>
        <div id="lvRecent"></div>
      </div>
    </div>
  `;

  // grindState[itemId] = { answer:'yes'|'no'|null, resolving:null|'task'|'note',
  //                         resolved:bool, note:'', task:{...} }
  let grindState = {};
  GRIND_ITEMS.forEach(it => { grindState[it.id] = { answer:null, resolving:null, resolved:false, note:'', task:null }; });

  function updateStoreOptions(){
    const fsm = document.getElementById('lvFsm').value;
    document.getElementById('lvStore').innerHTML = storeSelectOptions(fsm);
    checkWarning();
  }
  function checkWarning(){
    const fsm = document.getElementById('lvFsm').value;
    const date = document.getElementById('lvDate').value;
    const box = document.getElementById('lvWarning');
    if (!fsm || !date) { box.innerHTML=''; return; }
    const countToday = STATE.visits.filter(v=>v.fsm===fsm && v.date===date).length;
    if (countToday >= 2) box.innerHTML = `<div class="card" style="border-left:4px solid var(--red);background:var(--red-bg);margin-bottom:10px;"><div style="font-size:12px;">⚠ ${fsm} has already logged ${countToday} visits on ${date}. Max 2 stores/day for travel cost control.</div></div>`;
    else box.innerHTML = '';
  }

  function grindProgress(){
    const type = document.getElementById('lvType').value;
    if (type === 'Saturday Support') return { pct: 100, allDone: true, yes:0, tasksCreated:0, notesAdded:0, total:0 };
    const total = GRIND_ITEMS.length;
    const resolvedCount = GRIND_ITEMS.filter(it => grindState[it.id].resolved).length;
    const yesCount = GRIND_ITEMS.filter(it => grindState[it.id].answer==='yes').length;
    const tasksCreated = GRIND_ITEMS.filter(it => grindState[it.id].resolving==='task' && grindState[it.id].resolved).length;
    const notesAdded = GRIND_ITEMS.filter(it => grindState[it.id].resolving==='note' && grindState[it.id].resolved).length;
    return { pct: (resolvedCount/total)*100, allDone: resolvedCount===total, yes:yesCount, tasksCreated, notesAdded, total };
  }

  function renderGrindItem(it){
    const s = grindState[it.id];
    const wrap = document.getElementById('lvItem_' + it.id);
    if (!wrap) return;

    if (s.answer === 'yes') {
      wrap.className = 'grind-item grind-item-yes';
      wrap.innerHTML = `
        <div class="grind-item-row">
          <span class="grind-check">✓</span>
          <span class="grind-label">${it.label}</span>
          <span class="grind-tag">${it.category}</span>
          <button class="btn-mini" data-change="${it.id}">Change</button>
        </div>`;
    } else if (s.answer === 'no' && s.resolved) {
      const chip = s.resolving === 'task'
        ? `<span class="badge amber">TASK CREATED · ${s.task.priority.toUpperCase()} · DUE ${s.task.dueDate}</span>`
        : `<span class="badge">NOTE ADDED</span>`;
      wrap.className = 'grind-item grind-item-no-resolved';
      wrap.innerHTML = `
        <div class="grind-item-row">
          <span class="grind-check grind-check-no">✕</span>
          <span class="grind-label">${it.label}</span>
          <span class="grind-tag">${it.category}</span>
          ${chip}
          <button class="btn-mini" data-change="${it.id}">Change</button>
        </div>`;
    } else if (s.answer === 'no') {
      wrap.className = 'grind-item grind-item-no-open';
      wrap.innerHTML = `
        <div class="grind-item-row">
          <span class="grind-check grind-check-no">✕</span>
          <span class="grind-label">${it.label}</span>
          <span class="grind-tag">${it.category}</span>
        </div>
        <div class="grind-required">
          <b>Required before you can continue:</b>
          <div style="display:flex;gap:8px;margin:8px 0;">
            <button class="btn ${s.resolving==='task'?'btn-gold':'btn-outline'}" data-resolve-mode="task" data-id="${it.id}">Create Task</button>
            <button class="btn ${s.resolving==='note'?'btn-gold':'btn-outline'}" data-resolve-mode="note" data-id="${it.id}">Add Note Instead</button>
          </div>
          ${s.resolving === 'task' ? `
            <div class="form-row">
              <div><label class="field-label">Description of Issue</label><input type="text" id="gi_${it.id}_issue" placeholder="What did you find?"></div>
              <div><label class="field-label">Required Action</label><input type="text" id="gi_${it.id}_action" placeholder="What needs to happen?"></div>
            </div>
            <div class="form-row">
              <div><label class="field-label">Owner</label><input type="text" id="gi_${it.id}_owner" placeholder="Who owns this?"></div>
              <div><label class="field-label">Priority</label>
                <select id="gi_${it.id}_priority">
                  <option value="Low">Low</option>
                  <option value="Medium" selected>Medium</option>
                  <option value="High">High</option>
                </select>
              </div>
            </div>
            <div class="form-row">
              <div><label class="field-label">Due Date</label><input type="date" id="gi_${it.id}_due"></div>
              <div style="display:flex;align-items:flex-end;"><button class="btn btn-gold" data-confirm-task="${it.id}" style="width:100%;">Save Task</button></div>
            </div>
          ` : ''}
          ${s.resolving === 'note' ? `
            <textarea id="gi_${it.id}_note" placeholder="Why is a task not required here?"></textarea>
            <button class="btn btn-gold" data-confirm-note="${it.id}" style="margin-top:8px;">Save Note</button>
          ` : ''}
        </div>`;
    } else {
      wrap.className = 'grind-item grind-item-unanswered';
      wrap.innerHTML = `
        <div class="grind-item-row">
          <span class="grind-label">${it.label}</span>
          <span class="grind-tag">${it.category}</span>
          <div class="grind-yn">
            <button class="btn btn-outline btn-mini" data-yes="${it.id}">Yes</button>
            <button class="btn btn-outline btn-mini btn-no" data-no="${it.id}">No</button>
          </div>
        </div>`;
    }
    wireItemEvents(it);
  }

  function renderAllGrindItems(){
    document.getElementById('lvGrindItems').innerHTML = GRIND_ITEMS.map(it => `<div class="${'grind-item'}" id="lvItem_${it.id}"></div>`).join('');
    GRIND_ITEMS.forEach(renderGrindItem);
  }

  function wireItemEvents(it){
    const wrap = document.getElementById('lvItem_' + it.id);
    if (!wrap) return;
    const yesBtn = wrap.querySelector('[data-yes]');
    if (yesBtn) yesBtn.addEventListener('click', () => {
      grindState[it.id] = { answer:'yes', resolving:null, resolved:true, note:'', task:null };
      renderGrindItem(it); updateProgress(); focusNextUnanswered(it.id);
    });
    const noBtn = wrap.querySelector('[data-no]');
    if (noBtn) noBtn.addEventListener('click', () => {
      grindState[it.id] = { answer:'no', resolving:null, resolved:false, note:'', task:null };
      renderGrindItem(it); updateProgress();
    });
    const changeBtn = wrap.querySelector('[data-change]');
    if (changeBtn) changeBtn.addEventListener('click', () => {
      grindState[it.id] = { answer:null, resolving:null, resolved:false, note:'', task:null };
      renderGrindItem(it); updateProgress();
    });
    const modeBtns = wrap.querySelectorAll('[data-resolve-mode]');
    modeBtns.forEach(b => b.addEventListener('click', () => {
      grindState[it.id].resolving = b.dataset.resolveMode;
      renderGrindItem(it);
    }));
    const confirmTask = wrap.querySelector('[data-confirm-task]');
    if (confirmTask) confirmTask.addEventListener('click', () => {
      const issue = document.getElementById(`gi_${it.id}_issue`).value.trim();
      const action = document.getElementById(`gi_${it.id}_action`).value.trim();
      const owner = document.getElementById(`gi_${it.id}_owner`).value.trim();
      const priority = document.getElementById(`gi_${it.id}_priority`).value;
      const dueDate = document.getElementById(`gi_${it.id}_due`).value;
      if (!issue || !action || !owner || !dueDate) { toast('Fill in issue, required action, owner and due date'); return; }
      grindState[it.id].task = { issueDescription: issue, requiredAction: action, owner, priority, dueDate };
      grindState[it.id].resolved = true;
      renderGrindItem(it); updateProgress(); focusNextUnanswered(it.id);
    });
    const confirmNote = wrap.querySelector('[data-confirm-note]');
    if (confirmNote) confirmNote.addEventListener('click', () => {
      const note = document.getElementById(`gi_${it.id}_note`).value.trim();
      if (!note) { toast('Add a short note explaining why no task is needed'); return; }
      grindState[it.id].note = note;
      grindState[it.id].resolved = true;
      renderGrindItem(it); updateProgress(); focusNextUnanswered(it.id);
    });
  }

  function focusNextUnanswered(afterId){
    const idx = GRIND_ITEMS.findIndex(it => it.id === afterId);
    const next = GRIND_ITEMS.slice(idx+1).find(it => !grindState[it.id].resolved);
    if (next) {
      const el = document.getElementById('lvItem_' + next.id);
      if (el) el.scrollIntoView({ behavior:'smooth', block:'center' });
    }
  }

  function updateProgress(){
    const type = document.getElementById('lvType').value;
    document.getElementById('lvGrindBlock').style.display = type==='Saturday Support' ? 'none' : 'block';
    const g = grindProgress();
    const bar = document.getElementById('lvProgressBar');
    bar.style.width = g.pct + '%';
    bar.className = 'bar-fill ' + (g.pct===100?'green':(g.pct>0?'amber':''));
    document.getElementById('lvGrindSummary').innerHTML = type==='Saturday Support' ? '' : `
      <span>GRIND Score: <b>${Math.round((g.yes/g.total)*100) || 0}%</b></span>
      <span>Tasks Created: <b>${g.tasksCreated}</b></span>
      <span>Notes Added: <b>${g.notesAdded}</b></span>`;
    const saveBtn = document.getElementById('lvSave');
    const hint = document.getElementById('lvSaveHint');
    const ready = g.allDone && document.getElementById('lvFsm').value && document.getElementById('lvStore').value;
    saveBtn.disabled = !ready;
    hint.textContent = type==='Saturday Support' ? 'Saturday Support — no GRIND required' : (g.allDone ? 'Ready to save' : 'Every "No" needs a task or a note before you can save');
  }

  function renderRecent(){
    const recent = [...STATE.visits].sort((a,b)=> b.date.localeCompare(a.date)).slice(0,15);
    document.getElementById('lvRecent').innerHTML = recent.length ? `
      <table class="data-table">
        <thead><tr><th>Date</th><th>FSM</th><th>Store</th><th>Type</th><th>GRIND Score</th><th>Tasks</th><th>Open</th><th>Closed</th></tr></thead>
        <tbody>${recent.map(v => {
          const responses = v.grindResponses || [];
          const total = responses.length;
          const yesCount = responses.filter(r=>r.answer==='yes').length;
          const score = total ? Math.round((yesCount/total)*100) : null;
          const linkedActions = STATE.actions.filter(a => a.visitId === v.id);
          const open = linkedActions.filter(a => a.status !== 'closed').length;
          const closed = linkedActions.filter(a => a.status === 'closed').length;
          return `<tr>
            <td>${v.date}</td><td>${v.fsm}</td><td>${v.store}</td><td>${v.type}</td>
            <td>${score===null ? '—' : score+'%'}</td>
            <td>${linkedActions.length}</td>
            <td class="${open?'rag-text amber':''}">${open}</td>
            <td class="${closed?'rag-text green':''}">${closed}</td>
          </tr>`;
        }).join('')}</tbody>
      </table>` : '<div class="empty-state">No visits logged yet.</div>';
  }

  document.getElementById('lvFsm').addEventListener('change', ()=>{ updateStoreOptions(); updateProgress(); });
  document.getElementById('lvStore').addEventListener('change', updateProgress);
  document.getElementById('lvDate').addEventListener('change', ()=>{ checkWarning(); });
  document.getElementById('lvType').addEventListener('change', updateProgress);

  document.getElementById('lvSave').addEventListener('click', async () => {
    const fsm = document.getElementById('lvFsm').value, store = document.getElementById('lvStore').value;
    const date = document.getElementById('lvDate').value, type = document.getElementById('lvType').value;
    const notes = document.getElementById('lvNotes').value;
    const saveBtn = document.getElementById('lvSave');
    saveBtn.disabled = true; saveBtn.textContent = 'Saving...';

    const grindResponses = type === 'Saturday Support' ? [] : GRIND_ITEMS.map(it => {
      const s = grindState[it.id];
      return { id: it.id, category: it.category, label: it.label, answer: s.answer, resolution: s.resolving, note: s.note || '' };
    });
    const tasksFromGrind = type === 'Saturday Support' ? [] : GRIND_ITEMS
      .filter(it => grindState[it.id].resolving === 'task' && grindState[it.id].resolved)
      .map(it => {
        const t = grindState[it.id].task;
        return {
          pillar: it.category === 'Inspect' ? 'Craft' : 'Trade',
          description: t.requiredAction,
          owner: t.owner,
          dueDate: t.dueDate,
          grindCategory: it.category,
          grindItem: it.label,
          issueDescription: t.issueDescription,
          requiredAction: t.requiredAction,
          priority: t.priority,
          source: 'grind',
        };
      });

    try {
      await apiPost('/api/visits', { fsm, store, date, type, notes, actions: tasksFromGrind, grindResponses });
      await refreshState();
      toast('Visit saved · ' + tasksFromGrind.length + ' task(s) created from GRIND');
      viewLogVisit();
    } catch(e) {
      toast(e.message || 'Could not save — check connection and try again');
      saveBtn.disabled = false; saveBtn.textContent = 'Save Visit';
    }
  });

  renderAllGrindItems();
  renderRecent();
  updateProgress();
}

/* ============================================================
   VIEW: ACTIONS TRACKER
   ============================================================ */
function viewActions(){
  document.getElementById('app').innerHTML = `
    <div class="page-header">
      <div><div class="page-title">Task Tracker</div><div class="page-subtitle">Live actions from GRIND visits · Filterable by FSM / Pillar / Status</div></div>
      <div class="period-badge">TARGET ≥80% CLOSED</div>
    </div>
    <div class="grid-4" id="taskKpis" style="margin-bottom:16px;"></div>
    <div id="taskOverdueBanner"></div>
    <div class="card">
      <div class="filter-row">
        <select id="actFsm"><option value="">All FSMs</option>${fsmSelectOptions()}</select>
        <select id="actPillar"><option value="">All Pillars</option><option>Trade</option><option>Craft</option><option>People</option><option>Presence</option><option>Partnership</option></select>
        <select id="actStatus"><option value="">All Status</option><option value="open">Open</option><option value="in-progress">In Progress</option><option value="closed">Closed</option></select>
        <input type="text" id="actSearch" placeholder="Search store or owner...">
        <button class="btn btn-outline" id="actClear">Clear</button>
        <button class="btn btn-outline" id="actRefresh">↻</button>
        <button class="btn btn-outline" id="actExportPdf" style="margin-left:auto;">⬇ PDF</button>
        <button class="btn btn-outline" id="actExportCsv">⬇ CSV</button>
      </div>
    </div>
    <div id="taskListWrap" style="margin-top:14px;"></div>
  `;

  function timeLeftLabel(a){
    if (a.status === 'closed') return null;
    if (!a.dueDate) return null;
    const diffMs = new Date(a.dueDate + 'T23:59:59') - new Date();
    const hrs = Math.round(diffMs / 3600000);
    if (hrs < 0) return { text: 'OVERDUE ' + Math.abs(hrs) + 'h', overdue: true };
    if (hrs < 48) return { text: hrs + 'h left', overdue: false };
    return { text: Math.round(hrs/24) + 'd left', overdue: false };
  }

  function filteredRows(){
    const fsmF = document.getElementById('actFsm').value, pillarF = document.getElementById('actPillar').value, statusF = document.getElementById('actStatus').value;
    const searchF = document.getElementById('actSearch').value.trim().toLowerCase();
    return STATE.actions.filter(a =>
      (!fsmF||a.fsm===fsmF) && (!pillarF||a.pillar===pillarF) && (!statusF||a.status===statusF) &&
      (!searchF || (a.store||'').toLowerCase().includes(searchF) || (a.owner||'').toLowerCase().includes(searchF))
    );
  }

  function render(){
    const rows = filteredRows();
    const active = rows.filter(r=>r.status!=='closed');
    const overdue = active.filter(r=>r.dueDate && r.dueDate<todayISO());
    const completed = rows.filter(r=>r.status==='closed');

    document.getElementById('taskKpis').innerHTML = `
      <div class="card" style="border-top:3px solid var(--gold);"><div class="card-value">${active.length}</div><div class="card-label">Active Tasks</div></div>
      <div class="card" style="border-top:3px solid var(--red);"><div class="card-value" style="color:var(--red);">${overdue.length}</div><div class="card-label">Overdue</div>${overdue.length?`<div class="card-sub" style="color:var(--red);">${overdue.length} need attention</div>`:''}</div>
      <div class="card" style="border-top:3px solid var(--green);"><div class="card-value" style="color:var(--green);">${completed.length}</div><div class="card-label">Completed</div></div>
      <div class="card" style="border-top:3px solid #2563eb;"><div class="card-value" style="color:#2563eb;">${rows.length}</div><div class="card-label">Total Logged</div></div>
    `;

    document.getElementById('taskOverdueBanner').innerHTML = overdue.length ? `
      <div class="card" style="border-left:3px solid var(--red);background:var(--red-bg);margin-bottom:14px;">
        <div style="font-size:11px;font-weight:700;color:var(--red);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:10px;">● Overdue — Immediate Attention Required</div>
        ${overdue.map(a => {
          const tl = timeLeftLabel(a);
          return `<div style="display:flex;justify-content:space-between;align-items:center;background:var(--white);padding:10px 14px;margin-bottom:6px;border-radius:2px;">
            <div><b>${a.store}</b> <span style="color:var(--grey-500);">· ${a.pillar} · by ${a.owner}</span></div>
            <div style="display:flex;align-items:center;gap:8px;">
              <span class="badge red">${tl?tl.text:'OVERDUE'}</span>
              <button class="btn btn-outline actResolveBtn" data-id="${a.id}">Resolve</button>
            </div>
          </div>`;
        }).join('')}
      </div>` : '';

    document.getElementById('taskListWrap').innerHTML = rows.length ? rows
      .sort((a,b)=> (a.dueDate||'').localeCompare(b.dueDate||''))
      .map(a => {
        const tl = timeLeftLabel(a);
        const borderColor = a.status==='closed' ? 'var(--green)' : (tl && tl.overdue ? 'var(--red)' : 'var(--gold)');
        const comments = Array.isArray(a.comments) ? a.comments : [];
        return `<div class="card task-card" style="border-left:3px solid ${borderColor};margin-bottom:10px;">
          <div style="display:flex;justify-content:space-between;align-items:flex-start;">
            <div>
              <div><b>${a.store}</b> <span class="badge" style="margin-left:6px;">${a.pillar}</span> ${a.status==='closed'?'<span class="badge green">CLOSED</span>':''}</div>
              <div style="font-size:11px;color:var(--grey-500);margin-top:3px;">FSM: ${a.fsm} · by ${a.owner} · Logged ${a.createdDate||''}</div>
              <div style="background:var(--grey-100);padding:8px 10px;margin-top:8px;font-size:12px;border-left:2px solid var(--grey-300);">${a.description||''}</div>
            </div>
            <div style="text-align:right;white-space:nowrap;">
              ${tl ? `<span class="badge ${tl.overdue?'red':'amber'}">${tl.text}</span><br>` : ''}
              <span style="font-size:10px;color:var(--grey-500);">Due ${a.dueDate||'—'}</span><br>
              ${a.status!=='closed' ? `<button class="btn btn-gold btn-mini actCompleteBtn" data-id="${a.id}" style="margin-top:8px;">Complete</button>` : `<button class="btn btn-outline btn-mini actReopenBtn" data-id="${a.id}" style="margin-top:8px;">Reopen</button>`}
            </div>
          </div>
          ${a.status!=='closed' ? `
          <div style="margin-top:10px;display:flex;gap:6px;align-items:center;">
            <span style="font-size:11px;color:var(--grey-500);">Extend due date:</span>
            <input type="date" id="extendDate_${a.id}" value="${a.dueDate||''}" style="padding:3px 6px;font-size:11px;">
            <button class="btn btn-outline btn-mini actExtendBtn" data-id="${a.id}">Update</button>
          </div>` : ''}
          <div style="margin-top:10px;border-top:1px solid var(--grey-200);padding-top:8px;">
            <div style="font-size:11px;color:var(--grey-500);cursor:pointer;" data-toggle-comments="${a.id}">💬 ${comments.length} update${comments.length===1?'':'s'} — click to view / add</div>
            <div id="comments_${a.id}" style="display:none;margin-top:8px;">
              ${comments.map(c => `<div style="font-size:12px;padding:6px 0;border-bottom:1px solid var(--grey-200);"><b>${c.author}</b> <span style="color:var(--grey-500);">· ${new Date(c.at).toLocaleString('en-ZA')}</span><br>${c.text}</div>`).join('')}
              <div style="display:flex;gap:6px;margin-top:8px;">
                <input type="text" id="commentInput_${a.id}" placeholder="Add an update..." style="flex:1;">
                <button class="btn btn-outline btn-mini actCommentBtn" data-id="${a.id}">Add</button>
              </div>
            </div>
          </div>
        </div>`;
      }).join('') : '<div class="empty-state">No tasks match this filter.</div>';

    document.querySelectorAll('[data-toggle-comments]').forEach(el => el.addEventListener('click', () => {
      const box = document.getElementById('comments_' + el.dataset.toggleComments);
      box.style.display = box.style.display === 'none' ? 'block' : 'none';
    }));
    document.querySelectorAll('.actCompleteBtn, .actResolveBtn').forEach(btn => btn.addEventListener('click', async () => {
      const comment = prompt('Add a closing comment before marking this task complete:');
      if (comment === null) return; // cancelled
      if (!comment.trim()) { toast('A comment is required to close a task'); return; }
      btn.disabled = true;
      try { await apiPatch('/api/actions/' + btn.dataset.id, { status: 'closed', comment: comment.trim() }); await refreshState(); render(); }
      catch(e) { toast(e.message || 'Could not update — check connection and try again'); btn.disabled = false; }
    }));
    document.querySelectorAll('.actReopenBtn').forEach(btn => btn.addEventListener('click', async () => {
      const comment = prompt('Add a comment explaining why this task is being reopened:');
      if (comment === null) return;
      if (!comment.trim()) { toast('A comment is required to reopen a task'); return; }
      btn.disabled = true;
      try { await apiPatch('/api/actions/' + btn.dataset.id, { status: 'open', comment: comment.trim() }); await refreshState(); render(); }
      catch(e) { toast(e.message || 'Could not reopen — check connection and try again'); btn.disabled = false; }
    }));
    document.querySelectorAll('.actExtendBtn').forEach(btn => btn.addEventListener('click', async () => {
      const newDate = document.getElementById('extendDate_' + btn.dataset.id).value;
      if (!newDate) { toast('Pick a new due date first'); return; }
      btn.disabled = true;
      try { await apiPatch('/api/actions/' + btn.dataset.id, { dueDate: newDate, comment: 'Due date updated to ' + newDate }); await refreshState(); render(); }
      catch(e) { toast(e.message || 'Could not update due date'); btn.disabled = false; }
    }));
    document.querySelectorAll('.actCommentBtn').forEach(btn => btn.addEventListener('click', async () => {
      const input = document.getElementById('commentInput_' + btn.dataset.id);
      const text = input.value.trim();
      if (!text) { toast('Write an update before adding it'); return; }
      btn.disabled = true;
      try { await apiPatch('/api/actions/' + btn.dataset.id, { comment: text }); await refreshState(); render();
        setTimeout(() => { const box = document.getElementById('comments_' + btn.dataset.id); if (box) box.style.display = 'block'; }, 0);
      }
      catch(e) { toast(e.message || 'Could not add update'); btn.disabled = false; }
    }));
  }

  function exportCsv(){
    const rows = filteredRows();
    const header = ['Store','FSM','Pillar','Description','Owner','Due Date','Status'];
    const csvRows = rows.map(a => [a.store,a.fsm,a.pillar,a.description,a.owner,a.dueDate,a.status].map(v => `"${String(v||'').replace(/"/g,'""')}"`).join(','));
    const csv = [header.join(','), ...csvRows].join('\n');
    const blob = new Blob([csv], { type:'text/csv' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'tasks-' + todayISO() + '.csv';
    a.click();
  }

  document.getElementById('actFsm').addEventListener('change', render);
  document.getElementById('actPillar').addEventListener('change', render);
  document.getElementById('actStatus').addEventListener('change', render);
  document.getElementById('actSearch').addEventListener('input', render);
  document.getElementById('actClear').addEventListener('click', () => {
    document.getElementById('actFsm').value=''; document.getElementById('actPillar').value='';
    document.getElementById('actStatus').value=''; document.getElementById('actSearch').value='';
    render();
  });
  document.getElementById('actRefresh').addEventListener('click', async () => { await refreshState(); render(); });
  document.getElementById('actExportCsv').addEventListener('click', exportCsv);
  document.getElementById('actExportPdf').addEventListener('click', () => window.print());

  render();
}

/* ============================================================
   VIEW: LTL AUDITS
   ============================================================ */
function viewLTL(){
  document.getElementById('app').innerHTML = `
    <div class="page-header">
      <div><div class="page-title">LTL Audit Dashboard</div><div class="page-subtitle">Looks, Tastes, Like — Brand Standards Audit</div></div>
      <div class="period-badge">AT-RISK THRESHOLD &lt;85%</div>
    </div>
    <div class="grid-2-1">
      <div class="card">
        <div class="section-title">Per-FSM Average LTL Score</div>
        <div id="ltlAvg"></div>
      </div>
      <div class="card">
        <div class="section-title">Open NCs Aged &gt; 7 Days</div>
        <div id="ltlAging"></div>
      </div>
    </div>
    <div class="section-divider"></div>
    <div class="card" id="ltlRiskCard">
      <div class="section-title">Stores At Risk — Below 85% and Overdue NC</div>
      <div id="ltlRisk"></div>
    </div>
    <div class="section-divider"></div>
    <div class="card" id="ltlUploadCard">
      <div class="section-title">Upload Audit Report</div>
      <div class="wrap-copy" style="margin-bottom:10px;">CSV with columns: fsm, store, date, score, cspi, ncRaised, ncClosed, notes. Header row required.</div>
      <input type="file" id="ltlFileInput" accept=".csv">
      <div id="ltlUploadPreview" style="margin-top:10px;"></div>
      <button class="btn btn-gold" id="ltlUploadBtn" style="margin-top:10px;" disabled>Upload Report</button>
    </div>
    <div class="section-divider"></div>
    <div class="card"><div class="section-title">Audit History</div><div id="ltlHistory"></div></div>
  `;

  let pendingRows = [];

  function parseCsv(text){
    const lines = text.split(/\r?\n/).filter(l => l.trim().length);
    if (!lines.length) return [];
    const header = lines[0].split(',').map(h => h.trim().toLowerCase());
    return lines.slice(1).map(line => {
      const cells = line.split(',').map(c => c.trim());
      const row = {};
      header.forEach((h,i) => row[h] = cells[i] !== undefined ? cells[i] : '');
      return row;
    });
  }

  document.getElementById('ltlFileInput').addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      try {
        const rows = parseCsv(reader.result);
        const valid = rows.filter(r => r.fsm && r.store && r.date && r.score !== '');
        pendingRows = valid;
        document.getElementById('ltlUploadPreview').innerHTML = valid.length
          ? `<div class="empty-state" style="padding:6px 0;color:var(--green);">${valid.length} row(s) ready to upload (of ${rows.length} in file).</div>
             <table class="data-table"><thead><tr><th>FSM</th><th>Store</th><th>Date</th><th>Score</th></tr></thead>
             <tbody>${valid.slice(0,10).map(r=>`<tr><td>${r.fsm}</td><td>${r.store}</td><td>${r.date}</td><td>${r.score}</td></tr>`).join('')}</tbody></table>
             ${valid.length>10?`<div style="font-size:11px;color:var(--grey-500);">+ ${valid.length-10} more</div>`:''}`
          : '<div class="empty-state" style="color:var(--red);">No valid rows found — check the column headers match fsm, store, date, score.</div>';
        document.getElementById('ltlUploadBtn').disabled = valid.length === 0;
      } catch(err) {
        document.getElementById('ltlUploadPreview').innerHTML = '<div class="empty-state" style="color:var(--red);">Could not read this file as CSV.</div>';
      }
    };
    reader.readAsText(file);
  });

  document.getElementById('ltlUploadBtn').addEventListener('click', async () => {
    const btn = document.getElementById('ltlUploadBtn');
    btn.disabled = true; btn.textContent = 'Uploading...';
    let ok = 0, failed = 0;
    for (const r of pendingRows) {
      try {
        await apiPost('/api/ltl', { fsm:r.fsm, store:r.store, date:r.date, score:Number(r.score), cspi:Number(r.cspi||0), ncRaised:Number(r.ncraised||r.ncRaised||0), ncClosed:Number(r.ncclosed||r.ncClosed||0), notes:r.notes||'' });
        ok++;
      } catch(e) { failed++; }
    }
    await refreshState();
    toast(`Uploaded ${ok} audit(s)${failed?`, ${failed} failed`:''}`);
    viewLTL();
  });

  function renderAll(){
    const avgByFsm = FSM_LIST.map(f => {
      const audits = STATE.ltlAudits.filter(a=>a.fsm===f);
      const avg = audits.length ? audits.reduce((s,a)=>s+Number(a.score),0)/audits.length : null;
      return { f, avg, count: audits.length };
    });
    document.getElementById('ltlAvg').innerHTML = avgByFsm.map(x => `
      <div style="display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--grey-200);font-size:12px;">
        <span>${x.f}</span>
        <span>
          <span class="rag-text ${x.avg===null?'na':(x.avg<85?'red':'green')}">${x.avg===null?'No audits':fmtPct(x.avg,0)+' ('+x.count+')'}</span>
          ${x.avg!==null && x.avg<85 ? '<span class="badge red" style="margin-left:6px;">AT RISK</span>' : ''}
        </span>
      </div>`).join('');

    const aging = STATE.ltlAudits.filter(a => Number(a.ncRaised) > Number(a.ncClosed) && daysAgo(a.date) > 7);
    document.getElementById('ltlAging').innerHTML = aging.length ? `<ul class="flag-list">${aging.map(a=>`<li><span>${a.store} (${a.fsm})</span><span class="rag-text red">${a.ncRaised-a.ncClosed} open, ${daysAgo(a.date)}d</span></li>`).join('')}</ul>` : '<div class="empty-state">No aged NCs.</div>';

    // Stores at risk: latest score < 85 AND has an aged open NC
    const latestByStore = {};
    [...STATE.ltlAudits].sort((a,b)=>a.date.localeCompare(b.date)).forEach(a => { latestByStore[a.store] = a; });
    const agingStores = new Set(aging.map(a=>a.store));
    const atRisk = Object.values(latestByStore).filter(a => Number(a.score) < 85 && agingStores.has(a.store));
    document.getElementById('ltlRisk').innerHTML = atRisk.length ? `
      <table class="data-table">
        <thead><tr><th>Store</th><th>FSM</th><th>Latest Score</th><th>Open NCs</th><th>NC Age</th></tr></thead>
        <tbody>${atRisk.map(a => {
          const agedEntry = aging.find(x=>x.store===a.store);
          return `<tr>
            <td>${a.store}</td><td>${a.fsm}</td>
            <td class="rag-text red">${fmtPct(Number(a.score),0)}</td>
            <td class="rag-text red">${agedEntry.ncRaised-agedEntry.ncClosed}</td>
            <td>${daysAgo(agedEntry.date)}d</td>
          </tr>`;
        }).join('')}</tbody>
      </table>` : '<div class="empty-state">No stores currently below 85% with an aged open NC.</div>';

    const hist = [...STATE.ltlAudits].sort((a,b)=>b.date.localeCompare(a.date));
    document.getElementById('ltlHistory').innerHTML = hist.length ? `
      <table class="data-table">
        <thead><tr><th>Date</th><th>Store</th><th>FSM</th><th>LTL</th><th>CSPI</th><th>NCs</th></tr></thead>
        <tbody>${hist.map(a => `<tr><td>${a.date}</td><td>${a.store}</td><td>${a.fsm}</td><td class="rag-text ${Number(a.score)<85?'red':'green'}">${a.score}</td><td>${a.cspi}</td><td>${a.ncClosed}/${a.ncRaised} closed</td></tr>`).join('')}</tbody>
      </table>` : '<div class="empty-state">No audits logged yet.</div>';
  }
  renderAll();
}

        <tbody>${rows.map(v => `<tr><td>${v.date}</td><td>${v.trainer}</td><td>${v.store}</td><td>${v.durationMin} min</td><td><span class="badge ${v.followUp==='done'?'green':(v.followUp==='return'?'amber':'red')}">${v.followUp.toUpperCase()}</span></td></tr>`).join('')}</tbody>

  document.getElementById('trCopy').addEventListener('click', () => {
    if (!lastWrapup) { toast('Log a visit first'); return; }
    navigator.clipboard.writeText(lastWrapup).then(()=>toast('Wrap-up copied to clipboard'));
  });
  renderHistory();
}

    const trade = tradeHealth(stores);
    const gaapRows = stores.map(s=>({s,g:gaapOf(s)})).filter(r=>r.g!==null);
    const worstTrade = gaapRows.length ? gaapRows.reduce((a,b)=>b.g<a.g?b:a) : null;
    const std = standardsScore(stores);
    const ktRows = stores.map(s=>({s,kt:keytechOf(s)})).filter(r=>r.kt!==null);
    const lowestStd = ktRows.length ? ktRows.reduce((a,b)=>b.kt<a.kt?b:a) : null;
    const bb = bbetterScore(fsm, stores);

    const weekAgo = new Date(); weekAgo.setDate(weekAgo.getDate()-7);
    const weekAgoStr = weekAgo.toISOString().slice(0,10);
    const visitsThisWeek = STATE.visits.filter(v=>v.fsm===fsm && v.date>=weekAgoStr);
    const closedThisWeek = STATE.actions.filter(a=>a.fsm===fsm && a.status==='closed' && a.closedDate>=weekAgoStr);
    const openTotal = STATE.actions.filter(a=>a.fsm===fsm && a.status!=='closed').length;

    document.getElementById('wrG').value = `Visited ${visitsThisWeek.length} store(s) this week${visitsThisWeek.length? ': '+visitsThisWeek.map(v=>v.store).join(', ')+'.' : '.'} [Add a note on team morale / culture observed.]`;
    document.getElementById('wrR').value = `[What did you read from the customer/store this week — queues, complaints, first impressions on arrival?]`;
    document.getElementById('wrI').value = `KeyTech average across my portfolio is ${fmtPct(std.pct,0)}. ${lowestStd? lowestStd.s+' is lowest at '+fmtPct(lowestStd.kt,0)+'.' : 'No KeyTech data for portfolio.'} B-Better portfolio average is ${fmtPct(bb.pct,0)}.`;
    document.getElementById('wrN').value = `This week ${trade.positive||0} of my ${trade.withData||0} stores with data are trading above prior year. ${worstTrade? worstTrade.s+' is my biggest concern — '+fmtSigned(worstTrade.g)+' YOY.' : 'No GAAP data available for a concern store.'}`;
    document.getElementById('wrD').value = `${closedThisWeek.length} action(s) closed this week, ${openTotal} remain open. [State the ONE priority you're driving next week, owner + due date.]`;
  }
  document.getElementById('wrFsm').addEventListener('change', prefill);
  document.getElementById('wrCopy').addEventListener('click', () => {
    const fsm = document.getElementById('wrFsm').value;
    const text = `${fsm.toUpperCase()} — WEEKLY REPORT (GRIND) — ${new Date().toDateString()}\n\n` +
      `G — GREET\n${document.getElementById('wrG').value}\n\n` +
      `R — READ\n${document.getElementById('wrR').value}\n\n` +
      `I — INSPECT\n${document.getElementById('wrI').value}\n\n` +
      `N — NUMBERS\n${document.getElementById('wrN').value}\n\n` +
      `D — DRIVE\n${document.getElementById('wrD').value}`;
    navigator.clipboard.writeText(text).then(()=>toast('Weekly report copied'));
  });
  prefill();
}

function viewOpsTasks(){
  document.getElementById('app').innerHTML = `
    <div class="page-header">
      <div><div class="page-title">Add Task</div><div class="page-subtitle">Report and track operational issues by café</div></div>
    </div>
    <div class="grid-2-1">
      <div class="card">
        <div class="section-title">Report an Issue</div>
        <label class="field-label">Department</label>
        <select id="otDept">${OPS_DEPARTMENTS.map(d=>`<option>${d}</option>`).join('')}</select>
        <label class="field-label">Café / Store</label>
        <select id="otCafe">${ALL_STORES.map(s=>`<option>${s.store}</option>`).join('')}</select>
        <label class="field-label">Reported By</label>
        <select id="otName">
          <option value="">— use my login name —</option>
          ${FSM_LIST.map(f=>`<option>${f}</option>`).join('')}

        </select>

        <label class="field-label">Escalation Timeframe</label>

        <label class="field-label">Comments</label>
        <textarea id="otComments" placeholder="Describe the issue..."></textarea>
        <button class="btn btn-gold" id="otSubmit" style="margin-top:14px;">Submit Task</button>
      </div>
      <div class="card">
        <div class="section-title">About This Tab</div>
        <div class="wrap-copy">Anyone signed in can report an issue here — it doesn't require editor access.

Closing/completing a task does require an editor or admin account, the same as logging visits elsewhere in BOS.

Department escalation timeframe defaults follow the original Ops Task Tracker: 24hrs / 48hrs / 72hrs / 7 days / 19 days (Marketing also gets 10-day and 15-day options).</div>
      </div>
    </div>
    <div class="section-divider"></div>
    <div class="card">
      <div class="filter-row">
        <select id="otFilterDept"><option value="">All Departments</option>${OPS_DEPARTMENTS.map(d=>`<option>${d}</option>`).join('')}</select>
        <select id="otFilterStatus"><option value="">Active + Overdue</option><option value="done">Completed</option><option value="all">All</option></select>
      </div>
      <div id="otSummary" class="grid-3" style="margin:14px 0;"></div>
      <div id="otTableWrap"></div>
    </div>
  `;

  // Marketing gets the extra 10/15-day options
  document.getElementById('otDept').addEventListener('change', () => {
    const dept = document.getElementById('otDept').value;
    const tfSel = document.getElementById('otTimeframe');
    const opts = OPS_TIMEFRAMES.filter(t => !t.marketingOnly || dept === 'Marketing');
    tfSel.innerHTML = opts.map(t=>`<option value="${t.hours}">${t.label}</option>`).join('');
  });
  document.getElementById('otName').addEventListener('change', () => {
    document.getElementById('otNameOther').style.display = document.getElementById('otName').value === '__other__' ? 'block' : 'none';
  });

  let OT_TASKS = [];

  async function loadTasks(){
    try {
      OT_TASKS = await apiGet('/api/ops-tasks');
      render();
    } catch(e) {
      if (e.message !== 'unauthorized') document.getElementById('otTableWrap').innerHTML = '<div class="empty-state">Could not load tasks.</div>';
    }
  }

  function isOverdue(t){
    if (t.completed) return false;
    const due = new Date(t.createdAt).getTime() + t.escalationHours * 3600000;
    return Date.now() > due;
  }
  function timeLeft(t){
    const due = new Date(t.createdAt).getTime() + t.escalationHours * 3600000;
    const hrs = Math.round((due - Date.now()) / 3600000);
    return hrs < 0 ? 'Overdue' : hrs + 'h left';
  }

  function render(){
    const deptF = document.getElementById('otFilterDept').value;
    const statusF = document.getElementById('otFilterStatus').value;
    let rows = OT_TASKS.filter(t => !deptF || t.department === deptF);
    if (statusF === 'done') rows = rows.filter(t => t.completed);
    else if (statusF === 'all') { /* no filter */ }
    else rows = rows.filter(t => !t.completed);

    const total = OT_TASKS.length, open = OT_TASKS.filter(t=>!t.completed).length, overdue = OT_TASKS.filter(isOverdue).length;
    document.getElementById('otSummary').innerHTML = `
      <div class="card"><div class="card-label">Total Tasks</div><div class="card-value">${total}</div></div>
      <div class="card"><div class="card-label">Open</div><div class="card-value">${open}</div></div>
      <div class="card"><div class="card-label">Overdue</div><div class="card-value" style="color:var(--red)">${overdue}</div></div>
    `;

    rows.sort((a,b) => new Date(b.createdAt) - new Date(a.createdAt));
    document.getElementById('otTableWrap').innerHTML = rows.length ? `
      <table class="data-table">
        <thead><tr><th>Café</th><th>Department</th><th>Reported By</th><th>Status</th><th>Comments</th><th></th></tr></thead>
        <tbody>${rows.map(t => {
          const color = OPS_DEPT_COLORS[t.department] || '#6B7280';
          const status = t.completed ? `<span class="badge green">DONE${t.completedBy ? ' · '+t.completedBy : ''}</span>` : (isOverdue(t) ? '<span class="badge red">OVERDUE</span>' : `<span class="badge amber">${timeLeft(t)}</span>`);
          return `<tr>
            <td>${t.cafe}</td>
            <td><span style="color:${color};font-weight:600;">${t.department}</span></td>
            <td>${t.submitterName}</td>
            <td>${status}</td>
            <td style="max-width:280px;">${t.comments || ''}</td>
            <td>${(!t.completed && isEditor()) ? `<button class="btn btn-outline otCompleteBtn" data-id="${t.id}">Complete</button>` : ''}</td>
          </tr>`;
        }).join('')}</tbody>
      </table>` : '<div class="empty-state">No tasks match this filter.</div>';

    document.querySelectorAll('.otCompleteBtn').forEach(btn => btn.addEventListener('click', async () => {
      btn.disabled = true;
      try { await apiPatch('/api/ops-tasks/' + btn.dataset.id + '/complete', {}); await loadTasks(); }
      catch(e) { toast(e.message || 'Could not complete task'); btn.disabled = false; }
    }));
  }

  document.getElementById('otFilterDept').addEventListener('change', render);
  document.getElementById('otFilterStatus').addEventListener('change', render);
  document.getElementById('otSubmit').addEventListener('click', async () => {
    const dept = document.getElementById('otDept').value;
    const tf = OPS_TIMEFRAMES.find(t => String(t.hours) === document.getElementById('otTimeframe').value) || OPS_TIMEFRAMES[0];
    const nameSel = document.getElementById('otName').value;
    const submitterName = nameSel === '__other__' ? document.getElementById('otNameOther').value.trim() : nameSel;
    const body = {
      department: dept,
      cafe: document.getElementById('otCafe').value,
      escalationLabel: tf.label,
      escalationHours: tf.hours,
      comments: document.getElementById('otComments').value,
      submitterName,
    };
    try {
      await apiPost('/api/ops-tasks', body);
      document.getElementById('otComments').value = '';
      toast('Task submitted');
      await loadTasks();
    } catch(e) { toast(e.message || 'Could not submit task'); }
  });

  loadTasks();
}

  document.getElementById('app').innerHTML = `
