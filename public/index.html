            <div style="font-size:10.5px;color:var(--grey-500);cursor:pointer;" data-toggle-editlog="${editId}">🕓 ${editLog.length} edit${editLog.length===1?'':'s'} — click to view history</div>
            <div id="editlog_${editId}" style="display:none;margin-top:6px;">
              ${editLog.slice().reverse().map(e => `<div style="font-size:11px;padding:4px 0;border-bottom:1px solid var(--grey-200);"><b>${e.editedBy}</b> <span style="color:var(--grey-500);">· ${new Date(e.editedAt).toLocaleString('en-ZA')}</span><br>Changed <b>${e.field}</b>: "${e.oldValue ?? '—'}" → "${e.newValue ?? '—'}"</div>`).join('')}
            </div>
          </div>` : ''}
        </div>`;
      }).join('') : `<div class="empty-state">${subTab==='completed' ? 'No completed tasks match this filter.' : subTab==='nonconformance' ? 'No non-conformances match this filter.' : 'No open tasks match this filter.'}</div>`;

    document.querySelectorAll('[data-toggle-editlog]').forEach(el => el.addEventListener('click', () => {
      const box = document.getElementById('editlog_' + el.dataset.toggleEditlog);
      box.style.display = box.style.display === 'none' ? 'block' : 'none';
    }));
    document.querySelectorAll('.actEditToggleBtn').forEach(btn => btn.addEventListener('click', () => {
      const form = document.getElementById('editForm_' + btn.dataset.id);
      form.style.display = form.style.display === 'none' ? 'block' : 'none';
    }));
    document.querySelectorAll('[id^="editPhoto_"]').forEach(input => input.addEventListener('change', async (e) => {
      const id = input.id.replace('editPhoto_', '');
      const files = Array.from(e.target.files || []);
      if (!files.length) return;
      const grid = document.getElementById('editPhotoGrid_' + id);
      const initial = JSON.parse(grid.dataset.initial || '[]');
      currentEditPhotos(id, initial);
      const MAX = 6;
      const room = Math.max(0, MAX - editPhotoPending[id].length);
      if (files.length > room) toast(`Up to ${MAX} photos per task`);
      for (const file of files.slice(0, room)) {
        try { editPhotoPending[id].push(await resizeImageFileForEdit(file, 1280, 0.7)); }
        catch (err) { toast('Could not read one of those photos'); }
      }
      renderEditPhotoGrid(id);
      e.target.value = '';
    }));
    document.querySelectorAll('.editPhotoRemoveBtn').forEach(btn => btn.addEventListener('click', () => {
      const id = btn.dataset.id;
      const grid = document.getElementById('editPhotoGrid_' + id);
      const initial = JSON.parse(grid.dataset.initial || '[]');
      currentEditPhotos(id, initial);
      editPhotoPending[id].splice(parseInt(btn.dataset.idx, 10), 1);
      renderEditPhotoGrid(id);
    }));
    document.querySelectorAll('.actSaveEditBtn').forEach(btn => btn.addEventListener('click', async () => {
      const id = btn.dataset.id;
      btn.disabled = true;
      try {
        if (btn.dataset.ops === '1') {
          const body = {
            department: document.getElementById('editDept_' + id).value,
            cafe: document.getElementById('editCafe_' + id).value,
            responsiblePerson: document.getElementById('editResp_' + id).value || null,
            submitterName: document.getElementById('editSubmitter_' + id).value,
            comments: document.getElementById('editComments_' + id).value,
          };
          if (Object.prototype.hasOwnProperty.call(editPhotoPending, id)) {
            body.photoUrls = editPhotoPending[id];
          }
          await apiPatch('/api/ops-tasks/' + id, body);
          delete editPhotoPending[id];
          await loadOpsTasksForTracker();
        } else {
          await apiPatch('/api/actions/' + id, {
            store: document.getElementById('editStore_' + id).value,
            fsm: document.getElementById('editFsm_' + id).value,
            pillar: document.getElementById('editPillar_' + id).value,
            owner: document.getElementById('editOwner_' + id).value,
            description: document.getElementById('editDescription_' + id).value,
          });
          await refreshState();
        }
        toast('Task updated');
        render();
      } catch(e) { toast(e.message || 'Could not save changes'); btn.disabled = false; }
    }));

    document.querySelectorAll('.actOpsPhotoThumb').forEach(img => img.addEventListener('click', () => {
      const overlay = document.createElement('div');
      overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:9999;display:flex;align-items:center;justify-content:center;cursor:zoom-out;';
      overlay.innerHTML = `<img src="${img.dataset.src}" style="max-width:92vw;max-height:92vh;border-radius:6px;">`;
      overlay.addEventListener('click', () => overlay.remove());
      document.body.appendChild(overlay);
    }));
    document.querySelectorAll('.actOpsCompleteBtn').forEach(btn => btn.addEventListener('click', async () => {
      const comment = prompt('Add a comment about how this was resolved (optional):');
      if (comment === null) return; // cancelled
      btn.disabled = true;
      try { await apiPatch('/api/ops-tasks/' + btn.dataset.id + '/complete', { comment: comment.trim() || undefined }); await loadOpsTasksForTracker(); render(); }
      catch(e) { toast(e.message || 'Could not complete task'); btn.disabled = false; }
    }));

    document.querySelectorAll('[data-toggle-comments]').forEach(el => el.addEventListener('click', () => {
      const box = document.getElementById('comments_' + el.dataset.toggleComments);
      box.style.display = box.style.display === 'none' ? 'block' : 'none';
    }));
    document.querySelectorAll('.actCompleteBtn, .actResolveBtn').forEach(btn => btn.addEventListener('click', async () => {
      const comment = prompt('Add a closing comment before marking this task complete:');
      if (comment === null) return; // cancelled
      if (!comment.trim()) { toast('A comment is required to close a task'); return; }
      btn.disabled = true;
      try { await apiPatch('/api/actions/' + btn.dataset.id, { status: 'closed', comment: comment.trim() }); await refreshState(); render(); }
      catch(e) { toast(e.message || 'Could not update — check connection and try again'); btn.disabled = false; }
    }));
    document.querySelectorAll('.actReopenBtn').forEach(btn => btn.addEventListener('click', async () => {
      const comment = prompt('Add a comment explaining why this task is being reopened:');
      if (comment === null) return;
      if (!comment.trim()) { toast('A comment is required to reopen a task'); return; }
      btn.disabled = true;
      try { await apiPatch('/api/actions/' + btn.dataset.id, { status: 'open', comment: comment.trim() }); await refreshState(); render(); }
      catch(e) { toast(e.message || 'Could not reopen — check connection and try again'); btn.disabled = false; }
    }));
    document.querySelectorAll('.actExtendBtn').forEach(btn => btn.addEventListener('click', async () => {
      const newDate = document.getElementById('extendDate_' + btn.dataset.id).value;
      if (!newDate) { toast('Pick a new due date first'); return; }
      btn.disabled = true;
      try {
        if (btn.dataset.ops === '1') {
          await apiPatch('/api/ops-tasks/' + btn.dataset.id, { dueDateOverride: newDate, note: 'Due date updated to ' + newDate });
          await loadOpsTasksForTracker();
        } else {
          await apiPatch('/api/actions/' + btn.dataset.id, { dueDate: newDate, comment: 'Due date updated to ' + newDate });
          await refreshState();
        }
        render();
      }
      catch(e) { toast(e.message || 'Could not update due date'); btn.disabled = false; }
    }));
    document.querySelectorAll('.actCommentBtn').forEach(btn => btn.addEventListener('click', async () => {
      const input = document.getElementById('commentInput_' + btn.dataset.id);
      const text = input.value.trim();
      if (!text) { toast('Write an update before adding it'); return; }
      btn.disabled = true;
      try {
        if (btn.dataset.ops === '1') {
          await apiPatch('/api/ops-tasks/' + btn.dataset.id, { note: text });
          await loadOpsTasksForTracker();
        } else {
          await apiPatch('/api/actions/' + btn.dataset.id, { comment: text });
          await refreshState();
        }
        render();
        setTimeout(() => { const box = document.getElementById('comments_' + btn.dataset.id); if (box) box.style.display = 'block'; }, 0);
      }
      catch(e) { toast(e.message || 'Could not add update'); btn.disabled = false; }
    }));
  }

  function exportCsv(){
    const rows = filteredRows();
    const header = ['Store','FSM','Pillar','Description','Owner','Due Date','Status'];
    const csvRows = rows.map(a => [a.store,a.fsm,a.pillar,a.description,a.owner,a.dueDate,a.status].map(v => `"${String(v||'').replace(/"/g,'""')}"`).join(','));
    const csv = [header.join(','), ...csvRows].join('\n');
    const blob = new Blob([csv], { type:'text/csv' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = (subTab==='completed' ? 'completed-tasks-' : 'open-tasks-') + todayISO() + '.csv';
    a.click();
  }

  document.getElementById('actFsm').addEventListener('change', render);
  document.getElementById('actPillar').addEventListener('change', render);
  document.getElementById('actStatus').addEventListener('change', render);
  document.getElementById('actSearch').addEventListener('input', render);
  document.querySelectorAll('#taskSubTab .segmented-btn').forEach(btn => btn.addEventListener('click', () => {
    subTab = btn.dataset.sub;
    document.querySelectorAll('#taskSubTab .segmented-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    render();
  }));
  document.getElementById('actClear').addEventListener('click', () => {
    document.getElementById('actFsm').value=''; document.getElementById('actPillar').value='';
    document.getElementById('actStatus').value=''; document.getElementById('actSearch').value='';
    render();
  });
  document.getElementById('actRefresh').addEventListener('click', async () => { await refreshState(); await loadOpsTasksForTracker(); render(); });
  document.getElementById('actExportCsv').addEventListener('click', exportCsv);
  document.getElementById('actExportPdf').addEventListener('click', () => window.print());

  render();
  loadOpsTasksForTracker().then(render);
}

/* ============================================================
   VIEW: LTL AUDITS
   ============================================================ */
function viewLTL(){
  document.getElementById('app').innerHTML = `
    <div class="page-header">
      <div><div class="page-title">LTL Audit Dashboard</div><div class="page-subtitle">Looks, Tastes, Like — Brand Standards Audit</div></div>
      <div class="period-badge">AT-RISK THRESHOLD &lt;85%</div>
    </div>
    <div class="grid-2-1">
      <div class="card">
        <div class="section-title">Per-FSM Average LTL Score</div>
        <div id="ltlAvg"></div>
      </div>
      <div class="card">
        <div class="section-title">Open NCs Aged &gt; 7 Days</div>
        <div id="ltlAging"></div>
      </div>
    </div>
    <div class="section-divider"></div>
    <div class="card" id="ltlRiskCard">
      <div class="section-title">Stores At Risk — Below 85% and Overdue NC</div>
      <div id="ltlRisk"></div>
    </div>
    <div class="section-divider"></div>
    <div class="card" id="ltlUploadCard">
      <div class="section-title">Upload Audit Report</div>
      <div class="wrap-copy" style="margin-bottom:10px;">CSV with columns: fsm, store, date, score, cspi, ncRaised, ncClosed, notes. Header row required.</div>
      <input type="file" id="ltlFileInput" accept=".csv">
      <div id="ltlUploadPreview" style="margin-top:10px;"></div>
      <button class="btn btn-gold" id="ltlUploadBtn" style="margin-top:10px;" disabled>Upload Report</button>
    </div>
    <div class="section-divider"></div>
    <div class="card"><div class="section-title">Audit History</div><div id="ltlHistory"></div></div>
  `;

  let pendingRows = [];

  function parseCsv(text){
    const lines = text.split(/\r?\n/).filter(l => l.trim().length);
    if (!lines.length) return [];
    const header = lines[0].split(',').map(h => h.trim().toLowerCase());
    return lines.slice(1).map(line => {
      const cells = line.split(',').map(c => c.trim());
      const row = {};
      header.forEach((h,i) => row[h] = cells[i] !== undefined ? cells[i] : '');
      return row;
    });
  }

  document.getElementById('ltlFileInput').addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      try {
        const rows = parseCsv(reader.result);
        const valid = rows.filter(r => r.fsm && r.store && r.date && r.score !== '');
        pendingRows = valid;
        document.getElementById('ltlUploadPreview').innerHTML = valid.length
          ? `<div class="empty-state" style="padding:6px 0;color:var(--green);">${valid.length} row(s) ready to upload (of ${rows.length} in file).</div>
             <table class="data-table"><thead><tr><th>FSM</th><th>Store</th><th>Date</th><th>Score</th></tr></thead>
             <tbody>${valid.slice(0,10).map(r=>`<tr><td>${r.fsm}</td><td>${r.store}</td><td>${r.date}</td><td>${r.score}</td></tr>`).join('')}</tbody></table>
             ${valid.length>10?`<div style="font-size:11px;color:var(--grey-500);">+ ${valid.length-10} more</div>`:''}`
          : '<div class="empty-state" style="color:var(--red);">No valid rows found — check the column headers match fsm, store, date, score.</div>';
        document.getElementById('ltlUploadBtn').disabled = valid.length === 0;
      } catch(err) {
        document.getElementById('ltlUploadPreview').innerHTML = '<div class="empty-state" style="color:var(--red);">Could not read this file as CSV.</div>';
      }
    };
    reader.readAsText(file);
  });

  document.getElementById('ltlUploadBtn').addEventListener('click', async () => {
    const btn = document.getElementById('ltlUploadBtn');
    btn.disabled = true; btn.textContent = 'Uploading...';
    let ok = 0, failed = 0;
    for (const r of pendingRows) {
      try {
        await apiPost('/api/ltl', { fsm:r.fsm, store:r.store, date:r.date, score:Number(r.score), cspi:Number(r.cspi||0), ncRaised:Number(r.ncraised||r.ncRaised||0), ncClosed:Number(r.ncclosed||r.ncClosed||0), notes:r.notes||'' });
        ok++;
      } catch(e) { failed++; }
    }
    await refreshState();
    toast(`Uploaded ${ok} audit(s)${failed?`, ${failed} failed`:''}`);
    viewLTL();
  });

  function renderAll(){
    const avgByFsm = FSM_LIST.map(f => {
      const audits = STATE.ltlAudits.filter(a=>a.fsm===f);
      const avg = audits.length ? audits.reduce((s,a)=>s+Number(a.score),0)/audits.length : null;
      return { f, avg, count: audits.length };
    });
    document.getElementById('ltlAvg').innerHTML = avgByFsm.map(x => `
      <div style="display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--grey-200);font-size:12px;">
        <span>${x.f}</span>
        <span>
          <span class="rag-text ${x.avg===null?'na':(x.avg<85?'red':'green')}">${x.avg===null?'No audits':fmtPct(x.avg,0)+' ('+x.count+')'}</span>
          ${x.avg!==null && x.avg<85 ? '<span class="badge red" style="margin-left:6px;">AT RISK</span>' : ''}
        </span>
      </div>`).join('');

    const aging = STATE.ltlAudits.filter(a => Number(a.ncRaised) > Number(a.ncClosed) && daysAgo(a.date) > 7);
    document.getElementById('ltlAging').innerHTML = aging.length ? `<ul class="flag-list">${aging.map(a=>`<li><span>${a.store} (${a.fsm})</span><span class="rag-text red">${a.ncRaised-a.ncClosed} open, ${daysAgo(a.date)}d</span></li>`).join('')}</ul>` : '<div class="empty-state">No aged NCs.</div>';

    // Stores at risk: latest score < 85 AND has an aged open NC
    const latestByStore = {};
    [...STATE.ltlAudits].sort((a,b)=>a.date.localeCompare(b.date)).forEach(a => { latestByStore[a.store] = a; });
    const agingStores = new Set(aging.map(a=>a.store));
    const atRisk = Object.values(latestByStore).filter(a => Number(a.score) < 85 && agingStores.has(a.store));
    document.getElementById('ltlRisk').innerHTML = atRisk.length ? `
      <table class="data-table">
        <thead><tr><th>Store</th><th>FSM</th><th>Latest Score</th><th>Open NCs</th><th>NC Age</th></tr></thead>
        <tbody>${atRisk.map(a => {
          const agedEntry = aging.find(x=>x.store===a.store);
          return `<tr>
            <td>${a.store}</td><td>${a.fsm}</td>
            <td class="rag-text red">${fmtPct(Number(a.score),0)}</td>
            <td class="rag-text red">${agedEntry.ncRaised-agedEntry.ncClosed}</td>
            <td>${daysAgo(agedEntry.date)}d</td>
          </tr>`;
        }).join('')}</tbody>
      </table>` : '<div class="empty-state">No stores currently below 85% with an aged open NC.</div>';

    const hist = [...STATE.ltlAudits].sort((a,b)=>b.date.localeCompare(a.date));
    document.getElementById('ltlHistory').innerHTML = hist.length ? `
      <table class="data-table">
        <thead><tr><th>Date</th><th>Store</th><th>FSM</th><th>LTL</th><th>CSPI</th><th>NCs</th></tr></thead>
        <tbody>${hist.map(a => `<tr><td>${a.date}</td><td>${a.store}</td><td>${a.fsm}</td><td class="rag-text ${Number(a.score)<85?'red':'green'}">${a.score}</td><td>${a.cspi}</td><td>${a.ncClosed}/${a.ncRaised} closed</td></tr>`).join('')}</tbody>
      </table>` : '<div class="empty-state">No audits logged yet.</div>';
  }
  renderAll();
}

    const fsm = document.getElementById('wrFsm').value;
    const stores = fsmStoresList(fsm);
    const trade = tradeHealth(stores);
    const gaapRows = stores.map(s=>({s,g:gaapOf(s)})).filter(r=>r.g!==null);
    const worstTrade = gaapRows.length ? gaapRows.reduce((a,b)=>b.g<a.g?b:a) : null;
    const std = standardsScore(stores);
    const ktRows = stores.map(s=>({s,kt:keytechOf(s)})).filter(r=>r.kt!==null);
    const lowestStd = ktRows.length ? ktRows.reduce((a,b)=>b.kt<a.kt?b:a) : null;
    const bb = bbetterScore(fsm, stores);

    const weekAgo = new Date(); weekAgo.setDate(weekAgo.getDate()-7);
    const weekAgoStr = weekAgo.toISOString().slice(0,10);
    const visitsThisWeek = STATE.visits.filter(v=>v.fsm===fsm && v.date>=weekAgoStr);
    const closedThisWeek = STATE.actions.filter(a=>a.fsm===fsm && a.status==='closed' && a.closedDate>=weekAgoStr);
    const openTotal = STATE.actions.filter(a=>a.fsm===fsm && a.status!=='closed').length;

    document.getElementById('wrG').value = `Visited ${visitsThisWeek.length} store(s) this week${visitsThisWeek.length? ': '+visitsThisWeek.map(v=>v.store).join(', ')+'.' : '.'} [Add a note on team morale / culture observed.]`;
    document.getElementById('wrR').value = `[What did you read from the customer/store this week — queues, complaints, first impressions on arrival?]`;
    document.getElementById('wrI').value = `KeyTech average across my portfolio is ${fmtPct(std.pct,0)}. ${lowestStd? lowestStd.s+' is lowest at '+fmtPct(lowestStd.kt,0)+'.' : 'No KeyTech data for portfolio.'} B-Better portfolio average is ${fmtPct(bb.pct,0)}.`;
    document.getElementById('wrN').value = `This week ${trade.positive||0} of my ${trade.withData||0} stores with data are trading above prior year. ${worstTrade? worstTrade.s+' is my biggest concern — '+fmtSigned(worstTrade.g)+' YOY.' : 'No GAAP data available for a concern store.'}`;
    document.getElementById('wrD').value = `${closedThisWeek.length} action(s) closed this week, ${openTotal} remain open. [State the ONE priority you're driving next week, owner + due date.]`;
  }
  document.getElementById('wrFsm').addEventListener('change', prefill);
  document.getElementById('wrCopy').addEventListener('click', () => {
    const fsm = document.getElementById('wrFsm').value;
    const text = `${fsm.toUpperCase()} — WEEKLY REPORT (GRIND) — ${new Date().toDateString()}\n\n` +
      `G — GREET\n${document.getElementById('wrG').value}\n\n` +
      `R — READ\n${document.getElementById('wrR').value}\n\n` +
      `I — INSPECT\n${document.getElementById('wrI').value}\n\n` +
      `N — NUMBERS\n${document.getElementById('wrN').value}\n\n` +
      `D — DRIVE\n${document.getElementById('wrD').value}`;
    navigator.clipboard.writeText(text).then(()=>toast('Weekly report copied'));
  });
  prefill();
}

/* ============================================================
   VIEW: ADMIN (user management — admin role only)
   ============================================================ */
function viewAdmin(){
  document.getElementById('app').innerHTML = `
    <div class="page-header">
      <div><div class="page-title">Admin — User Management</div><div class="page-subtitle">Create logins and set editor / viewer access</div></div>
    </div>
    <div class="grid-2-1">
      <div class="card">
        <div class="section-title">Add User</div>
        <label class="field-label">Username</label><input type="text" id="admUsername" autocomplete="off">
        <label class="field-label">Display Name</label><input type="text" id="admDisplayName" autocomplete="off">
        <label class="field-label">Temporary Password</label><input type="text" id="admPassword" autocomplete="off" placeholder="min. 8 characters">
        <label class="field-label">Role</label>
        <select id="admRole">
          <option value="viewer">Viewer — read-only mirror access</option>
          <option value="editor">Editor — can log visits / close actions</option>
          <option value="admin">Admin — editor + user management</option>
        </select>
        <button class="btn btn-gold" id="admCreate" style="margin-top:14px;">Create User</button>
      </div>
      <div class="card">
        <div class="section-title">About Roles</div>
        <div class="wrap-copy">Admin — full access, plus this screen.
Editor — can log visits, close actions, log LTL audits and trainer visits.
Viewer — the "mirror" dashboard: sees everything live, cannot change anything.

Share the app URL with everyone. Each person signs in with their own username/password and sees the version of the dashboard that matches their role.</div>
      </div>
    </div>
    <div class="section-divider"></div>
    <div class="card">
      <div class="section-title">Existing Users</div>
      <div id="admUserTable"></div>
    </div>
  `;
  async function loadUsers(){
    try {
      const users = await apiGet('/api/admin/users');
      document.getElementById('admUserTable').innerHTML = `
        <table class="data-table">
          <thead><tr><th>Username</th><th>Display Name</th><th>Role</th><th>Status</th><th></th></tr></thead>
          <tbody>${users.map(u => `
            <tr>
              <td>${u.username}</td>
              <td>${u.display_name || ''}</td>
              <td>
                <select class="admRoleSel" data-id="${u.id}" ${u.username===USERNAME?'disabled':''}>
                  <option value="viewer" ${u.role==='viewer'?'selected':''}>Viewer</option>
                  <option value="editor" ${u.role==='editor'?'selected':''}>Editor</option>
                  <option value="admin" ${u.role==='admin'?'selected':''}>Admin</option>
                </select>
              </td>
              <td>${u.active ? '<span class="badge green">ACTIVE</span>' : '<span class="badge red">DISABLED</span>'}</td>
              <td><button class="btn btn-outline admToggleBtn" data-id="${u.id}" data-active="${u.active}" ${u.username===USERNAME?'disabled':''}>${u.active?'Disable':'Enable'}</button></td>
            </tr>
          `).join('')}</tbody>
        </table>`;
      document.querySelectorAll('.admRoleSel').forEach(sel => sel.addEventListener('change', async () => {
        try { await apiFetchAdmin(sel.dataset.id, { role: sel.value }); toast('Role updated'); loadUsers(); }
        catch(e){ toast(e.message || 'Could not update role'); loadUsers(); }
      }));
      document.querySelectorAll('.admToggleBtn').forEach(btn => btn.addEventListener('click', async () => {
        const nowActive = btn.dataset.active === 'true';
        try { await apiFetchAdmin(btn.dataset.id, { active: !nowActive }); toast(nowActive?'User disabled':'User enabled'); loadUsers(); }
        catch(e){ toast(e.message || 'Could not update user'); }
      }));
    } catch(e) {
      if (e.message !== 'unauthorized') document.getElementById('admUserTable').innerHTML = '<div class="empty-state">Could not load users.</div>';
    }
  }
  async function apiFetchAdmin(id, body){
    const res = await fetch('/api/admin/users/' + id, { method:'PATCH', headers: Object.assign({'Content-Type':'application/json'}, authHeaders()), body: JSON.stringify(body) });
    if (!res.ok) { const e = await res.json().catch(()=>({})); throw new Error(e.error); }
    return res.json();
  }
  document.getElementById('admCreate').addEventListener('click', async () => {
    const username = document.getElementById('admUsername').value.trim();
    const displayName = document.getElementById('admDisplayName').value.trim();
    const password = document.getElementById('admPassword').value;
    const role = document.getElementById('admRole').value;
    if (!username || !password) { toast('Username and password are required'); return; }
    try {
      const res = await fetch('/api/admin/users', { method:'POST', headers: Object.assign({'Content-Type':'application/json'}, authHeaders()), body: JSON.stringify({ username, password, role, displayName }) });
      const data = await res.json();
      if (!res.ok) { toast(data.error || 'Could not create user'); return; }
      toast('User created — share the username/password with them');
      document.getElementById('admUsername').value = '';
      document.getElementById('admDisplayName').value = '';
      document.getElementById('admPassword').value = '';
      loadUsers();
    } catch(e) { toast('Could not reach server'); }
  });
  loadUsers();
}

/* ============================================================
   VIEW: VISIT REPORTS — every submitted GRIND café support summary
   ============================================================ */
function viewVisitReports(){
  document.getElementById('app').innerHTML = `
    <div class="page-header">
      <div><div class="page-title">Visit Reports</div><div class="page-subtitle">Every submitted GRIND café support summary, with linked tasks and PDF download</div></div>
    </div>
    <div class="filter-row no-print">
      <input type="text" id="vrSearch" placeholder="Search store or FSM...">
      <select id="vrTypeFilter"><option value="">All Types</option><option value="Support Visit">Support Visit</option><option value="Trainer Visit">Trainer Visit</option></select>
    </div>
    <div id="vrTableWrap"></div>
    <div id="vrPrintArea" style="display:none;"></div>
  `;

  function render(){
    const search = document.getElementById('vrSearch').value.toLowerCase();
    const typeFilter = document.getElementById('vrTypeFilter').value;
    const rows = [...STATE.visits]
      .filter(v => (!typeFilter || v.type === typeFilter) && (!search || v.store.toLowerCase().includes(search) || v.fsm.toLowerCase().includes(search)))
      .sort((a,b) => b.date.localeCompare(a.date));

    document.getElementById('vrTableWrap').innerHTML = rows.length ? `
      <table class="data-table">
        <thead><tr><th>Date</th><th>Store</th><th>FSM</th><th>Type</th><th>Flagged</th><th>Tasks</th><th></th></tr></thead>
        <tbody>${rows.map(v => {
          const fr = v.fullReport;
          const flagCount = fr && fr.nextSteps ? Object.keys(fr.nextSteps).filter(k => fr.nextSteps[k] && fr.nextSteps[k].action).length : null;
          const linkedActions = STATE.actions.filter(a => a.visitId === v.id);
          const open = linkedActions.filter(a => a.status !== 'closed').length;
          return `<tr>
            <td>${v.date}</td><td>${v.store}</td><td>${v.fsm}</td><td>${v.type}</td>
            <td>${flagCount===null ? '—' : flagCount}</td>
            <td>${linkedActions.length}${open ? ` <span class="badge amber">${open} open</span>` : ''}</td>
            <td style="white-space:nowrap;">
              <button class="btn btn-outline vrViewBtn" data-id="${v.id}">View / PDF</button>
              ${isEditor() && fr ? `<button class="btn btn-outline vrEditBtn" data-id="${v.id}" style="margin-left:4px;">Edit</button>` : ''}
              ${isAdmin() ? `<button class="btn btn-outline vrDeleteBtn" data-id="${v.id}" style="color:var(--red);border-color:var(--red);margin-left:4px;">Delete</button>` : ''}
            </td>
          </tr>`;
        }).join('')}</tbody>
      </table>` : '<div class="empty-state">No visit reports match this filter.</div>';

    document.querySelectorAll('.vrViewBtn').forEach(btn => btn.addEventListener('click', () => openVisitReport(btn.dataset.id, rows)));
    document.querySelectorAll('.vrEditBtn').forEach(btn => btn.addEventListener('click', () => {
      window.location.href = '/log-support-visit.html?editVisitId=' + encodeURIComponent(btn.dataset.id);
    }));
    document.querySelectorAll('.vrDeleteBtn').forEach(btn => btn.addEventListener('click', () => deleteVisitReport(btn.dataset.id)));
  }

  async function deleteVisitReport(id){
    const v = STATE.visits.find(r => r.id === id);
    if (!v) return;
    if (!confirm(`Delete the ${v.type} report for ${v.store} on ${v.date}?\n\nThis removes the report and its photos permanently. Any tasks it already created in the Task Tracker will NOT be deleted — remove those separately if needed.`)) return;
    try {
      await apiDelete('/api/visits/' + id);
      STATE.visits = STATE.visits.filter(r => r.id !== id);
      toast('Visit report deleted');
      render();
    } catch (e) {
      toast(e.message || 'Could not delete visit report');
    }
  }

  function escapeHtmlVR(s){ return (s==null?'':String(s)).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

  // Mirrors the data model in log-support-visit.html (GRIND_RESET / ADMIN /
  // QC_TASTING_CATS — Service/Coffee/Quality sections were folded into a
  // single GRIND Reset section, and customItems/portion are now flat lists
  // rather than per-section objects) so stored IDs can be turned back into
  // readable labels for the report.
  const VR_GRIND_RESET = [
    { id: 'gr-vibe', text: 'Vibe & feel — flow, control, temp, music on, lighting, customer faces' },
    { id: 'gr-devices', text: 'Devices — MrD & UE tablets on/working, Flow device live to recipe, BBM screens accurate' },
    { id: 'gr-mgmt', text: 'Management presence & control' },
    { id: 'gr-staffing', text: 'Staffing — adequately staffed; mgmt/supervisor on shift & uniformed' },
    { id: 'gr-retail', text: 'Retail & displays — tags, pricing recon, range, appeal, tidiness vs. planogram, incl. cake & pasteis' },
    { id: 'gr-flojet', text: 'Flojet test — works, team can operate, emergency water available (pre-communicate, trade-dependent)' },
    { id: 'gr-plants', text: 'Plants & plant boxes — condition & clean (store dependent)' },
    { id: 'gr-masterfile', text: 'Google, App & Masterfile aligned & up to date — if not, log on task tracker' },
    { id: 'gr-hygiene', text: 'Overall hygiene & cleanliness' },
    { id: 'gr-checklists', text: 'Checklists for all sections and required recipe files/SOP\'s available' },
    { id: 'gr-coffeecheck', text: 'Coffee check (grinder settings and shot time/volume)' },
    { id: 'gr-ordertimes', text: 'Order times check (bar & kitchen)' },
    { id: 'gr-teamq', text: 'Team Question — I asked a question of each department' },
  ];
  const VR_ADMIN = [
    { id: 'a1', text: 'Café status update with franchisee/senior manager — Flow, turnover, B.Better, all KPIs' },
    { id: 'a2', text: 'Check servicing records' },
    { id: 'a3', text: 'Outstanding tasks / non-conformances — Tracker & LTL' },
  ];
  const VR_QC_TASTING_CATS = ['Coffee', 'New Beverages', 'New Dishes', 'Base Sauces'];

  function vrActionLabel(step) {
    if (!step || !step.action) return 'Not yet assigned';
    if (step.action === 'satisfactory') return 'Satisfactory Outcome — No Action ✓';
    if (step.action === 'retrained') return 'Retrained and Rectified ✓';
    if (step.action === 'na') return 'N/A ✓';
    if (step.action === 'tasktracker') return 'Logged on Task Tracker' + (step.owner ? ' — Owner: ' + escapeHtmlVR(step.owner) : '') + (step.dueDate ? ', Due: ' + step.dueDate : '');
    if (step.action === 'nonconformance') return 'Logged as Non-Conformance' + (step.owner ? ' — Owner: ' + escapeHtmlVR(step.owner) : '') + (step.dueDate ? ', Due: ' + step.dueDate : '');
    return 'Not yet assigned';
  }
  function vrPhotosBlock(photos) {
    if (!photos || !photos.length) return '';
    return `<div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:6px;">` +
      photos.map(src => `<img src="${src}" style="width:72px;height:72px;object-fit:cover;border:1px solid #d4d4d4;border-radius:2px;">`).join('') +
      `</div>`;
  }
  function vrItemBlock(text, id, fr) {
    const step = (fr.nextSteps||{})[id];
    if (step && step.action === 'na') return ''; // N/A items are excluded from the PDF entirely
    const comment = ((fr.comments||{})[id] || '').trim();
    const photos = (fr.photos||{})[id] || [];
    const hasAction = !!(step && step.action);
    const flagged = !!comment || hasAction;
    return `
    <div style="padding:8px 0;border-bottom:1px solid #ebebeb;">
      <div style="font-weight:700;font-size:11.5px;">${escapeHtmlVR(text)}</div>
      <div style="font-size:11px;color:${flagged ? '#8f733f' : '#aaaaaa'};border:1px solid ${flagged ? '#c8ae79' : '#ebebeb'};background:${flagged ? 'rgba(200,174,121,0.10)' : '#fafafa'};padding:5px 8px;margin-top:5px;min-height:13px;">${comment ? escapeHtmlVR(comment) : '&nbsp;'}</div>
      ${vrPhotosBlock(photos)}
      ${hasAction ? `<div style="font-size:10px;color:#1a7a44;margin-top:4px;">→ ${vrActionLabel(step)}</div>` : ''}
    </div>`;
  }
  // Portion check entries print as plain item/comment text — no boxed
  // comment styling — but still show the next-step action if one was chosen.
  function vrPortionBlock(p, id, fr) {
    const step = (fr.nextSteps || {})[id];
    if (step && step.action === 'na') return ''; // N/A items are excluded from the PDF entirely
    const item = (p.item || '').trim();
    const comment = (p.comment || '').trim();
    if (!item && !comment) return '';
    const hasAction = !!(step && step.action);
    const label = (p.department ? `[${escapeHtmlVR(p.department)}] ` : '') + (item ? escapeHtmlVR(item) : 'Portion check');
    return `<div style="padding:6px 0;border-bottom:1px solid #ebebeb;font-size:11.5px;">
      <b>${label}</b>${comment ? ' — ' + escapeHtmlVR(comment) : ''}
      ${hasAction ? `<div style="font-size:10px;color:#1a7a44;margin-top:2px;">→ ${vrActionLabel(step)}</div>` : ''}
    </div>`;
  }
  function vrSectionBlock(tag, label, bodyHtml) {
    if (!bodyHtml) return '';
    return `
    <div style="margin-top:16px;border:1px solid #ebebeb;">
      <div style="background:#1a1a1a;color:#fff;padding:8px 14px;display:flex;align-items:center;gap:8px;">
        <span style="background:#c8ae79;color:#1a1a1a;font-size:9px;font-weight:800;padding:2px 7px;text-transform:uppercase;letter-spacing:0.05em;">${escapeHtmlVR(tag)}</span>
        <span style="font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:0.03em;">${escapeHtmlVR(label)}</span>
      </div>
      <div style="padding:2px 14px;">${bodyHtml}</div>
    </div>`;
  }
  function vrHeader(v) {
    return `
    <div style="background:#1a1a1a;color:#fff;padding:16px 22px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:6px;">
      <div style="font-weight:800;letter-spacing:0.2em;font-size:15px;text-transform:uppercase;">BOOTLEGGER<span style="color:#c8ae79;">.</span></div>
      <div style="font-size:10px;color:#c8ae79;text-transform:uppercase;letter-spacing:0.08em;">GRIND Café Support Summary</div>
    </div>
    <div style="border:1px solid #ebebeb;border-top:3px solid #c8ae79;padding:14px 18px;display:grid;grid-template-columns:repeat(3,1fr);gap:10px 16px;font-size:11px;">
      <div><div style="text-transform:uppercase;color:#999;font-size:9px;letter-spacing:0.06em;">Store</div><div style="font-weight:700;">${escapeHtmlVR(v.store||'—')}</div></div>
      <div><div style="text-transform:uppercase;color:#999;font-size:9px;letter-spacing:0.06em;">Date</div><div style="font-weight:700;">${escapeHtmlVR(v.date||'—')}</div></div>
      <div><div style="text-transform:uppercase;color:#999;font-size:9px;letter-spacing:0.06em;">Visit Type</div><div style="font-weight:700;">${escapeHtmlVR(v.type||'—')}</div></div>
      <div><div style="text-transform:uppercase;color:#999;font-size:9px;letter-spacing:0.06em;">FSM / Support Member</div><div style="font-weight:700;">${escapeHtmlVR(v.fsm||'—')}</div></div>
      <div><div style="text-transform:uppercase;color:#999;font-size:9px;letter-spacing:0.06em;">Manager on Duty</div><div style="font-weight:700;">${escapeHtmlVR((v.fullReport&&v.fullReport.meta&&v.fullReport.meta.manager)||'—')}</div></div>
      <div><div style="text-transform:uppercase;color:#999;font-size:9px;letter-spacing:0.06em;">Visit Started / Completed</div><div style="font-weight:700;">${escapeHtmlVR((v.fullReport&&v.fullReport.meta&&v.fullReport.meta.startTime)?new Date(v.fullReport.meta.startTime).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}):'—')} – ${escapeHtmlVR((v.fullReport&&v.fullReport.meta&&v.fullReport.meta.endTime)?new Date(v.fullReport.meta.endTime).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}):'—')}</div></div>
    </div>`;
  }

  function buildVisitReportHtml(v) {
    const fr = v.fullReport;

    if (!fr) {
      const linkedActions = STATE.actions.filter(a => a.visitId === v.id);
      let html = `<div style="font-family:-apple-system,'Segoe UI','Helvetica Neue',sans-serif;max-width:820px;margin:0 auto;color:#1a1a1a;">${vrHeader(v)}`;
      html += `<div style="padding:14px 4px;color:#666;font-size:11.5px;">This visit was logged before the detailed report format was introduced. Here's everything that's actually still recoverable for it:</div>
        <div style="margin:0 4px 10px;padding:10px;background:#f7f7f7;font-size:11.5px;">${escapeHtmlVR(v.notes)}</div>`;
      if (linkedActions.length) {
        html += vrSectionBlock('Tasks', 'Tasks Created From This Visit', linkedActions.map(a =>
          `<div style="padding:6px 0;border-bottom:1px solid #eee;font-size:11.5px;"><b>${escapeHtmlVR(a.pillar)}: ${escapeHtmlVR(a.description)}</b><br><span style="color:#666;">Owner: ${escapeHtmlVR(a.owner)} · Due: ${escapeHtmlVR(a.dueDate)} · Status: ${escapeHtmlVR(a.status)}</span></div>`
        ).join(''));
      } else {
        html += `<div style="margin:10px 4px;color:#999;font-size:11.5px;">No tasks were linked to this visit, or they've since been removed.</div>`;
      }
      if (Array.isArray(v.grindResponses) && v.grindResponses.length) {
        html += vrSectionBlock('Legacy', 'Raw Checklist Data (legacy format)', v.grindResponses.map(r => {
          const label = r.text || r.question || r.label || r.id || 'Item';
          const answer = r.rating != null ? r.rating : (r.answer != null ? r.answer : (r.value != null ? r.value : ''));
          const comment = r.comment || r.notes || '';
          return `<div style="padding:6px 0;border-bottom:1px solid #eee;font-size:11.5px;"><b>${escapeHtmlVR(label)}</b>${answer!==''?' — '+escapeHtmlVR(answer):''}${comment?'<br><span style="color:#a15c1a;">"'+escapeHtmlVR(comment)+'"</span>':''}</div>`;
        }).join(''));
      }
      html += `</div>`;
      return html;
    }

    let body = '';
    let resetHtml = VR_GRIND_RESET.map(g => vrItemBlock(g.text, g.id, fr)).join('');
    (Array.isArray(fr.customItems) ? fr.customItems : Object.values(fr.customItems||{}).flat()).forEach(c => { resetHtml += vrItemBlock(c.text, c.id, fr); });
    const portionList = Array.isArray(fr.portion) ? fr.portion : Object.values(fr.portion||{}).flat();
    const portionRows = portionList.map((p, i) => vrPortionBlock(p, `portion-${i}`, fr)).join('');
    if (portionRows) resetHtml += `<div style="margin-top:6px;font-size:9px;font-weight:800;text-transform:uppercase;color:#999;letter-spacing:0.05em;">Portion Check</div>${portionRows}`;
    body += vrSectionBlock('Reset', 'GRIND Reset', resetHtml);

    let tastingHtml = '';
    VR_QC_TASTING_CATS.forEach(cat => {
      ((fr.tasting||{})[cat]||[]).forEach(t => {
        tastingHtml += vrItemBlock(`${cat} — ${t.product || '(untitled product)'}`, t.id, fr);
      });
    });
    body += vrSectionBlock('Inspect', 'QC Tasting', tastingHtml);

    body += vrSectionBlock('Admin', 'FSM Only — Status Check', VR_ADMIN.map(a => vrItemBlock(a.text, a.id, fr)).join(''));

    // Map every possible ID back to its readable question text, so the
    // summary below can show "Check servicing records" instead of "a2".
    const vrTextMap = {};
    const vrCommentMap = {}; // portion comments live in fr.portion, not fr.comments
    VR_GRIND_RESET.forEach(g => { vrTextMap[g.id] = g.text; });
    (Array.isArray(fr.customItems) ? fr.customItems : Object.values(fr.customItems||{}).flat()).forEach(c => { vrTextMap[c.id] = c.text; });
    portionList.forEach((p, i) => {
      vrTextMap[`portion-${i}`] = 'Portion Check' + (p.department ? ' (' + p.department + ')' : '') + ' — ' + (p.item || `item ${i+1}`);
      vrCommentMap[`portion-${i}`] = p.comment || '';
    });
    VR_ADMIN.forEach(a => { vrTextMap[a.id] = a.text; });
    VR_QC_TASTING_CATS.forEach(cat => {
      ((fr.tasting||{})[cat]||[]).forEach(t => { vrTextMap[t.id] = `${cat} — ${t.product || '(untitled product)'}`; });
    });

    // Summary — ONLY items routed to Task Tracker or logged as a
    // Non-Conformance appear here now (not every commented item); the
    // task's owner/due date shows inline via vrActionLabel() rather than a
    // separate "Tasks Created" section, and N/A items never appear here.
    const flagIds = new Set(
      Object.entries(fr.nextSteps||{}).filter(([,s]) => s && (s.action === 'tasktracker' || s.action === 'nonconformance')).map(([id]) => id)
    );
    let flagsHtml = '';
    if (!flagIds.size) {
      flagsHtml = `<div style="color:#666;font-size:11.5px;padding:8px 0;">No items were routed to Task Tracker or logged as a Non-Conformance on this visit.</div>`;
    } else {
      flagIds.forEach(id => {
        const c = (fr.comments||{})[id] || vrCommentMap[id] || '';
        const step = (fr.nextSteps || {})[id] || {};
        const photos = (fr.photos||{})[id] || [];
        const label = vrTextMap[id] || id;
        const isNC = step.action === 'nonconformance';
        flagsHtml += `<div style="padding:8px 0;border-bottom:1px solid #e8dcc0;">
          <div style="font-weight:700;font-size:11.5px;">${isNC ? '<span style="color:#c62828;">⚠ NON-CONFORMANCE — </span>' : ''}${escapeHtmlVR(label)}</div>
          ${c ? `<div style="color:#8f733f;font-size:11px;margin-top:3px;">${escapeHtmlVR(c)}</div>` : ''}
          ${vrPhotosBlock(photos)}
          <div style="font-size:10px;color:#1a7a44;margin-top:4px;font-weight:700;">→ ${vrActionLabel(step)}</div>
        </div>`;
      });
    }
    // Highlighted — gold background + thicker gold border, and this is the
    // only place task info shows now (no separate "Tasks Created" section).
    body += `
    <div style="margin-top:16px;border:2px solid #c8ae79;background:#fdf8ee;">
      <div style="background:#1a1a1a;color:#fff;padding:8px 14px;display:flex;align-items:center;gap:8px;">
        <span style="background:#c8ae79;color:#1a1a1a;font-size:9px;font-weight:800;padding:2px 7px;text-transform:uppercase;letter-spacing:0.05em;">Summary</span>
        <span style="font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:0.03em;">Flagged Actions &amp; Resolutions — Task Tracker / Non-Conformance</span>
      </div>
      <div style="padding:2px 14px;">${flagsHtml}</div>
    </div>`;

    return `<div style="font-family:-apple-system,'Segoe UI','Helvetica Neue',sans-serif;max-width:820px;margin:0 auto;color:#1a1a1a;">${vrHeader(v)}${body}</div>`;
  }

  function openVisitReport(id, rows){
    const v = rows.find(r => r.id === id);
    if (!v) return;
    document.getElementById('vrPrintArea').innerHTML = buildVisitReportHtml(v);
    const w = window.open('', '_blank');
    w.document.write('<html><head><title>Visit Report — ' + v.store + ' ' + v.date + '</title></head><body>' + buildVisitReportHtml(v) + '</body></html>');
    w.document.close();
    w.focus();
    setTimeout(() => w.print(), 300);
  }

  document.getElementById('vrSearch').addEventListener('input', render);
  document.getElementById('vrTypeFilter').addEventListener('change', render);
  render();
}

Closing/completing a task does require an editor or admin account, the same as logging visits elsewhere in BOS.

Department escalation timeframe : 24hrs / 48hrs / 72hrs / 7 days / 10 days (Marketing).</div>

      <div id="otTableWrap"></div>
    </div>
  `;

  // Marketing gets the extra 10/15-day options
  document.getElementById('otDept').addEventListener('change', () => {
    document.getElementById('otCustomDue').style.display = document.getElementById('otTimeframe').value === 'custom' ? 'block' : 'none';
  });
  document.getElementById('otTimeframe').addEventListener('change', () => {
    document.getElementById('otCustomDue').style.display = document.getElementById('otTimeframe').value === 'custom' ? 'block' : 'none';
  });
  document.getElementById('otName').addEventListener('change', () => {
    document.getElementById('otNameOther').style.display = document.getElementById('otName').value === '__other__' ? 'block' : 'none';
  });
  document.getElementById('otResponsible').addEventListener('change', () => {
    document.getElementById('otResponsibleOther').style.display = document.getElementById('otResponsible').value === '__other__' ? 'block' : 'none';
  });

  // Café autocomplete — a custom touch-friendly dropdown instead of a native
  // <datalist>. Datalist suggestions don't render at all on iOS Safari and
  // are unreliable on many other mobile browsers, which made this field
  // effectively impossible to pick from on mobile — you could type, but
  // nothing ever appeared to tap.
  const otCafeNames = ['HQ Internal', ...ALL_STORES.slice().sort((a,b)=>a.store.localeCompare(b.store)).map(s=>s.store)];
  const otCafeInput = document.getElementById('otCafe');
  const otCafeBox = document.getElementById('otCafeSuggestions');
  function renderCafeSuggestions(){
    const q = otCafeInput.value.trim().toLowerCase();
    const matches = (q ? otCafeNames.filter(n => n.toLowerCase().includes(q)) : otCafeNames).slice(0, 30);
    if (!matches.length) { otCafeBox.style.display = 'none'; otCafeBox.innerHTML = ''; return; }
    otCafeBox.innerHTML = matches.map(n => `<div class="otCafeOption" data-name="${n.replace(/"/g,'&quot;')}" style="padding:10px 12px;font-size:13px;cursor:pointer;border-bottom:1px solid var(--grey-100);">${n}</div>`).join('');
    otCafeBox.style.display = 'block';
    otCafeBox.querySelectorAll('.otCafeOption').forEach(opt => {
      // mousedown (not click) fires before the input's blur event, so the
      // suggestion box doesn't hide itself out from under a tap/click —
      // this is what actually makes selection work reliably on touch.
      opt.addEventListener('mousedown', (e) => { e.preventDefault(); });
      opt.addEventListener('click', () => {
        otCafeInput.value = opt.dataset.name;
        otCafeBox.style.display = 'none';
        otCafeBox.innerHTML = '';
      });
    });
  }
  otCafeInput.addEventListener('input', renderCafeSuggestions);
  otCafeInput.addEventListener('focus', renderCafeSuggestions);
  otCafeInput.addEventListener('blur', () => { setTimeout(() => { otCafeBox.style.display = 'none'; }, 150); });

  let otPhotoDataUrls = [];
  const OT_MAX_PHOTOS = 6;
  function resizeImageFile(file, maxDim, quality){
    return new Promise((resolve, reject) => {
      const img = new Image();
      const reader = new FileReader();
      reader.onload = () => { img.src = reader.result; };
      reader.onerror = reject;
      img.onload = () => {
        let { width, height } = img;
        if (width > maxDim || height > maxDim) {
          const scale = maxDim / Math.max(width, height);
          width = Math.round(width * scale);
          height = Math.round(height * scale);
        }
        const canvas = document.createElement('canvas');
        canvas.width = width; canvas.height = height;
        canvas.getContext('2d').drawImage(img, 0, 0, width, height);
        resolve(canvas.toDataURL('image/jpeg', quality));
      };
      img.onerror = reject;
      reader.readAsDataURL(file);
    });
  }
  function renderOtPhotoPreviews(){
    const wrap = document.getElementById('otPhotoPreviewWrap');
    const grid = document.getElementById('otPhotoPreviewGrid');
    if (!otPhotoDataUrls.length) { wrap.style.display = 'none'; grid.innerHTML = ''; return; }
    wrap.style.display = 'block';
    grid.innerHTML = otPhotoDataUrls.map((url, i) => `
      <div style="position:relative;">
        <img src="${url}" style="width:80px;height:80px;object-fit:cover;border-radius:4px;border:1px solid var(--grey-200);display:block;">
        <button type="button" class="otPhotoRemoveBtn" data-idx="${i}" title="Remove" style="position:absolute;top:-6px;right:-6px;background:var(--red);color:#fff;border:none;border-radius:50%;width:20px;height:20px;font-size:12px;line-height:1;cursor:pointer;">×</button>
      </div>
    `).join('');
    grid.querySelectorAll('.otPhotoRemoveBtn').forEach(btn => btn.addEventListener('click', () => {
      otPhotoDataUrls.splice(parseInt(btn.dataset.idx, 10), 1);
      renderOtPhotoPreviews();
    }));
  }
  // multiple selection is supported natively (choosing several from the
  // device's photo library in one go); this also lets the same control be
  // invoked again — e.g. camera, then device files — and have photos add
  // up instead of the second pick replacing the first.
  document.getElementById('otPhoto').addEventListener('change', async (e) => {
    const files = Array.from(e.target.files || []);
    if (!files.length) return;
    if (otPhotoDataUrls.length + files.length > OT_MAX_PHOTOS) {
      toast(`You can attach up to ${OT_MAX_PHOTOS} photos per task`);
    }
    const room = Math.max(0, OT_MAX_PHOTOS - otPhotoDataUrls.length);
    for (const file of files.slice(0, room)) {
      try { otPhotoDataUrls.push(await resizeImageFile(file, 1280, 0.7)); }
      catch (err) { toast('Could not read one of those photos'); }
    }
    renderOtPhotoPreviews();
    e.target.value = ''; // clears the picker so it can be invoked again to add more
  });

  let OT_TASKS = [];

  async function loadTasks(){
    try {
      OT_TASKS = await apiGet('/api/ops-tasks');
      render();
    } catch(e) {
      if (e.message !== 'unauthorized') document.getElementById('otTableWrap').innerHTML = '<div class="empty-state">Could not load tasks.</div>';
    }
  }

  function isOverdue(t){
    if (t.completed) return false;
    const due = new Date(t.createdAt).getTime() + t.escalationHours * 3600000;
    return Date.now() > due;
  }
  function timeLeft(t){
    const due = new Date(t.createdAt).getTime() + t.escalationHours * 3600000;
    const hrs = Math.round((due - Date.now()) / 3600000);
    return hrs < 0 ? 'Overdue' : hrs + 'h left';
  }

  function render(){
    const deptF = document.getElementById('otFilterDept').value;
    const statusF = document.getElementById('otFilterStatus').value;
    let rows = OT_TASKS.filter(t => !deptF || t.department === deptF);
    if (statusF === 'done') rows = rows.filter(t => t.completed);
    else if (statusF === 'all') { /* no filter */ }
    else rows = rows.filter(t => !t.completed);

    const total = OT_TASKS.length, open = OT_TASKS.filter(t=>!t.completed).length, overdue = OT_TASKS.filter(isOverdue).length;
    document.getElementById('otSummary').innerHTML = `
      <div class="card"><div class="card-label">Total Tasks</div><div class="card-value">${total}</div></div>
      <div class="card"><div class="card-label">Open</div><div class="card-value">${open}</div></div>
      <div class="card"><div class="card-label">Overdue</div><div class="card-value" style="color:var(--red)">${overdue}</div></div>
    `;

    rows.sort((a,b) => new Date(b.createdAt) - new Date(a.createdAt));
    document.getElementById('otTableWrap').innerHTML = rows.length ? `
      <table class="data-table">
        <thead><tr><th>Café</th><th>Department</th><th>Reported By</th><th>Responsible</th><th>Status</th><th>Comments</th><th>Photo</th><th></th></tr></thead>
        <tbody>${rows.map(t => {
          const color = OPS_DEPT_COLORS[t.department] || '#6B7280';
          const status = t.completed ? `<span class="badge green">DONE${t.completedBy ? ' · '+t.completedBy : ''}</span>` : (isOverdue(t) ? '<span class="badge red">OVERDUE</span>' : `<span class="badge amber">${timeLeft(t)}</span>`);
          return `<tr>
            <td>${t.cafe}</td>
            <td><span style="color:${color};font-weight:600;">${t.department}</span></td>
            <td>${t.submitterName}</td>
            <td>${t.responsiblePerson || '—'}</td>
            <td>${status}</td>
            <td style="max-width:280px;">${t.comments || ''}</td>
            <td>${(t.photoUrls && t.photoUrls.length) ? t.photoUrls.map(u => `<img src="${u}" style="width:36px;height:36px;object-fit:cover;border-radius:4px;cursor:pointer;margin:0 3px 3px 0;" class="otPhotoThumb" data-src="${u}">`).join('') : ''}</td>
            <td>${(!t.completed && isEditor()) ? `<button class="btn btn-outline otCompleteBtn" data-id="${t.id}">Complete</button>` : ''}</td>
          </tr>`;
        }).join('')}</tbody>
      </table>` : '<div class="empty-state">No tasks match this filter.</div>';

    document.querySelectorAll('.otPhotoThumb').forEach(img => img.addEventListener('click', () => {
      const overlay = document.createElement('div');
      overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:9999;display:flex;align-items:center;justify-content:center;cursor:zoom-out;';
      overlay.innerHTML = `<img src="${img.dataset.src}" style="max-width:92vw;max-height:92vh;border-radius:6px;">`;
      overlay.addEventListener('click', () => overlay.remove());
      document.body.appendChild(overlay);
    }));

    document.querySelectorAll('.otCompleteBtn').forEach(btn => btn.addEventListener('click', async () => {
      btn.disabled = true;
      try { await apiPatch('/api/ops-tasks/' + btn.dataset.id + '/complete', {}); await loadTasks(); }
      catch(e) { toast(e.message || 'Could not complete task'); btn.disabled = false; }
    }));
  }

  document.getElementById('otFilterDept').addEventListener('change', render);
  document.getElementById('otFilterStatus').addEventListener('change', render);
  function resetOpsTaskForm(){
    try {
      const dept = document.getElementById('otDept');
      const cafe = document.getElementById('otCafe');
      const name = document.getElementById('otName');
      const nameOther = document.getElementById('otNameOther');
      const resp = document.getElementById('otResponsible');
      const respOther = document.getElementById('otResponsibleOther');
      const tf = document.getElementById('otTimeframe');
      const customDue = document.getElementById('otCustomDue');
      const comments = document.getElementById('otComments');
      const nonConformance = document.getElementById('otNonConformance');
      const photo = document.getElementById('otPhoto');
      const photoWrap = document.getElementById('otPhotoPreviewWrap');
      const photoGrid = document.getElementById('otPhotoPreviewGrid');

      if (dept) dept.value = dept.options[0] ? dept.options[0].value : '';
      if (cafe) cafe.value = '';
      if (name) name.value = '';
      if (nameOther) { nameOther.value = ''; nameOther.style.display = 'none'; }
      if (resp) resp.value = '';
      if (respOther) { respOther.value = ''; respOther.style.display = 'none'; }
      if (tf) tf.value = tf.options[0] ? tf.options[0].value : '';
      if (customDue) { customDue.value = ''; customDue.style.display = 'none'; }
      if (comments) comments.value = '';
      if (nonConformance) nonConformance.checked = false;
      otPhotoDataUrls = [];
      if (photo) photo.value = '';
      if (photoWrap) photoWrap.style.display = 'none';
      if (photoGrid) photoGrid.innerHTML = '';
    } catch (err) {
      console.error('Could not fully reset Add Task form:', err);
    }
  }

  document.getElementById('otSubmit').addEventListener('click', async () => {
    const dept = document.getElementById('otDept').value;
    const tfValue = document.getElementById('otTimeframe').value;
    const cafe = document.getElementById('otCafe').value.trim();
    if (cafe !== 'HQ Internal' && !ALL_STORES.some(s => s.store === cafe)) { toast('Please pick a café from the search list'); return; }
    let escalationLabel, escalationHours;
    if (tfValue === 'custom') {
      const customVal = document.getElementById('otCustomDue').value;
      if (!customVal) { toast('Please pick a due date/time'); return; }
      const dueMs = new Date(customVal).getTime();
      escalationHours = Math.max(1, Math.round((dueMs - Date.now()) / 3600000));
      escalationLabel = 'Custom — due ' + new Date(customVal).toLocaleString('en-ZA', {day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'});
    } else {
      const tf = OPS_TIMEFRAMES.find(t => !t.custom && String(t.hours) === tfValue) || OPS_TIMEFRAMES[0];
      escalationLabel = tf.label;
      escalationHours = tf.hours;
    }
    const nameSel = document.getElementById('otName').value;
    const submitterName = nameSel === '__other__' ? document.getElementById('otNameOther').value.trim() : nameSel;
    const respSel = document.getElementById('otResponsible').value;
    const responsiblePerson = respSel === '__other__' ? document.getElementById('otResponsibleOther').value.trim() : respSel;
    const body = {
      department: dept,
      cafe,
      escalationLabel,
      escalationHours,
      comments: document.getElementById('otComments').value,
      submitterName,
      responsiblePerson: responsiblePerson || null,
      photoUrls: otPhotoDataUrls,
      isNonConformance: document.getElementById('otNonConformance').checked,
    };
    const submitBtn = document.getElementById('otSubmit');
    submitBtn.disabled = true;
    try {
      await apiPost('/api/ops-tasks', body);
      toast('Task submitted');
    } catch(e) {
      toast(e.message || 'Could not submit task');
      submitBtn.disabled = false;
      return;
    }
    // Reset and refresh happen regardless of any DOM quirk in either step —
    // a failure in one must never block the other.
    resetOpsTaskForm();
    submitBtn.disabled = false;
    try { await loadTasks(); } catch(e) { /* loadTasks already handles its own error UI */ }
  });

  loadTasks();
}

  function normalizeTrainingWeeks(weeks){
    const arr = Array.isArray(weeks) ? weeks.slice(0, 4) : [];

  // Training Start Date (Week 1) is uniform across every role: the café's
  // own Opening Date minus 5 weeks — this is also the exact CPA "Training
  // Commences" milestone, so the 4-week calendar runs training-start →
  // handover (1 week prior to opening). A trainee's own start date can be
  // manually overridden (e.g. someone starting later than the café norm)
  // via `startDateOverride` on their row, which takes priority when set.
  function computeTrainingStartDate(openDateIso, startOverride){
    if (startOverride) {
      const d = new Date(startOverride + 'T00:00:00');
      if (!isNaN(d.getTime())) return d;
    }
    if (!openDateIso) return null;
    const d = new Date(openDateIso + 'T00:00:00');
    if (isNaN(d.getTime())) return null;
    d.setDate(d.getDate() - 35);

  function fmtDayMonth(date){
    if (!date || isNaN(date.getTime())) return '';

  // How far a trainee has progressed through the 4-week training calendar,
  // based on their (possibly overridden) start date vs today. Whole weeks
  // elapsed count as "completed" — someone in their 3rd week has completed
  // 2 of 4 weeks (50%), matching how the recruitment/training split is
  // meant to read together (e.g. "60% of required staff have completed
  // 50% of training").
  function trainingWeekProgress(startDate){
    if (!startDate || isNaN(startDate.getTime())) return { currentWeek: 0, completedWeeks: 0, pct: 0 };
    const diffDays = Math.floor((new Date(today) - startDate) / 86400000);
    if (diffDays < 0) return { currentWeek: 0, completedWeeks: 0, pct: 0 };
    const completedWeeks = Math.min(Math.floor(diffDays / 7), 4);
    const currentWeek = Math.min(completedWeeks + 1, 4);
    return { currentWeek, completedWeeks, pct: (completedWeeks / 4) * 100 };

  // in is a "slot" for that role — a blank Name next to it is a vacancy.
  // Recruitment % = named rows / total rows with a position set.
  function recruitmentStats(cal){
    const relevant = cal.staff.filter(p => (p.position||'').trim());
    if (!relevant.length) return null;
    const totalRequired = relevant.length;
    const totalFilled = relevant.filter(p => (p.name||'').trim()).length;
    return { totalRequired, totalFilled, pct: (totalFilled/totalRequired)*100 };
  }
  function trainingProgressStats(cal, openDate){
    const filled = cal.staff.filter(p => (p.name||'').trim());
    if (!filled.length) return { pct: 0, avgWeek: 0 };
    let pctSum = 0, weekSum = 0;
    filled.forEach(p => {
      const startDate = computeTrainingStartDate(openDate, p.startDateOverride);
      const prog = trainingWeekProgress(startDate);
      pctSum += prog.pct; weekSum += prog.currentWeek;

  function computeCafeProgress(cal, openDate){

    const overallPct = (recruitmentPct !== null) ? (recruitmentPct/100) * (trainingPct/100) * 100 : null;
    return {

      totalRequired: rec ? rec.totalRequired : 0,
      totalFilled: rec ? rec.totalFilled : 0,
      avgWeek: trn.avgWeek,
    };
  }

  // Small dependency-free CSV parser (handles quoted fields with embedded
  // commas) — avoids pulling in an external library for this one form.
  // Auto-detects comma vs semicolon (Excel in many non-US locales exports
  // semicolon-delimited CSVs), and normalizes line endings so a lone \r
  // (old Mac-style) doesn't merge every row into one.
  function detectCsvDelimiter(text) {
    const firstLine = (text.split(/\r\n|\r|\n/)[0]) || '';
    const commas = (firstLine.match(/,/g) || []).length;
    const semis = (firstLine.match(/;/g) || []).length;
    return semis > commas ? ';' : ',';
  }
  function parseCsvText(text, delimiter){
    delimiter = delimiter || ',';
    // Excel commonly saves UTF-8 CSVs with a leading BOM — left in place,
    // it silently attaches itself to the first header cell ("\uFEFFPosition"),
    // which then fails to match "position" and breaks the whole import.
    if (text.charCodeAt(0) === 0xFEFF) text = text.slice(1);
    text = text.replace(/\r\n/g, '\n').replace(/\r/g, '\n');
    const rows = [];
    let row = [], field = '', inQuotes = false;
    for (let i = 0; i < text.length; i++){
      const c = text[i];
      if (inQuotes) {
        if (c === '"') { if (text[i+1] === '"') { field += '"'; i++; } else { inQuotes = false; } }
        else field += c;
      } else {
        if (c === '"') inQuotes = true;
        else if (c === delimiter) { row.push(field); field = ''; }
        else if (c === '\n') { row.push(field); rows.push(row); row = []; field = ''; }
        else field += c;
      }
    }
    if (field.length || row.length) { row.push(field); rows.push(row); }
    return rows.filter(r => r.some(f => f.trim() !== ''));
  }

  // Expected CSV format: header row of Position, Name, Store, Wk 1, Wk 2,
  // Wk 3, Wk 4 (only the first 4 columns starting with "week"/"wk" are used
  // — Start Date isn't part of the CSV since it's calculated automatically
  // from the café's Open Date and the role's standard lead time).
  function importTrainingCsv(storeName, file){
    const reader = new FileReader();
    reader.onload = async () => {
      try {
        const rawText = String(reader.result);
        const delimiter = detectCsvDelimiter(rawText);
        const rows = parseCsvText(rawText, delimiter);
        if (rows.length < 2) { toast('CSV looks empty — needs a header row plus at least one staff row'); return; }
        const header = rows[0].map(h => h.trim().toLowerCase());
        // Tolerant of common real-world header variants — "Positions",
        // "Postion", "Postions" (a typo that's shown up in an actual
        // template used here) — anything starting with "pos" matches.
        const posIdx = header.findIndex(h => h.startsWith('pos'));
        const nameIdx = header.findIndex(h => h === 'name');
        const storeIdx = header.findIndex(h => h === 'store');
        const weekCols = header.map((h,i) => ({h,i})).filter(({h}) => h.startsWith('week') || h.startsWith('wk')).slice(0, 4);
        if (posIdx === -1 || nameIdx === -1) {
          const found = rows[0].map(h => h.trim()).filter(Boolean).join(', ') || '(no headers detected)';
          toast(`CSV needs "Position" and "Name" column headers. Found instead: ${found}`);
          return;
        }
        const staff = rows.slice(1).map(r => ({
          position: (r[posIdx]||'').trim(),
          name: (r[nameIdx]||'').trim(),
          store: storeIdx > -1 ? (r[storeIdx]||'').trim() : '',
          weeks: normalizeTrainingWeeks(weekCols.map(({i}) => (r[i]||'').trim())),
        })).filter(p => p.position || p.name);
        trainingCalendars[storeName] = { weekLabels: [...TRAINING_WEEK_LABELS], staff };
        renderStoreList();
        await saveTrainingCalendars();
        toast(`Imported ${staff.length} training staff for ${storeName}`);
      } catch(e) { toast('Could not parse that CSV — check the format and try again. (' + e.message + ')'); }
    };
    reader.readAsText(file);
  }

  // Case/punctuation-insensitive lookup — the Beeline Groups Report names

  function newCafeBBetterFor(storeName){
    if (newCafeBBetter[storeName]) return newCafeBBetter[storeName];
    const norm = (s) => (s||'').toLowerCase().replace(/[^a-z0-9]/g,'');

  // Expects the Beeline "Groups Report" .xlsx export as-is: Name, Average

  function importBBetterWorkbook(file){
    const reader = new FileReader();
    reader.onload = async () => {
      try {
        if (!window.XLSX) { toast('Excel reader failed to load — refresh the page and try again'); return; }
        const wb = XLSX.read(new Uint8Array(reader.result), { type: 'array' });
        const sheet = wb.Sheets[wb.SheetNames[0]];
        const rows = XLSX.utils.sheet_to_json(sheet, { defval: '' });
        let count = 0;
        rows.forEach(r => {
          const name = String(r['Name'] || '').trim();
          if (!name) return;
          newCafeBBetter[name] = {
            avgCompletion: Number(r['Average Completion (%)']) || 0,
            onboardedMembers: Number(r['Onboarded Members']) || 0,
            onboardedPct: Number(r['Onboarded (%)']) || 0,
            uploadedAt: today,
          };
          count++;
        });
        if (!count) { toast('No rows found — expected a "Name" column from the Beeline Groups Report'); return; }
        await saveNewCafeBBetter();
        renderStoreList();
        toast(`Imported B.Better status for ${count} group(s)`);
      } catch(e) { toast('Could not read that file — expected the Beeline Groups Report .xlsx export. (' + e.message + ')'); }
    };
    reader.readAsArrayBuffer(file);
  }

  async function uploadCpaMilestoneFile(storeName, key, file){
    const reader = new FileReader();
    reader.onload = async () => {
      try {
        const res = await fetch('/api/upload-file', {
          method:'POST', headers: Object.assign({'Content-Type':'application/json'}, authHeaders()),
          body: JSON.stringify({ dataUrl: String(reader.result), subfolder: 'cpa-milestones' })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Upload failed');
        const meta = getMilestoneMeta(storeName, key);
        const storeConf = Object.assign({}, cpaConfirmations[storeName] || {}, { [key]: Object.assign({}, meta, { fileUrl: data.url, fileName: file.name }) });
        cpaConfirmations = Object.assign({}, cpaConfirmations, { [storeName]: storeConf });
        renderStoreList();
        await saveCpaConfirmations();
        toast('File attached');
      } catch(e) { toast(e.message || 'Could not upload that file'); }
    };
    reader.readAsDataURL(file);
  }
  async function removeCpaMilestoneFile(storeName, key){
    const meta = getMilestoneMeta(storeName, key);
    const storeConf = Object.assign({}, cpaConfirmations[storeName] || {}, { [key]: Object.assign({}, meta, { fileUrl:'', fileName:'' }) });
    cpaConfirmations = Object.assign({}, cpaConfirmations, { [storeName]: storeConf });
    renderStoreList();
    await saveCpaConfirmations();
  }

  async function setCpaOverride(storeName, key, value){
    const store = extraStores.find(s => s.name === storeName);

    if (!store.cpaOverrides) store.cpaOverrides = {};

    await saveExtraStores();
    renderStoreList();
  }

  // One-time, additive-only enrichment: fills in blank Franchisee & Store
  // Details fields from the MASTER Store Info Sheet workbook (14 July
  // 2026) for cafés already being tracked. Never touches Opening Date or
  // Handover Date — the workbook's dates disagreed with what's already
  // tracked for most stores and there's no reliable way to tell which
  // source is more current, so those stay exactly as they are; Franlo/
  // Tarryn can adjust them by hand using the editable field already in
  // place. Also never overwrites a field someone has already filled in.
  async function migrateStoreDetailsFromMasterSheetIfNeeded(){
    try {
      const flag = await apiGet('/api/storage/store-details-master-migrated-v1');
      if (flag && flag.value === 'true') return;
    } catch(e) { /* flag not set yet — proceed */ }
    let changed = false;
    Object.entries(STORE_DETAILS_MASTER_SEED).forEach(([name, fields]) => {
      if (!storeDetails[name]) storeDetails[name] = {};
      Object.entries(fields).forEach(([k, v]) => {
        if (!storeDetails[name][k]) { storeDetails[name][k] = v; changed = true; }
      });
    });
    if (changed) await saveStoreDetails();
    try {
      await fetch('/api/storage/store-details-master-migrated-v1', {
        method:'POST', headers: Object.assign({'Content-Type':'application/json'}, authHeaders()),
        body: JSON.stringify({ value: 'true' })
      });
    } catch(e) { /* safe to retry next load — additive/idempotent */ }
  }

  function setStoreDetailField(storeName, field, value){
    if (!storeDetails[storeName]) storeDetails[storeName] = {};
    storeDetails[storeName][field] = value;
    saveStoreDetails();
  }

  // Editing a café's Open Date here directly changes the same value that
  // drives calcCPA() — every milestone in the CPA Timeline and the
  // Post-Support Schedule recomputes from it on the next render. Only
  // works for extraStores (manually added or approved from a submission);
  // the original hardcoded pipeline entries don't carry an id and aren't
  // editable through the UI.
  async function setStoreOpenDate(storeName, value){
    const store = extraStores.find(s => s.name === storeName);
    if (!store) return;
    store.openDate = value;
    await saveExtraStores();
    renderStoreList();
  }

  // Café Created Date drives the Franchisee Check-in cadence and the Account
  // Application milestone (calcCPA) — many existing/migrated cafés never had
  // a real creation date recorded, so it defaults to today (or the record's
  // own id/submission timestamp) until set here manually.
  async function setStoreCreatedDate(storeName, value){
    const store = extraStores.find(s => s.name === storeName);
    if (!store) return;
    store.createdDate = value;
    await saveExtraStores();
    renderStoreList();
  }

  function setPendingField(id, field, value){
    const sub = cafeSubmissions.find(s => s.id === id);
    if (!sub) return;
    sub[field] = value;
  }

  // Turns an approved pending request into a real tracked café: adds it to
  // extraStores (so it gets a CPA timeline immediately, using the submitted
  // Handover Date if one was given), files everything else — franchisee,
  // landlord, and store details — under storeDetails for the new
  // "🏢 Franchisee & Store Details" section, then drops it from the queue.
  async function approveCafeSubmission(id){
    const sub = cafeSubmissions.find(s => s.id === id);
    if (!sub) return;
    if (!sub.storeName || !sub.storeName.trim()) { toast('Store Name is required before approving'); return; }
    if (!sub.openDate) { toast('Store Opening Date is required before approving'); return; }
    const name = sub.storeName.trim();
    extraStores.push({
      id: Date.now(),
      name,
      type: sub.type || 'Full Store',
      region: sub.region || '',
      openDate: sub.openDate,
      createdDate: sub.submittedAt ? new Date(sub.submittedAt).toISOString().slice(0,10) : todayISO(),
      fsm: sub.fsm || '',
      notes: '',
    });
    await saveExtraStores();
    storeDetails[name] = {
      location: sub.location || '',
      seats: sub.seats || '',
      turnover: sub.turnover || '',
      address: sub.address || '',
      invoicingDetails: sub.invoicingDetails || '',
      representative: sub.representative || '',
      representativeEmail: sub.representativeEmail || '',
      representativeContactNumber: sub.representativeContactNumber || '',
      fsmEmail: sub.fsmEmail || '',
      fsmContactNumber: sub.fsmContactNumber || '',
      pm: sub.pm || '',
      pmEmail: sub.pmEmail || '',
      pmContactNumber: sub.pmContactNumber || '',
      landlordContact: sub.landlordContact || '',
      landlordEmail: sub.landlordEmail || '',
      landlordContactNumber: sub.landlordContactNumber || '',
    };
    await saveStoreDetails();
    cafeSubmissions = cafeSubmissions.filter(s => s.id !== id);
    await saveCafeSubmissions();
    toast(`${name} approved and added to New Cafés`);
    subTab = 'active';
    document.querySelectorAll('#otlSubTab .segmented-btn').forEach(b => b.classList.toggle('active', b.dataset.sub === 'active'));
    document.getElementById('otlFilterRow').style.display = '';
    document.getElementById('otlStoreList').style.display = '';
    document.getElementById('otlPendingList').style.display = 'none';
    renderAll();
  }
  function rejectCafeSubmission(id){
    if (!confirm('Reject this submission? It will be removed from the queue permanently.')) return;
    cafeSubmissions = cafeSubmissions.filter(s => s.id !== id);
    saveCafeSubmissions();
    renderPendingList();
  }

  function updatePendingBadge(){
    const badge = document.getElementById('otlPendingBadge');
    if (!badge) return;
    badge.textContent = cafeSubmissions.length ? ` (${cafeSubmissions.length})` : '';
  }

  function pendingFieldHtml(sub, field, label, type){
    type = type || 'text';
    return `<div>
      <label style="display:block;font-size:9px;text-transform:uppercase;color:var(--grey-500);letter-spacing:0.04em;margin-bottom:2px;">${label}</label>
      <input type="${type}" class="pendingField" data-id="${sub.id}" data-field="${field}" value="${escTC(sub[field]||'')}" style="width:100%;padding:5px 6px;border:1px solid var(--grey-200);border-radius:2px;font-size:11.5px;box-sizing:border-box;">
    </div>`;
  }

    if (!cafeSubmissions.length) {
      el.innerHTML = '<div class="empty-state">No pending café requests right now.</div>';
      return;

    el.innerHTML = cafeSubmissions.map(sub => `

        </div>
        <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;">

          ${pendingFieldHtml(sub,'region','Region')}
          ${pendingFieldHtml(sub,'type','Store Type')}
          ${pendingFieldHtml(sub,'openDate','Store Opening Date','date')}
          ${pendingFieldHtml(sub,'location','Location')}
          ${pendingFieldHtml(sub,'seats','Seat No.')}
          ${pendingFieldHtml(sub,'turnover','Anticipated Turnover')}
          ${pendingFieldHtml(sub,'address','Store Address')}
          ${pendingFieldHtml(sub,'invoicingDetails','Franchisee Invoicing Details')}
          ${pendingFieldHtml(sub,'representative','Representative')}
          ${pendingFieldHtml(sub,'representativeEmail','Representative Email')}
          ${pendingFieldHtml(sub,'representativeContactNumber','Representative Contact No.')}
          ${pendingFieldHtml(sub,'fsm','FSM')}
          ${pendingFieldHtml(sub,'fsmEmail','FSM Email')}

    document.querySelectorAll('.pendingRejectBtn').forEach(btn => btn.addEventListener('click', () => rejectCafeSubmission(btn.dataset.id)));

  async function toggleSupportAllocation(storeName, member){
    const current = supportAllocations[storeName] || [];
    const updated = current.includes(member) ? current.filter(m => m !== member) : [...current, member];
    supportAllocations = Object.assign({}, supportAllocations, { [storeName]: updated });
    renderStoreList();
    await saveSupportAllocations();
  }

  function renderNewStoreSupportChips(){
    const el = document.getElementById('otlSupportChips');
    if (!el) return;
    el.innerHTML = OT_PEOPLE_LIST.map(member => {
      const assigned = newStoreSupport.includes(member);
      return `<button type="button" class="otlNewSupportChip" data-member="${member}" style="cursor:pointer;font-size:11px;padding:5px 10px;border-radius:14px;margin:3px 4px 3px 0;border:1px solid ${assigned?'var(--gold)':'var(--grey-200)'};background:${assigned?'var(--gold)':'#fff'};color:${assigned?'#000':'var(--grey-700)'};font-weight:${assigned?'700':'500'};">${member}</button>`;
    }).join('');
    document.querySelectorAll('.otlNewSupportChip').forEach(btn => btn.addEventListener('click', () => {
      const m = btn.dataset.member;
      newStoreSupport = newStoreSupport.includes(m) ? newStoreSupport.filter(x => x !== m) : [...newStoreSupport, m];
      renderNewStoreSupportChips();
    }));
